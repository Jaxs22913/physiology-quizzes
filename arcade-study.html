<!DOCTYPE html>
<html lang="en">
<head>
<script>document.documentElement.setAttribute('data-theme', localStorage.getItem('siteTheme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Study — Arcade</title>
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="arcade.css">
</head>
<body>
<svg class="edge-decor left" aria-hidden="true">
  <defs>
    <pattern id="zigzag-pattern" width="74" height="120" patternUnits="userSpaceOnUse">
      <circle cx="37" cy="15" r="10" fill="var(--accent)"/>
      <circle cx="37" cy="45" r="10" fill="var(--accent2)"/>
      <circle cx="37" cy="75" r="10" fill="var(--accent3)"/>
      <circle cx="37" cy="105" r="10" fill="var(--accent4)"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#zigzag-pattern)"/>
</svg>
<svg class="edge-decor right" aria-hidden="true">
  <rect width="100%" height="100%" fill="url(#zigzag-pattern)"/>
</svg>
<div class="page page-wide">

  <div class="brand-row">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="14" height="10" rx="2"/><rect x="7" y="4" width="14" height="10" rx="2"/></svg>
      </div>
      <div class="brand-text">
        <h1>Study Arcade</h1>
        <p>Turn studying into a game</p>
      </div>
    </div>
  </div>
  <div class="streak-pill" id="streak-pill"><span class="flame">🔥</span><b id="streak-count">0</b><span>-day streak</span></div>

  <a class="back-link" href="arcade.html">
    <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Back to decks
  </a>

  <div id="empty-container"></div>

  <div id="session-ui" style="display:none">
    <div class="study-toolbar">
      <button type="button" class="study-tool-btn" id="shuffle-btn">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
        Shuffle
      </button>
      <button type="button" class="study-tool-btn" id="continuous-btn">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <span id="continuous-btn-label">Continuous</span>
      </button>
    </div>
    <div class="continuous-label" id="continuous-label" style="display:none"><span class="dot"></span>Continuous review — looping the shuffled deck</div>
    <div class="session-progress">
      <div class="study-progress" id="study-progress"></div>
      <div class="progress-track"><div class="progress-fill" id="study-progress-fill"></div></div>
    </div>
    <div class="card-scene" id="study-card-scene">
      <div class="card-flip" id="study-card">
        <div class="card-face card-front">
          <span id="study-front"></span>
          <div class="flip-hint"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg> tap card or press space to flip</div>
        </div>
        <div class="card-face card-back">
          <span id="study-back"></span>
          <div class="flip-hint"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg> tap card or press space to flip back</div>
        </div>
      </div>
    </div>
    <div class="rating-row" id="rating-row" style="visibility:hidden">
      <button class="rating-btn rating-again" data-rate="dontknow"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Don't know<span class="k">&larr; · B</span></button>
      <button class="rating-btn rating-good" data-rate="know"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Know<span class="k">&rarr; · A</span></button>
    </div>
    <p class="keyhint">Don't-know cards come back around later in this session<br>🎮 A flips, then A = Know · B = Don't know</p>
  </div>
</div>

<div id="toast"></div>

<script src="arcade.js"></script>
<script src="theme.js" defer></script>
<script>
(function () {
  "use strict";

  var deck = findDeck(deckIdFromURL());
  var queue = [], qIdx = 0, flipped = false, revealed = false;
  var dueEmptyMsg = null;

  // Continuous mode: an ambient, unscored loop through the WHOLE deck
  // (independent of the spaced-repetition due-queue above), auto-flipping
  // and auto-advancing forever, reshuffling each time it completes a pass.
  var continuousMode = false;
  var continuousQueue = [];
  var continuousIdx = 0;
  var continuousTimer = null;
  var CONTINUOUS_FRONT_MS = 2200;
  var CONTINUOUS_BACK_MS = 2600;

  function shuffleArray(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
    }
    return arr;
  }

  function showEmpty(msg, opts) {
    opts = opts || {};
    var offerContinuous = opts.offerContinuous && deck && deck.cards && deck.cards.length > 0;
    document.getElementById("empty-container").innerHTML =
      '<div class="empty-state"><div class="big">🎉</div><p>' + msg + '</p>' +
      (offerContinuous
        ? '<button type="button" class="btn ghost" id="empty-continuous-btn" style="margin:16px auto 0;max-width:240px;">&#9654; Continuous Review</button>'
        : '') +
      '</div>';
    if (offerContinuous) {
      document.getElementById("empty-continuous-btn").addEventListener("click", function () {
        document.getElementById("empty-container").innerHTML = "";
        document.getElementById("session-ui").style.display = "block";
        document.getElementById("shuffle-btn").disabled = true;
        startContinuous();
      });
    }
  }

  // Shared DOM paint step for whichever card (idx into deck.cards) is
  // currently being shown, regardless of which queue/mode drove it here.
  function paintPair(pair) {
    // Snap instantly to front-facing (no transition) BEFORE writing the new
    // card's text -- otherwise a card left showing its back (user rated
    // without flipping back first) animates its rotation *while already
    // displaying the next card's answer*, flashing it before the flip completes.
    var cardEl = document.getElementById("study-card");
    cardEl.classList.add("no-anim");
    cardEl.classList.remove("flipped");
    void cardEl.offsetWidth;
    document.getElementById("study-front").textContent = pair[0];
    document.getElementById("study-back").textContent = pair[1];
    requestAnimationFrame(function () { cardEl.classList.remove("no-anim"); });

    document.getElementById("rating-row").style.visibility = "hidden";
    flipped = false;
    revealed = false;
  }

  function renderCard() {
    var idx = queue[qIdx];
    var pair = deck.cards[idx];
    var pct = Math.round(qIdx / queue.length * 100);
    document.getElementById("study-progress").innerHTML =
      "<span>Card " + (qIdx + 1) + " of " + queue.length + "</span><span>" + pct + "% done</span>";
    document.getElementById("study-progress-fill").style.width = pct + "%";
    paintPair(pair);
  }

  function renderContinuousCard() {
    var idx = continuousQueue[continuousIdx];
    var pair = deck.cards[idx];
    document.getElementById("study-progress").innerHTML =
      "<span>Card " + (continuousIdx + 1) + " of " + continuousQueue.length + "</span><span>&#8734; looping</span>";
    document.getElementById("study-progress-fill").style.width =
      Math.round((continuousIdx + 1) / continuousQueue.length * 100) + "%";
    paintPair(pair);
  }

  function autoFlip() {
    flipped = true;
    document.getElementById("study-card").classList.add("flipped");
    SOUNDS.flip();
  }

  function continuousTick() {
    if (!continuousMode) return;
    if (!flipped) {
      autoFlip();
      continuousTimer = setTimeout(continuousTick, CONTINUOUS_BACK_MS);
    } else {
      continuousIdx++;
      if (continuousIdx >= continuousQueue.length) {
        shuffleArray(continuousQueue);
        continuousIdx = 0;
      }
      renderContinuousCard();
      continuousTimer = setTimeout(continuousTick, CONTINUOUS_FRONT_MS);
    }
  }

  function startContinuous() {
    continuousMode = true;
    continuousQueue = shuffleArray(deck.cards.map(function (_, i) { return i; }));
    continuousIdx = 0;
    clearTimeout(continuousTimer);
    document.getElementById("continuous-btn").classList.add("active");
    document.getElementById("continuous-btn-label").textContent = "Stop";
    document.getElementById("continuous-label").style.display = "flex";
    document.getElementById("shuffle-btn").disabled = true;
    renderContinuousCard();
    continuousTimer = setTimeout(continuousTick, CONTINUOUS_FRONT_MS);
  }

  function stopContinuous() {
    continuousMode = false;
    clearTimeout(continuousTimer);
    continuousTimer = null;
    document.getElementById("continuous-btn").classList.remove("active");
    document.getElementById("continuous-btn-label").textContent = "Continuous";
    document.getElementById("continuous-label").style.display = "none";
    if (queue.length) {
      document.getElementById("shuffle-btn").disabled = false;
      renderCard();
    } else {
      document.getElementById("session-ui").style.display = "none";
      showEmpty(dueEmptyMsg || "Nothing due right now.", { offerContinuous: true });
    }
  }

  function toggleCard() {
    flipped = !flipped;
    document.getElementById("study-card").classList.toggle("flipped", flipped);
    SOUNDS.flip();
    // Continuous mode is unscored -- a manual peek-ahead flip should never
    // surface the know/don't-know rating row, unlike a normal due-session.
    if (!revealed && !continuousMode) {
      revealed = true;
      document.getElementById("rating-row").style.visibility = "visible";
    }
  }

  // choice is "know" or "dontknow" (Quizlet-style) -- mapped onto the
  // underlying again/good SM-2 ratings so day-to-day scheduling still works,
  // while "dontknow" also loops the card back into THIS session's queue
  // (not just tomorrow's) so it keeps reappearing until you know it.
  var animating = false;

  function rate(choice) {
    if (continuousMode || !revealed || animating) return;
    animating = true;
    var idx = queue[qIdx];
    var key = cardKey(deck.id, idx);
    var before = boxOf(entryFor(deck.id, idx));
    var smRating = choice === "know" ? "good" : "again";
    var updated = scheduleCard(entryFor(deck.id, idx), smRating);
    progress[key] = updated;
    saveProgress(progress);
    bumpStreak();
    SOUNDS[smRating]();
    if (before !== "mastered" && boxOf(updated) === "mastered") {
      setTimeout(function () { SOUNDS.mastered(); showToast("Card mastered! 🌟"); }, 200);
    }
    if (choice === "dontknow") {
      var reinsertAt = Math.min(queue.length, qIdx + 4);
      queue.splice(reinsertAt, 0, idx);
    }

    // Card physically exits in the direction of the choice (right = know,
    // left = don't know) -- the next card then enters from the opposite
    // side, like flipping through a real swipeable deck.
    var scene = document.getElementById("study-card-scene");
    var exitClass = choice === "know" ? "exit-right" : "exit-left";
    var enterFromClass = choice === "know" ? "exit-left" : "exit-right";
    scene.classList.add(exitClass);

    setTimeout(function () {
      qIdx++;
      if (qIdx >= queue.length) {
        showToast("Deck session complete — nice work!");
        setTimeout(function () { location.href = "arcade.html"; }, 700);
        return;
      }
      // Snap to the entry position with no transition, swap in the new
      // card's content while it's off-screen, then release the transition
      // so it animates back to center -- same "no-anim snap, then animate"
      // trick as the flip fix above, just for the outer slide this time.
      scene.classList.add("no-anim");
      scene.classList.remove(exitClass);
      scene.classList.add(enterFromClass);
      void scene.offsetWidth;
      renderCard();
      requestAnimationFrame(function () {
        scene.classList.remove("no-anim");
        requestAnimationFrame(function () {
          scene.classList.remove(enterFromClass);
          animating = false;
        });
      });
    }, 300);
  }

  document.addEventListener("click", function (e) {
    if (e.target.closest("#study-card")) return toggleCard();
    var rateBtn = e.target.closest("[data-rate]");
    if (rateBtn) return rate(rateBtn.getAttribute("data-rate"));
  });

  document.addEventListener("keydown", function (e) {
    if (e.ctrlKey || e.metaKey || e.altKey) return;
    if (e.key === " " || e.key === "Enter") { e.preventDefault(); toggleCard(); }
    else if (!continuousMode && (e.key === "ArrowLeft" || e.key === "1")) rate("dontknow");
    else if (!continuousMode && (e.key === "ArrowRight" || e.key === "2")) rate("know");
  });

  window.onFCGamepadButton = function (bi) {
    if (continuousMode) { if (bi === 0) toggleCard(); return; }
    if (!revealed) { if (bi === 0) toggleCard(); }
    else { if (bi === 0) rate("know"); else if (bi === 1) rate("dontknow"); }
  };

  document.getElementById("shuffle-btn").addEventListener("click", function () {
    if (continuousMode || !queue.length) return;
    shuffleArray(queue);
    qIdx = 0;
    renderCard();
    showToast("Shuffled! 🔀");
  });

  document.getElementById("continuous-btn").addEventListener("click", function () {
    if (continuousMode) stopContinuous(); else startContinuous();
  });

  initHeader();
  if (!deck) {
    showEmpty("Deck not found.");
  } else {
    queue = getDueIndexes(deck);
    if (!queue.length) {
      dueEmptyMsg = "Nothing due in " + deck.name + " right now.";
      showEmpty(dueEmptyMsg, { offerContinuous: true });
    } else {
      document.getElementById("session-ui").style.display = "block";
      renderCard();
    }
  }
})();
</script>
</body>
</html>
