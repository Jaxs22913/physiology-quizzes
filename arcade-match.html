<!DOCTYPE html>
<html lang="en">
<head>
<script>document.documentElement.setAttribute('data-theme', localStorage.getItem('siteTheme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Match — Arcade</title>
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="arcade.css">
</head>
<body>
<svg class="edge-decor left" aria-hidden="true">
  <defs>
    <pattern id="zigzag-pattern" width="74" height="120" patternUnits="userSpaceOnUse">
      <circle cx="37" cy="15" r="10" fill="var(--accent)"/>
      <circle cx="37" cy="45" r="10" fill="var(--accent2)"/>
      <circle cx="37" cy="75" r="10" fill="var(--accent3)"/>
      <circle cx="37" cy="105" r="10" fill="var(--accent4)"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#zigzag-pattern)"/>
</svg>
<svg class="edge-decor right" aria-hidden="true">
  <rect width="100%" height="100%" fill="url(#zigzag-pattern)"/>
</svg>
<div class="page page-wide">

  <div class="brand-row">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="14" height="10" rx="2"/><rect x="7" y="4" width="14" height="10" rx="2"/></svg>
      </div>
      <div class="brand-text">
        <h1>Study Arcade</h1>
        <p>Turn studying into a game</p>
      </div>
    </div>
  </div>
  <div class="streak-pill" id="streak-pill"><span class="flame">🔥</span><b id="streak-count">0</b><span>-day streak</span></div>

  <a class="back-link" href="arcade.html">
    <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Back to decks
  </a>

  <div id="empty-container"></div>

  <div id="game-ui" style="display:none">
    <div class="match-stats">
      <div class="match-stat"><span class="num" id="match-timer">0.0s</span><span class="lbl">Time</span></div>
      <div class="match-stat"><span class="num" id="match-progress">0 / 0</span><span class="lbl">Matched</span></div>
      <div class="match-stat best"><span class="num" id="match-best">—</span><span class="lbl">Best</span></div>
    </div>
    <div class="match-columns">
      <div class="match-col" id="match-terms"><div class="match-col-label">Terms</div></div>
      <div class="match-col" id="match-defs"><div class="match-col-label">Definitions</div></div>
    </div>
    <p class="keyhint">Tap a term, then tap its matching definition (either side first) — wrong pairs just shake and try again</p>
  </div>

  <div class="view" id="view-result" style="display:none">
    <div class="result-screen">
      <div class="result-icon win" id="result-icon">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
      </div>
      <div class="result-title" id="result-title"></div>
      <div class="result-sub" id="result-sub"></div>
      <div class="deck-actions">
        <a class="btn ghost" href="arcade.html">Back to decks</a>
        <button class="btn match" id="match-again-btn">Play again</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="arcade.js"></script>
<script src="theme.js" defer></script>
<script>
(function () {
  "use strict";

  // Board stays capped at WINDOW_SIZE pairs at once -- when you clear one,
  // the next pair waiting in the pool pops in to take its place, same as
  // Notability's Mix and Match ("correct matches turn green and advance the
  // quiz with new terms") rather than dumping the whole deck on screen.
  var WINDOW_SIZE = 5;
  var deck = findDeck(deckIdFromURL());
  var pool = [], active = [], matchedCount = 0, totalPairs = 0;
  var selectedTermId = null, selectedDefIndex = null;
  var startTime = 0, timerInterval = null, locked = false;
  // Definitions are grouped by VALUE, not by pairId: some decks (e.g. an
  // organ deck where many organs are all "Retroperitoneal") have several
  // terms sharing one definition string. Rendering one tile per pairId used
  // to duplicate that string across the board, and matching by pairId
  // equality meant tapping a factually-correct-but-differently-numbered
  // duplicate was marked wrong. currentDefGroups instead holds one tile per
  // *unique* definition text among the active terms, each remembering which
  // pairIds it currently covers -- any of those terms can match against it,
  // and the tile only leaves the board once every term needing it is gone.
  var currentDefGroups = [];

  function showEmpty(msg) {
    document.getElementById("empty-container").innerHTML =
      '<div class="empty-state"><div class="big">🎉</div><p>' + msg + "</p></div>";
  }

  function buildPool(deck) {
    // matchCards (crisp term:definition pairs) is what Match is meant to
    // use -- deck.cards is the broader Study/Learn/Sprint content, which
    // reads as full questions and doesn't fit a tap-to-pair grid. Falls
    // back to deck.cards only for decks that predate the matchCards split.
    var source = deck.matchCards || deck.cards;
    var allPairs = shuffle(source.map(function (c, i) { return { pairId: i, term: c[0], def: c[1] }; }));
    totalPairs = allPairs.length;
    active = allPairs.slice(0, Math.min(WINDOW_SIZE, allPairs.length));
    pool = allPairs.slice(active.length);
  }

  function computeDefGroups() {
    var byValue = {}, order = [];
    active.forEach(function (p) {
      if (!byValue[p.def]) { byValue[p.def] = []; order.push(p.def); }
      byValue[p.def].push(p.pairId);
    });
    currentDefGroups = shuffle(order.map(function (v) { return { value: v, pairIds: byValue[v] }; }));
  }

  function renderBoard() {
    var termsEl = document.getElementById("match-terms");
    termsEl.innerHTML = '<div class="match-col-label">Terms</div>';
    shuffle(active.slice()).forEach(function (pair) {
      var btn = document.createElement("button");
      btn.className = "match-item pop-in";
      btn.setAttribute("data-pair-id", pair.pairId);
      btn.textContent = pair.term;
      termsEl.appendChild(btn);
    });

    computeDefGroups();
    var defsEl = document.getElementById("match-defs");
    defsEl.innerHTML = '<div class="match-col-label">Definitions</div>';
    currentDefGroups.forEach(function (group, idx) {
      var btn = document.createElement("button");
      btn.className = "match-item pop-in";
      btn.setAttribute("data-def-index", idx);
      btn.textContent = group.value;
      defsEl.appendChild(btn);
    });
  }

  function updateStats() {
    document.getElementById("match-progress").textContent = matchedCount + " / " + totalPairs;
    var best = getMatchBest(deck.id);
    document.getElementById("match-best").textContent = best ? formatMs(best) : "—";
  }

  function tickTimer() {
    var el = document.getElementById("match-timer");
    el.textContent = formatMs(Date.now() - startTime);
  }

  function startGame() {
    buildPool(deck);
    selectedTermId = null;
    selectedDefIndex = null;
    matchedCount = 0;
    locked = false;
    renderBoard();
    updateStats();
    document.getElementById("match-timer").textContent = "0.0s";
    startTime = Date.now();
    clearInterval(timerInterval);
    timerInterval = setInterval(tickTimer, 100);
    document.getElementById("game-ui").style.display = "block";
    document.getElementById("view-result").style.display = "none";
  }

  function termEl(pairId) { return document.querySelector('#match-terms [data-pair-id="' + pairId + '"]'); }
  function defEl(defIndex) { return document.querySelector('#match-defs [data-def-index="' + defIndex + '"]'); }

  function handleSelect(side, id) {
    if (locked) return;
    var el = side === "term" ? termEl(id) : defEl(id);
    if (!el) return;

    SOUNDS.select();
    if (side === "term") {
      if (selectedTermId != null) { var prev = termEl(selectedTermId); if (prev) prev.classList.remove("selected"); }
      selectedTermId = id;
    } else {
      if (selectedDefIndex != null) { var prevD = defEl(selectedDefIndex); if (prevD) prevD.classList.remove("selected"); }
      selectedDefIndex = id;
    }
    el.classList.add("selected");

    if (selectedTermId == null || selectedDefIndex == null) return;

    var tId = selectedTermId, dIdx = selectedDefIndex;
    selectedTermId = null;
    selectedDefIndex = null;
    var tEl = termEl(tId), dEl = defEl(dIdx);
    var termPair = active.find(function (p) { return p.pairId === tId; });
    var defGroup = currentDefGroups[dIdx];
    // A tap is correct if the tapped definition's TEXT matches this term's
    // definition -- not by pairId -- so any term sharing that definition
    // (e.g. any retroperitoneal organ) can correctly match the one shared
    // tile, instead of only the one pairId the tile happened to be built
    // from.
    var isMatch = termPair && defGroup && termPair.def === defGroup.value;

    if (isMatch) {
      // If this definition tile still covers other not-yet-matched terms,
      // it stays on the board afterward (no "matched" fade) so those terms
      // can still match against it; it only leaves once every term needing
      // it is cleared.
      var isLastForThisDef = defGroup.pairIds.length === 1;
      SOUNDS.match();
      tEl.classList.remove("selected");
      dEl.classList.remove("selected");
      tEl.classList.add("correct");
      if (isLastForThisDef) dEl.classList.add("correct");
      matchedCount++;
      updateStats();
      locked = true;
      setTimeout(function () {
        tEl.classList.add("matched");
        if (isLastForThisDef) dEl.classList.add("matched");
        setTimeout(function () {
          active = active.filter(function (p) { return p.pairId !== tId; });
          if (pool.length) active.push(pool.shift());
          locked = false;
          if (active.length === 0) {
            clearInterval(timerInterval);
            setTimeout(endGame, 300);
          } else {
            renderBoard();
          }
        }, 250);
      }, 300);
    } else {
      SOUNDS.matchWrong();
      locked = true;
      tEl.classList.add("wrong");
      dEl.classList.add("wrong");
      setTimeout(function () {
        tEl.classList.remove("selected", "wrong");
        dEl.classList.remove("selected", "wrong");
        locked = false;
      }, 500);
    }
  }

  function endGame() {
    var finalMs = Date.now() - startTime;
    var isNewBest = saveMatchBest(deck.id, finalMs);
    bumpStreak();
    document.getElementById("game-ui").style.display = "none";
    document.getElementById("view-result").style.display = "block";
    document.getElementById("result-title").textContent = "Matched in " + formatMs(finalMs) + "!";
    document.getElementById("result-sub").textContent = isNewBest ? "New best time 🌟" : "Best: " + formatMs(getMatchBest(deck.id));
    SOUNDS.win();
    burstConfetti();
  }

  document.addEventListener("click", function (e) {
    var termBtn = e.target.closest("#match-terms [data-pair-id]");
    if (termBtn) return handleSelect("term", parseInt(termBtn.getAttribute("data-pair-id"), 10));
    var defBtn = e.target.closest("#match-defs [data-def-index]");
    if (defBtn) return handleSelect("def", parseInt(defBtn.getAttribute("data-def-index"), 10));
    if (e.target.id === "match-again-btn") return startGame();
  });

  initHeader();
  if (!deck) {
    showEmpty("Deck not found.");
  } else if ((deck.matchCards || deck.cards).length < 2) {
    showEmpty("Not enough cards in " + deck.name + " to play Match.");
  } else {
    startGame();
  }
})();
</script>
</body>
</html>
