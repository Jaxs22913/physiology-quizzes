<style>
  :root{
    --ink:#161a24; --muted:#6b7280; --line:#e5e7ef; --paper:#f6f7fb; --card:#fff;
    --acc:#4f46e5; --acc2:#4338ca; --good:#16a34a; --goodbg:#eafaf0;
    --bad:#dc2626; --badbg:#fdecec; --shadow:0 1px 2px rgba(20,22,40,.05),0 10px 30px rgba(20,22,40,.06);
  }
  /* Seasonal light-mode tints (see theme.js for the date windows that add
     these body classes) -- explicitly scoped to [data-theme="light"] so
     they never fire in dark mode. */
  :root[data-theme="light"] body.vday-theme { --paper:#fbe7ee; --card:#fff8fa; --line:#f0cddb; }
  :root[data-theme="light"] body.fall-theme { --paper:#fdf1e4; --card:#fffaf3; --line:#f0dcc0; }
  :root[data-theme="light"] body.stpatricks-theme { --paper:#d7f0dd; --card:#eefaf1; --line:#a9dab8; }
  :root[data-theme="light"] body.xmas-theme { --paper:#faf3e3; --card:#fffdf7; --line:#ece0c4; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);
    font:400 16px/1.6 ui-sans-serif,"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;
    padding:24px 16px 92px;}
  .wrap{max-width:520px;margin:0 auto}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:28px 26px}
  h1{font-size:22px;margin:0 0 4px;text-align:center;display:flex;align-items:center;justify-content:center;gap:8px}
  .h1-icon{width:22px;height:22px;flex:none;color:var(--acc)}
  .sub{color:var(--muted);font-size:14px;margin:0 0 22px;text-align:center}
  input[type=text]{font:700 20px/1 ui-monospace,Menlo,monospace;letter-spacing:.12em;text-transform:uppercase;
    width:100%;padding:14px;border-radius:10px;border:1.5px solid var(--line);background:var(--paper);color:var(--ink);
    text-align:center;margin-bottom:14px}
  input#nickname-input{font:600 16px/1 ui-sans-serif;letter-spacing:normal;text-transform:none}
  .btn{appearance:none;border:0;cursor:pointer;font:700 15px/1 ui-sans-serif;border-radius:12px;
    padding:14px 24px;background:var(--acc);color:#fff;transition:background .15s;width:100%}
  .btn:hover{background:var(--acc2)}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .btn.sec{background:#eceef6;color:var(--ink)}
  .btn.sec:hover{background:#dfe2f0}
  .btn.choice-btn{background:var(--card);color:var(--ink);border:1.5px solid var(--line);text-align:left;
    padding:16px 18px;font-size:15px;font-weight:600;margin-bottom:10px}
  .btn.choice-btn:hover{border-color:var(--acc)}
  .btn.choice-btn.picked{border-color:var(--acc);background:#eef0fd}
  .btn.choice-btn.correct{border-color:var(--good);background:var(--goodbg)}
  .btn.choice-btn.wrong{border-color:var(--bad);background:var(--badbg)}
  .btn.choice-btn:disabled{opacity:1;cursor:default}
  .hidden{display:none!important}
  .err{color:var(--bad);font-size:13.5px;text-align:center;margin:-6px 0 14px;min-height:1em}
  .waiting{text-align:center;color:var(--muted);padding:30px 0}
  .waiting .big{font-size:40px;margin-bottom:10px}
  .qnum{font:700 12px/1 ui-sans-serif;letter-spacing:.1em;text-transform:uppercase;color:var(--acc);margin-bottom:10px;text-align:center}
  .qtext{font:700 18px/1.4 ui-sans-serif;margin:0 0 20px;text-align:center}
  .timer{font:800 34px/1 ui-monospace,monospace;text-align:center;margin:0 0 16px;color:var(--acc)}
  .timer.low{color:var(--bad)}
  .feedback{text-align:center;padding:14px 0}
  .feedback .big{font-size:44px;margin-bottom:8px}
  .feedback .pts{font-weight:800;color:var(--acc);font-size:20px}
  .reveal-explain{background:var(--paper);border:1px solid var(--line);border-radius:12px;
    padding:14px 16px;margin-top:14px;font-size:14.5px;line-height:1.55;color:var(--ink);text-align:left}
  .reveal-explain .re-label{display:block;font:700 11px/1 ui-sans-serif;letter-spacing:.08em;
    text-transform:uppercase;color:var(--good);margin-bottom:6px}
  .reveal-explain .re-cite{display:block;margin-top:10px;font-size:12.5px;color:var(--muted);font-style:italic}
  .myrank{text-align:center;color:var(--muted);font-size:14px;margin-top:6px}
  .lb-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-radius:10px;margin-bottom:6px;background:var(--paper);border:1px solid var(--line)}
  .lb-row.me{border-color:var(--acc);background:#eef0fd}
  .lb-row .rank{font-weight:800;color:var(--muted);width:28px}
  .lb-row .name{flex:1;font-weight:600}
  .lb-row .score{font-weight:800;color:var(--acc)}
  .lb-row.away{opacity:.55}
  .lb-row .left-tag{color:var(--bad);font-weight:700;font-size:11.5px;margin-left:6px}
  .footer-mark-ink { stroke: #1f2937; }
  .footer-mark-accent { stroke: #2563eb; }
  @media (prefers-color-scheme: dark) {
    .footer-mark-ink { stroke: #e5e7eb; }
    .footer-mark-accent { stroke: #60a5fa; }
  }
  .back-link{display:inline-flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13.5px;font-weight:600;margin-bottom:16px}
  .back-link:hover{color:var(--acc)}
  .avatar-label{font-size:13px;font-weight:600;color:var(--muted);margin:0 0 8px}
  .avatar-picker{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:16px}
  .avatar-opt{appearance:none;font-size:24px;line-height:1;padding:9px 0;border-radius:10px;
    border:2px solid var(--line);background:var(--paper);cursor:pointer;text-align:center;filter:grayscale(60%);opacity:.75}
  .avatar-opt:hover{border-color:var(--acc);filter:grayscale(0%);opacity:1}
  .avatar-opt.selected{border-color:var(--acc);background:#eef0fd;filter:grayscale(0%);opacity:1}
  .podium{display:flex;align-items:flex-end;justify-content:center;gap:10px;margin:6px 0 26px;min-height:170px}
  .podium-slot{display:flex;flex-direction:column;align-items:center;width:30%;max-width:110px}
  .podium-avatar{font-size:32px;margin-bottom:4px}
  .podium-medal{font-size:19px;margin-bottom:2px}
  .podium-name{font-weight:700;font-size:12.5px;text-align:center;margin-bottom:3px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .podium-score{font-size:11.5px;color:var(--muted);margin-bottom:6px;font-weight:700}
  .podium-riser{width:100%;border-radius:10px 10px 0 0}
  .podium-riser.first{height:110px;background:linear-gradient(180deg,#f5c344,#d89e1f)}
  .podium-riser.second{height:80px;background:linear-gradient(180deg,#b8c0cc,#8f99a8)}
  .podium-riser.third{height:58px;background:linear-gradient(180deg,#dba36a,#b97b41)}
</style>

<div class="wrap" style="padding-bottom:40px">
  <a href="index.html" class="back-link">← Back to home</a>
  <header style="margin-bottom:18px">
    <h1><svg class="h1-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h4M8 10v4M15 11h.01M18 13h.01"/></svg> Group Study</h1>
    <p class="sub">Enter the room code your host gave you.</p>
  </header>

  <section id="join-form" class="card">
    <input type="text" id="code-input" maxlength="5" placeholder="CODE" autocomplete="off" autocapitalize="characters">
    <input type="text" id="nickname-input" maxlength="24" placeholder="Your nickname" autocomplete="off">
    <p class="avatar-label">Pick an avatar</p>
    <div class="avatar-picker" id="avatar-picker"></div>
    <p class="err" id="join-err"></p>
    <button class="btn" id="join-btn" disabled>Connecting…</button>
    <p style="text-align:center;font-size:13.5px;color:var(--muted);margin:16px 0 0">
      Want to host instead? <a href="group-host.html" style="color:var(--acc);font-weight:600">Create a room →</a>
    </p>
  </section>

  <section id="lobby-wait" class="card hidden">
    <div class="waiting">
      <div class="big">⏳</div>
      <div id="lobby-quiz-title" style="font-weight:700;margin-bottom:4px"></div>
      Waiting for the host to start the game…
    </div>
  </section>

  <section id="question-screen" class="card hidden">
    <div class="qnum" id="q-num"></div>
    <div class="timer hidden" id="timer-display">20</div>
    <div class="qtext" id="q-text"></div>
    <div id="q-choices"></div>
  </section>

  <section id="answered-wait" class="card hidden">
    <div class="waiting">
      <div class="big">✅</div>
      Answer locked in! Waiting for everyone else…
    </div>
  </section>

  <section id="reveal-screen" class="card hidden">
    <div class="feedback" id="feedback-box"></div>
    <div class="myrank" id="my-rank"></div>
    <h3 style="font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:22px 0 10px">Leaderboard</h3>
    <div id="reveal-leaderboard"></div>
  </section>

  <section id="finished-screen" class="card hidden">
    <h2 style="margin-top:0;text-align:center">🏁 Final results</h2>
    <div class="podium" id="podium"></div>
    <div id="final-leaderboard"></div>
    <button class="btn sec" id="join-another-btn" style="margin-top:18px">Join a different game</button>
  </section>
</div>

<script>
(function () {
  var roomCode = null, currentQuiz = null, myUid = null;
  var latestPlayers = [];
  var lastRoomState = null;
  var answeredIndex = -1;
  var questionStartedAtMs = null;
  var timerInterval = null;
  var unsubRoom = null, unsubPlayers = null;

  function $(id) { return document.getElementById(id); }
  function show(id) { $(id).classList.remove("hidden"); }
  function hide(id) { $(id).classList.add("hidden"); }
  function hideAllScreens() {
    ["join-form","lobby-wait","question-screen","answered-wait","reveal-screen","finished-screen"].forEach(hide);
  }

  var params = new URLSearchParams(location.search);
  if (params.get("code")) $("code-input").value = params.get("code").toUpperCase();

  $("code-input").addEventListener("input", function () {
    this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
  });

  function playSound(name) { if (window.playSiteSound) window.playSiteSound(name); }

  var AVATAR_OPTIONS = ["🦊","🐻","🐼","🐨","🦁","🐯","🐰","🐸","🐵","🐺","🦉","🐢","🐙","🦈","🐳","🦋"];
  var selectedAvatar = AVATAR_OPTIONS[Math.floor(Math.random() * AVATAR_OPTIONS.length)];
  function renderAvatarPicker() {
    var box = $("avatar-picker");
    box.innerHTML = "";
    AVATAR_OPTIONS.forEach(function (a) {
      var btn = document.createElement("button");
      btn.type = "button";
      btn.className = "avatar-opt" + (a === selectedAvatar ? " selected" : "");
      btn.textContent = a;
      btn.addEventListener("click", function () {
        selectedAvatar = a;
        playSound("select");
        renderAvatarPicker();
      });
      box.appendChild(btn);
    });
  }
  renderAvatarPicker();

  function waitForGroupStudy(cb) {
    if (window.GroupStudy && window.GroupStudy.whenReady) { cb(); return; }
    if (window.GroupStudy && window.GroupStudy.unavailable) { $("join-err").textContent = window.GroupStudy.unavailable; return; }
    setTimeout(function () { waitForGroupStudy(cb); }, 150);
  }

  waitForGroupStudy(function () {
    GroupStudy.whenReady().then(function (uid) {
      myUid = uid;
      $("join-btn").disabled = false;
      $("join-btn").textContent = "Join game →";
      tryResumeJoinSession();
    });
  });

  // Same reload-recovery concern as group-host.html -- see that file's
  // comment. sessionStorage, not localStorage: this is current-tab-only
  // recovery, not something that should follow a player to another device.
  var JOIN_SESSION_KEY = "gsJoinSession";

  var HEARTBEAT_MS = 10000;
  var STALE_MS = 25000;
  var heartbeatInterval = null;

  // Mobile browsers throttle/suspend setInterval timers on a backgrounded
  // tab (screen lock, switching apps mid-game) far more aggressively than
  // desktop -- so the routine 10s heartbeat can stall well past STALE_MS,
  // and the host keeps showing this player as "left" for longer than the
  // player is actually gone even after they've switched back. Firing one
  // heartbeat immediately on tab-foreground (rather than waiting for the
  // next throttled interval tick) closes that gap instead of relying on
  // the interval alone to notice the tab is active again.
  document.addEventListener("visibilitychange", function () {
    if (document.visibilityState === "visible" && roomCode) GroupStudy.heartbeat(roomCode);
  });
  function isPlayerAway(p) {
    var seenMs = (p.lastSeen && p.lastSeen.toMillis) ? p.lastSeen.toMillis()
      : (p.joinedAt && p.joinedAt.toMillis) ? p.joinedAt.toMillis() : Date.now();
    return (Date.now() - seenMs) > STALE_MS;
  }

  var staleCheckInterval = null;
  function refreshLeaderboardPresence() {
    if (!lastRoomState) return;
    if (lastRoomState.status === "reveal") renderLeaderboard("reveal-leaderboard", latestPlayers);
    if (lastRoomState.status === "finished") renderLeaderboard("final-leaderboard", latestPlayers, 3);
  }

  function enterRoom(code, quizId, uid) {
    roomCode = code;
    myUid = uid;
    currentQuiz = window.GROUP_QUIZZES[quizId];
    hideAllScreens();
    sessionStorage.setItem(JOIN_SESSION_KEY, JSON.stringify({ code: code }));
    if (heartbeatInterval) clearInterval(heartbeatInterval);
    heartbeatInterval = setInterval(function () { GroupStudy.heartbeat(roomCode); }, HEARTBEAT_MS);
    if (staleCheckInterval) clearInterval(staleCheckInterval);
    staleCheckInterval = setInterval(refreshLeaderboardPresence, 5000);
    if (unsubRoom) unsubRoom();
    if (unsubPlayers) unsubPlayers();
    unsubRoom = GroupStudy.listenRoom(roomCode, onRoomUpdate);
    unsubPlayers = GroupStudy.listenPlayers(roomCode, function (players) {
      latestPlayers = players;
      if (lastRoomState) {
        if (lastRoomState.status === "reveal") renderLeaderboard("reveal-leaderboard", latestPlayers);
        if (lastRoomState.status === "finished") {
          renderPodium("podium", latestPlayers);
          renderLeaderboard("final-leaderboard", latestPlayers, 3);
        }
      }
    });
  }

  function tryResumeJoinSession() {
    var raw = sessionStorage.getItem(JOIN_SESSION_KEY);
    if (!raw) return;
    var saved = null;
    try { saved = JSON.parse(raw); } catch (e) { /* fall through to cleanup below */ }
    if (!saved || !saved.code) { sessionStorage.removeItem(JOIN_SESSION_KEY); return; }

    var uid = GroupStudy.currentUid();
    GroupStudy.getRoom(saved.code).then(function (room) {
      if (!room) { sessionStorage.removeItem(JOIN_SESSION_KEY); return; }
      return GroupStudy.getPlayer(saved.code, uid).then(function (player) {
        if (!player) { sessionStorage.removeItem(JOIN_SESSION_KEY); return; }
        // Seed answeredIndex from the player's real Firestore answers (not
        // just defaulting to -1) so a reload right after answering doesn't
        // briefly re-show the choice buttons for a question already locked
        // in. Also pre-set lastRoomState so onRoomUpdate's first snapshot
        // (which will report this same currentQuestionIndex) doesn't see a
        // "question changed" transition and stomp the seeded value back to -1.
        if (player.answers && player.answers[room.currentQuestionIndex] != null) {
          answeredIndex = room.currentQuestionIndex;
        }
        lastRoomState = room;
        enterRoom(saved.code, room.quizId, uid);
      });
    }).catch(function () {
      sessionStorage.removeItem(JOIN_SESSION_KEY);
    });
  }

  $("join-btn").addEventListener("click", function () {
    var code = $("code-input").value.trim();
    var nickname = $("nickname-input").value.trim();
    $("join-err").textContent = "";
    if (code.length !== 5) { $("join-err").textContent = "Room codes are 5 characters."; return; }
    if (!nickname) { $("join-err").textContent = "Enter a nickname."; return; }

    $("join-btn").disabled = true;
    $("join-btn").textContent = "Joining…";
    GroupStudy.joinRoom(code, nickname, selectedAvatar).then(function (result) {
      playSound("join");
      enterRoom(code, result.room.quizId, result.uid);
    }).catch(function (err) {
      $("join-err").textContent = (err && err.message) || "Couldn't join that room.";
      $("join-btn").disabled = false;
      $("join-btn").textContent = "Join game →";
    });
  });

  function stopTimer() {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  }

  function onRoomUpdate(room) {
    var questionChanged = !lastRoomState || lastRoomState.currentQuestionIndex !== room.currentQuestionIndex;
    lastRoomState = room;
    if (!currentQuiz) currentQuiz = window.GROUP_QUIZZES[room.quizId];

    if (room.status === "lobby") {
      hideAllScreens();
      show("lobby-wait");
      $("lobby-quiz-title").textContent = currentQuiz ? currentQuiz.title : "";
    } else if (room.status === "question") {
      if (questionChanged) answeredIndex = -1;
      renderQuestionScreen(room);
    } else if (room.status === "reveal") {
      renderRevealScreen(room);
    } else if (room.status === "finished") {
      renderFinishedScreen();
    } else if (room.status === "closed") {
      handleRoomClosed();
    }
  }

  // Fires for every player (and a host's own second join-as-player tab, if
  // any -- see group-host.html's hostplayhint) the moment the host hits
  // Close room. Tears down this room's listeners/timers and drops back to
  // the plain join-form screen -- same destination as join-another-btn --
  // rather than leaving players staring at a game that will never advance.
  function handleRoomClosed() {
    stopTimer();
    if (heartbeatInterval) { clearInterval(heartbeatInterval); heartbeatInterval = null; }
    if (staleCheckInterval) { clearInterval(staleCheckInterval); staleCheckInterval = null; }
    if (unsubRoom) { unsubRoom(); unsubRoom = null; }
    if (unsubPlayers) { unsubPlayers(); unsubPlayers = null; }
    sessionStorage.removeItem(JOIN_SESSION_KEY);
    hideAllScreens();
    show("join-form");
    $("code-input").value = "";
    $("join-err").textContent = "The host closed this room.";
    $("join-btn").disabled = false;
    $("join-btn").textContent = "Join game →";
  }

  function renderQuestionScreen(room) {
    stopTimer();
    hideAllScreens();
    var q = currentQuiz.questions[GroupStudy.resolveQuestionIndex(room, room.currentQuestionIndex)];

    if (answeredIndex === room.currentQuestionIndex) {
      show("answered-wait");
      return;
    }

    show("question-screen");
    $("q-num").textContent = "Question " + (room.currentQuestionIndex + 1) + " of " + currentQuiz.questions.length;
    $("q-text").textContent = q.q;
    var box = $("q-choices");
    box.innerHTML = "";
    var startedAtMs = room.currentQuestionStartedAt ? room.currentQuestionStartedAt.toMillis() : Date.now();

    q.choices.forEach(function (c, i) {
      var btn = document.createElement("button");
      btn.className = "btn choice-btn";
      btn.textContent = c;
      btn.addEventListener("click", function () {
        if (answeredIndex === room.currentQuestionIndex) return;
        answeredIndex = room.currentQuestionIndex;
        Array.prototype.forEach.call(box.children, function (b) { b.disabled = true; });
        btn.classList.add("picked");
        var elapsed = Date.now() - startedAtMs;
        GroupStudy.submitAnswer(roomCode, room.currentQuestionIndex, i, q.answer, room.timedMode, elapsed, room.secondsPerQuestion)
          .then(function () {
            hide("question-screen");
            show("answered-wait");
          })
          .catch(function (err) {
            console.warn("Group Study: submit answer failed", err);
            hide("question-screen");
            show("answered-wait");
          });
      });
      box.appendChild(btn);
    });

    if (room.timedMode && room.currentQuestionStartedAt) {
      show("timer-display");
      questionStartedAtMs = startedAtMs;
      timerInterval = setInterval(function () {
        var remain = room.secondsPerQuestion - Math.floor((Date.now() - questionStartedAtMs) / 1000);
        if (remain <= 0) { $("timer-display").textContent = "0"; stopTimer(); return; }
        $("timer-display").textContent = remain;
        $("timer-display").classList.toggle("low", remain <= 5);
      }, 250);
    } else {
      hide("timer-display");
    }
  }

  var soundedRevealIndex = -1;
  function renderRevealScreen(room) {
    stopTimer();
    hideAllScreens();
    show("reveal-screen");
    var q = currentQuiz.questions[GroupStudy.resolveQuestionIndex(room, room.currentQuestionIndex)];
    var me = latestPlayers.filter(function (p) { return p.uid === myUid; })[0];
    var myAnswer = me && me.answers ? me.answers[room.currentQuestionIndex] : null;

    if (soundedRevealIndex !== room.currentQuestionIndex) {
      soundedRevealIndex = room.currentQuestionIndex;
      if (myAnswer) playSound(myAnswer.correct ? "correct" : "wrong");
    }

    var box = $("feedback-box");
    if (myAnswer) {
      box.innerHTML = myAnswer.correct
        ? '<div class="big">🎉</div><div>Correct!</div><div class="pts">+' + myAnswer.points + ' points</div>'
        : '<div class="big">❌</div><div>Not quite — correct answer: <b></b></div>';
      var bEl = box.querySelector("b");
      if (bEl) bEl.textContent = q.choices[q.answer];
    } else {
      box.innerHTML = '<div class="big">⌛</div><div>Time’s up — no answer submitted.</div>';
    }
    // Same "why" + source citation shown on the site's regular quizzes after
    // answering -- exp/cite come straight from group-questions.js (ported
    // from each quiz's own question bank), not written separately for
    // Group Study, so it stays consistent with the solo-quiz experience.
    if (q.exp) {
      var explainEl = document.createElement("div");
      explainEl.className = "reveal-explain";
      explainEl.innerHTML = '<span class="re-label">Why</span><span></span>' +
        (q.cite ? '<span class="re-cite"></span>' : '');
      explainEl.querySelectorAll("span")[1].textContent = q.exp;
      if (q.cite) explainEl.querySelector(".re-cite").textContent = "Source: " + q.cite;
      box.appendChild(explainEl);
    }

    var sorted = latestPlayers.slice().sort(function (a, b) { return (b.score || 0) - (a.score || 0); });
    var myRankIdx = sorted.findIndex(function (p) { return p.uid === myUid; });
    $("my-rank").textContent = myRankIdx >= 0 ? ("You're #" + (myRankIdx + 1) + " of " + sorted.length + " · " + (sorted[myRankIdx].score || 0) + " pts") : "";

    renderLeaderboard("reveal-leaderboard", latestPlayers);
  }

  var podiumSounded = false;
  function renderFinishedScreen() {
    stopTimer();
    hideAllScreens();
    show("finished-screen");
    if (!podiumSounded) { podiumSounded = true; playSound("podium"); }
    renderPodium("podium", latestPlayers);
    renderLeaderboard("final-leaderboard", latestPlayers, 3);
  }

  $("join-another-btn").addEventListener("click", function () {
    sessionStorage.removeItem(JOIN_SESSION_KEY);
    location.reload();
  });

  function renderPodium(containerId, players) {
    var box = $(containerId);
    if (!box) return;
    box.innerHTML = "";
    var sorted = players.slice().sort(function (a, b) { return (b.score || 0) - (a.score || 0); });
    var top3 = sorted.slice(0, 3);
    var order = [top3[1], top3[0], top3[2]];
    var classes = ["second", "first", "third"];
    var medals = ["🥈", "🥇", "🥉"];
    order.forEach(function (p, i) {
      if (!p) { box.appendChild(document.createElement("div")).className = "podium-slot"; return; }
      var slot = document.createElement("div");
      slot.className = "podium-slot";
      slot.innerHTML =
        '<div class="podium-avatar"></div>' +
        '<div class="podium-medal">' + medals[i] + '</div>' +
        '<div class="podium-name"></div>' +
        '<div class="podium-score"></div>' +
        '<div class="podium-riser ' + classes[i] + '"></div>';
      slot.querySelector(".podium-avatar").textContent = p.avatar || "🦊";
      slot.querySelector(".podium-name").textContent = p.nickname + (p.uid === myUid ? " (you)" : "");
      slot.querySelector(".podium-score").textContent = (p.score || 0) + " pts";
      box.appendChild(slot);
    });
  }

  function renderLeaderboard(containerId, players, startIndex) {
    startIndex = startIndex || 0;
    var box = $(containerId);
    box.innerHTML = "";
    var sorted = players.slice().sort(function (a, b) { return (b.score || 0) - (a.score || 0); }).slice(startIndex);
    sorted.forEach(function (p, i) {
      var away = p.uid !== myUid && isPlayerAway(p);
      var row = document.createElement("div");
      row.className = "lb-row" + (p.uid === myUid ? " me" : "") + (away ? " away" : "");
      row.innerHTML =
        '<span class="rank">#' + (startIndex + i + 1) + '</span>' +
        '<span class="name">' + (p.avatar || "🦊") + ' <span></span>' + (away ? '<span class="left-tag">left</span>' : '') + '</span>' +
        '<span class="score">' + (p.score || 0) + '</span>';
      row.querySelector(".name span").textContent = p.nickname + (p.uid === myUid ? " (you)" : "");
      box.appendChild(row);
    });
  }
})();
</script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () { navigator.serviceWorker.register("sw.js").catch(function(){}); });
  }
</script>
</body>
</html>
