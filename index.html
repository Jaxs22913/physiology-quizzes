<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Class Quizzes</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; }
    h1 { margin-bottom: 20px; }
    .tabs { display: flex; gap: 8px; border-bottom: 2px solid #ddd; margin-bottom: 20px; }
    .tab-btn {
      background: none; border: none; padding: 10px 16px; font-size: 16px;
      cursor: pointer; border-bottom: 3px solid transparent; color: #555;
    }
    .tab-btn.active { border-bottom-color: #2563eb; color: #2563eb; font-weight: bold; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    ul { padding-left: 20px; }
    li { margin: 6px 0; }
    a { color: #2563eb; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Class Quizzes</h1>

  <div class="tabs">
    <button class="tab-btn active" data-tab="physio">Physiology</button>
    <button class="tab-btn" data-tab="anatomy">Anatomy</button>
  </div>

  <div class="tab-panel active" id="physio" data-class="physio">
    <ul>
      <li><a href="hemostasis-quiz.html">Hemostasis Quiz</a></li>
    </ul>
  </div>

  <div class="tab-panel" id="anatomy" data-class="anatomy">
    <ul>
      <li><em>No quizzes yet.</em></li>
    </ul>
  </div>

  <script>
    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById(btn.dataset.tab).classList.add("active");
      });
    });
  </script>
</body>
</html>
