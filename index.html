<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Class Quizzes</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; }
    h1 { margin-bottom: 20px; }
    .tabs { display: flex; gap: 8px; border-bottom: 2px solid #ddd; margin-bottom: 20px; }
    .tab-btn {
      background: none; border: none; padding: 10px 16px; font-size: 16px;
      cursor: pointer; border-bottom: 3px solid transparent; color: #555;
    }
    .tab-btn.active { border-bottom-color: #2563eb; color: #2563eb; font-weight: bold; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .subtabs { display: flex; gap: 6px; border-bottom: 1px solid #eee; margin-bottom: 16px; }
    .subtab-btn {
      background: none; border: none; padding: 6px 12px; font-size: 14px;
      cursor: pointer; border-bottom: 2px solid transparent; color: #777;
    }
    .subtab-btn.active { border-bottom-color: #16a34a; color: #16a34a; font-weight: bold; }
    .subtab-panel { display: none; }
    .subtab-panel.active { display: block; }

    ul { padding-left: 20px; }
    li { margin: 6px 0; }
    a { color: #2563eb; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Class Quizzes</h1>

  <div class="tabs">
    <button class="tab-btn active" data-tab="physio">Physiology</button>
    <button class="tab-btn" data-tab="pharmacodynamics">Pharmacodynamics</button>
  </div>

  <div class="tab-panel active" id="physio" data-class="physio">
    <div class="subtabs">
      <button class="subtab-btn active" data-subtab="physio-exam3">Exam 3</button>
    </div>
    <div class="subtab-panel active" id="physio-exam3">
      <ul>
        <li><a href="hemostasis-quiz.html">Hemostasis Quiz</a></li>
      </ul>
    </div>
  </div>

  <div class="tab-panel" id="pharmacodynamics" data-class="pharmacodynamics">
    <div class="subtabs">
      <button class="subtab-btn active" data-subtab="pharm-exam2">Exam 2</button>
    </div>
    <div class="subtab-panel active" id="pharm-exam2">
      <ul>
        <li><a href="pharmacodynamics-quiz-1.html">Pharmacodynamics Quiz 1</a></li>
        <li><a href="pharmacodynamics-quiz-2.html">Pharmacodynamics Quiz 2</a></li>
        <li><a href="pharmacodynamics-quiz-3.html">Pharmacodynamics Quiz 3</a></li>
      </ul>
    </div>
  </div>

  <script>
    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById(btn.dataset.tab).classList.add("active");
      });
    });

    document.querySelectorAll(".tab-panel").forEach(panel => {
      const subtabBtns = panel.querySelectorAll(".subtab-btn");
      subtabBtns.forEach(btn => {
        btn.addEventListener("click", () => {
          subtabBtns.forEach(b => b.classList.remove("active"));
          panel.querySelectorAll(".subtab-panel").forEach(p => p.classList.remove("active"));
          btn.classList.add("active");
          document.getElementById(btn.dataset.subtab).classList.add("active");
        });
      });
    });
  </script>
</body>
</html>
