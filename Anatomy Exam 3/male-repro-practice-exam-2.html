const LT=['A','B','C','D'];
let i=0, answered=[], picked=[], correct=0;
const app=document.getElementById('app');
const prog=document.getElementById('prog');
const counter=document.getElementById('counter');
const scoretrack=document.getElementById('scoretrack');

function render(){
  const q=QUIZ[i];
  prog.style.width=((i)/QUIZ.length*100)+'%';
  counter.textContent='Question '+(i+1)+' of '+QUIZ.length;
  scoretrack.textContent='Score: '+correct+'/'+answered.filter(a=>a!==undefined).length;
  const done=answered[i]!==undefined;
  let html='<div class="card">';
  html+='<div class="sectag">'+q.section+'</div>';
  html+='<div class="qnum">Q'+q.n+'</div>';
  html+='<div class="stem">'+q.stem+'</div>';
  html+='<ul class="opts">';
  q.options.forEach((o,idx)=>{
    let cls='opt';
    if(done){
      if(idx===q.answer) cls+=' correct';
      else if(idx===picked[i]) cls+=' wrong';
      else cls+=' dim';
    }
    let mark='';
    if(done && idx===q.answer) mark='<span class="mark">✓</span>';
    else if(done && idx===picked[i]) mark='<span class="mark">✕</span>';
    html+='<li><button class="'+cls+'" '+(done?'disabled':'')+' onclick="choose('+idx+')">'
      +'<span class="lt">'+LT[idx]+'</span><span>'+o+'</span>'+mark+'</button></li>';
  });
  html+='</ul>';
  if(done){
    const right=picked[i]===q.answer;
    html+='<div class="fb show '+(right?'right':'wrong')+'">'
      +'<div class="head">'+(right?'Correct':'Incorrect — answer: '+LT[q.answer])+'</div>'
      +'<div>'+q.rationale+'</div></div>';
  }
  html+='<div class="nav">';
  html+='<button class="btn ghost" onclick="prev()" '+(i===0?'disabled':'')+'>Back</button>';
  if(i<QUIZ.length-1)
    html+='<button class="btn primary" onclick="next()" '+(done?'':'disabled')+'>Next</button>';
  else
    html+='<button class="btn primary" onclick="finish()" '+(done?'':'disabled')+'>See Results</button>';
  html+='</div></div>';
  app.innerHTML=html;
  window.scrollTo({top:0,behavior:'smooth'});
}
function choose(idx){
  if(answered[i]!==undefined) return;
  picked[i]=idx; answered[i]=true;
  if(idx===QUIZ[i].answer) correct++;
  render();
}
function next(){ if(i<QUIZ.length-1){i++;render();} }
function prev(){ if(i>0){i--;render();} }
function finish(){
  prog.style.width='100%';
  counter.textContent='Complete';
  const total=QUIZ.length;
  const pct=Math.round(correct/total*100);
  let html='<div class="card result">';
  html+='<div class="score">'+correct+'/'+total+'</div>';
  html+='<div class="pct">'+pct+'% correct</div>';
  html+='<button class="btn primary" style="max-width:220px;margin:0 auto;" onclick="restart()">Restart Quiz</button>';
  const wrong=QUIZ.map((q,idx)=>({q,idx})).filter(o=>picked[o.idx]!==o.q.answer);
  if(wrong.length){
    html+='<div class="review"><h3>Review missed ('+wrong.length+')</h3>';
    wrong.forEach(o=>{
      html+='<div class="ritem"><div class="rq">Q'+o.q.n+'. '+o.q.stem+'</div>'
        +'<div class="ra">Your answer: '+(picked[o.idx]!==undefined?LT[picked[o.idx]]:'—')
        +' · Correct: <b>'+LT[o.q.answer]+'. '+o.q.options[o.q.answer]+'</b><br>'+o.q.rationale+'</div></div>';
    });
    html+='</div>';
  } else {
    html+='<div class="review"><h3>Perfect score — every question correct.</h3></div>';
  }
  html+='</div>';
  scoretrack.textContent='';
  app.innerHTML=html;
  window.scrollTo({top:0,behavior:'smooth'});
}
function restart(){ i=0;answered=[];picked=[];correct=0;render(); }
render();
</script>
