<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<style>
:root{
  --accent:#7c3aed; --accent-soft:#ede9fe; --accent-dark:#5b21b6;
  --correct:#059669; --correct-soft:#d1fae5;
  --wrong:#dc2626; --wrong-soft:#fee2e2;
  --ink:#1f2328; --muted:#57606a; --line:#e2e4e8; --bg:#faf9fb; --card:#ffffff;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:Georgia,'Times New Roman',serif;line-height:1.55;}
.wrap{max-width:760px;margin:0 auto;padding:24px 18px 80px;}
header{text-align:center;margin-bottom:22px;}
h1{font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif;
  font-size:1.5rem;margin:0 0 4px;color:var(--accent-dark);letter-spacing:-.01em;}
.sub{font-family:ui-sans-serif,system-ui,sans-serif;color:var(--muted);font-size:.9rem;}
.bar{height:6px;background:var(--line);border-radius:99px;overflow:hidden;margin:18px 0 6px;}
.bar>i{display:block;height:100%;background:var(--accent);width:0;transition:width .3s ease;}
.meta{display:flex;justify-content:space-between;font-family:ui-sans-serif,system-ui,sans-serif;
  font-size:.78rem;color:var(--muted);margin-bottom:20px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:22px 22px 18px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.section-tag{display:inline-block;font-family:ui-sans-serif,system-ui,sans-serif;
  font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;
  color:var(--accent-dark);background:var(--accent-soft);padding:4px 10px;border-radius:99px;margin-bottom:12px;}
.qnum{font-family:ui-sans-serif,system-ui,sans-serif;font-size:.78rem;color:var(--muted);font-weight:600;}
.qtext{font-size:1.12rem;margin:6px 0 18px;line-height:1.45;}
.opt{display:flex;align-items:flex-start;gap:12px;width:100%;text-align:left;
  background:#fff;border:1.5px solid var(--line);border-radius:10px;
  padding:13px 15px;margin-bottom:10px;cursor:pointer;font-family:inherit;font-size:1rem;
  color:var(--ink);transition:border-color .15s,background .15s;}
.opt:hover:not(:disabled){border-color:var(--accent);background:#fcfbff;}
.opt:disabled{cursor:default;}
.opt .letter{font-family:ui-sans-serif,system-ui,sans-serif;font-weight:700;font-size:.85rem;
  min-width:22px;height:22px;display:flex;align-items:center;justify-content:center;
  border-radius:6px;background:var(--accent-soft);color:var(--accent-dark);flex-shrink:0;margin-top:1px;}
.opt.correct{border-color:var(--correct);background:var(--correct-soft);}
.opt.correct .letter{background:var(--correct);color:#fff;}
.opt.wrong{border-color:var(--wrong);background:var(--wrong-soft);}
.opt.wrong .letter{background:var(--wrong);color:#fff;}
.feedback{margin-top:6px;padding:14px 16px;border-radius:10px;font-size:.96rem;
  display:none;border-left:4px solid var(--accent);background:#f7f5fc;}
.feedback.show{display:block;}
.feedback .fh{font-family:ui-sans-serif,system-ui,sans-serif;font-weight:700;font-size:.82rem;
  text-transform:uppercase;letter-spacing:.03em;margin-bottom:5px;}
.feedback.ok{border-left-color:var(--correct);background:var(--correct-soft);}
.feedback.ok .fh{color:var(--correct);}
.feedback.no{border-left-color:var(--wrong);background:var(--wrong-soft);}
.feedback.no .fh{color:var(--wrong);}
.nav{display:flex;justify-content:space-between;gap:12px;margin-top:20px;}
button.nav-btn{font-family:ui-sans-serif,system-ui,sans-serif;font-size:.95rem;font-weight:600;
  padding:11px 24px;border-radius:10px;border:1.5px solid var(--accent);cursor:pointer;
  background:var(--accent);color:#fff;transition:opacity .15s;}
button.nav-btn.ghost{background:#fff;color:var(--accent-dark);}
button.nav-btn:disabled{opacity:.4;cursor:not-allowed;}
.results{text-align:center;padding:20px;}
.score{font-family:ui-sans-serif,system-ui,sans-serif;font-size:3rem;font-weight:800;color:var(--accent-dark);}
.results h2{font-family:ui-sans-serif,system-ui,sans-serif;}
.review-item{text-align:left;border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:10px;background:#fff;}
.review-item .rq{font-weight:600;margin-bottom:6px;}
.review-item .ra{font-size:.9rem;font-family:ui-sans-serif,system-ui,sans-serif;}
.ra .yours{color:var(--wrong);}
.ra .right{color:var(--correct);}
.small{font-family:ui-sans-serif,system-ui,sans-serif;font-size:.82rem;color:var(--muted);}
</style>
</head>

const QUESTIONS = [{"n": 1, "q": "Which structure is considered a primary endocrine organ?", "o": [{"t": "Stomach", "c": false}, {"t": "Pituitary gland", "c": true}, {"t": "Small intestine", "c": false}, {"t": "Liver", "c": false}], "r": "The pituitary is a primary endocrine organ.", "s": "I — General Endocrine Anatomy"}, {"n": 2, "q": "Which organ has endocrine functions but is not primarily classified as an endocrine gland?", "o": [{"t": "Thyroid gland", "c": false}, {"t": "Parathyroid gland", "c": false}, {"t": "Heart", "c": true}, {"t": "Pituitary gland", "c": false}], "r": "The heart has endocrine functions but is not primarily an endocrine gland.", "s": "I — General Endocrine Anatomy"}, {"n": 3, "q": "Which hormone is produced by adipose tissue?", "o": [{"t": "Calcitonin", "c": false}, {"t": "Leptin", "c": true}, {"t": "Aldosterone", "c": false}, {"t": "Oxytocin", "c": false}], "r": "Adipose tissue produces leptin.", "s": "I — General Endocrine Anatomy"}, {"n": 4, "q": "The kidney performs an endocrine function by producing", "o": [{"t": "prolactin and growth hormone", "c": false}, {"t": "calcitriol and erythropoietin", "c": true}, {"t": "insulin and glucagon", "c": false}, {"t": "cortisol and aldosterone", "c": false}], "r": "The kidney produces erythropoietin and calcitriol.", "s": "I — General Endocrine Anatomy"}, {"n": 5, "q": "The endocrine system differs from an exocrine system because endocrine glands", "o": [{"t": "release products through ducts", "c": false}, {"t": "release hormones into the bloodstream", "c": true}, {"t": "contain only nervous tissue", "c": false}, {"t": "secrete only steroid hormones", "c": false}], "r": "Endocrine glands release hormones into blood rather than through ducts.", "s": "I — General Endocrine Anatomy"}, {"n": 6, "q": "Which organ produces atrial natriuretic peptide?", "o": [{"t": "Adrenal gland", "c": false}, {"t": "Heart", "c": true}, {"t": "Kidney", "c": false}, {"t": "Thyroid gland", "c": false}], "r": "The heart produces ANP.", "s": "I — General Endocrine Anatomy"}, {"n": 7, "q": "Which organ produces melatonin?", "o": [{"t": "Pineal gland", "c": true}, {"t": "Pituitary gland", "c": false}, {"t": "Pancreas", "c": false}, {"t": "Thymus", "c": false}], "r": "The pineal gland produces melatonin.", "s": "I — General Endocrine Anatomy"}, {"n": 8, "q": "Which structure produces thymosins?", "o": [{"t": "Thyroid", "c": false}, {"t": "Thymus", "c": true}, {"t": "Hypothalamus", "c": false}, {"t": "Adrenal cortex", "c": false}], "r": "The thymus produces thymosins.", "s": "I — General Endocrine Anatomy"}, {"n": 9, "q": "The pituitary gland is also called the", "o": [{"t": "epiphysis", "c": false}, {"t": "hypophysis", "c": true}, {"t": "thymus", "c": false}, {"t": "neurocranium", "c": false}], "r": "Pituitary gland = hypophysis.", "s": "II — Hypothalamus and Pituitary Gland"}, {"n": 10, "q": "The pituitary gland is attached to the hypothalamus by the", "o": [{"t": "fornix", "c": false}, {"t": "optic tract", "c": false}, {"t": "infundibulum", "c": true}, {"t": "corpus callosum", "c": false}], "r": "The infundibulum connects the pituitary to the hypothalamus.", "s": "II — Hypothalamus and Pituitary Gland"}, {"n": 11, "q": "The pituitary gland lies within the", "o": [{"t": "cribriform plate", "c": false}, {"t": "hypophyseal fossa", "c": true}, {"t": "jugular foramen", "c": false}, {"t": "foramen magnum", "c": false}], "r": "The pituitary occupies the hypophyseal fossa.", "s": "II — Hypothalamus and Pituitary Gland"}, {"n": 12, "q": "The hypophyseal fossa is located within the", "o": [{"t": "ethmoid bone", "c": false}, {"t": "temporal bone", "c": false}, {"t": "sphenoid bone", "c": true}, {"t": "occipital bone", "c": false}], "r": "The sella turcica is part of the sphenoid bone.", "s": "II — Hypothalamus and Pituitary Gland"}, {"n": 13, "q": "Which structure lies directly superior to the pituitary gland?", "o": [{"t": "Sphenoid sinus", "c": false}, {"t": "Optic chiasm", "c": true}, {"t": "Dorsum sellae", "c": false}, {"t": "Nasopharynx", "c": false}], "r": "The optic chiasm lies superior to the pituitary.", "s": "II — Hypothalamus and Pituitary Gland"}, {"n": 14, "q": "Which structure lies inferior and anterior to the pituitary gland?", "o": [{"t": "Sphenoid sinus", "c": true}, {"t": "Cavernous sinus", "c": false}, {"t": "Optic tract", "c": false}, {"t": "Third ventricle", "c": false}], "r": "The sphenoid sinus lies inferior and anterior to the pituitary.", "s": "II — Hypothalamus and Pituitary Gland"}, {"n": 15, "q": "The pituitary gland is related laterally to the", "o": [{"t": "sagittal sinuses", "c": false}, {"t": "cavernous sinuses", "c": true}, {"t": "transverse sinuses", "c": false}, {"t": "sigmoid sinuses", "c": false}], "r": "The cavernous sinuses lie lateral to the pituitary.", "s": "II — Hypothalamus and Pituitary Gland"}, {"n": 16, "q": "The structure located posterior to the pituitary gland is the", "o": [{"t": "crista galli", "c": false}, {"t": "dorsum sellae", "c": true}, {"t": "clivus only", "c": false}, {"t": "optic chiasm", "c": false}], "r": "The dorsum sellae lies posterior to the gland.", "s": "II — Hypothalamus and Pituitary Gland"}, {"n": 17, "q": "The dural structure covering the superior aspect of the pituitary is the", "o": [{"t": "falx cerebri", "c": false}, {"t": "tentorium cerebelli", "c": false}, {"t": "diaphragma sellae", "c": true}, {"t": "falx cerebelli", "c": false}], "r": "The diaphragma sellae covers the gland superiorly.", "s": "II — Hypothalamus and Pituitary Gland"}, {"n": 18, "q": "The diaphragma sellae is pierced by the", "o": [{"t": "optic nerve", "c": false}, {"t": "internal carotid artery", "c": false}, {"t": "infundibulum", "c": true}, {"t": "oculomotor nerve", "c": false}], "r": "The infundibulum pierces the diaphragma sellae.", "s": "II — Hypothalamus and Pituitary Gland"}, {"n": 19, "q": "A pituitary mass growing superiorly is most likely to compress the", "o": [{"t": "vagus nerve", "c": false}, {"t": "optic chiasm", "c": true}, {"t": "facial nerve", "c": false}, {"t": "olfactory bulb", "c": false}], "r": "Superior growth may compress the optic chiasm.", "s": "II — Hypothalamus and Pituitary Gland"}, {"n": 20, "q": "Compression of the optic chiasm by a pituitary tumor classically produces", "o": [{"t": "monocular blindness", "c": false}, {"t": "bitemporal hemianopia", "c": true}, {"t": "left homonymous hemianopia", "c": false}, {"t": "central scotoma only", "c": false}], "r": "Optic chiasm compression causes bitemporal hemianopia.", "s": "II — Hypothalamus and Pituitary Gland"}, {"n": 21, "q": "A pituitary mass extending laterally may involve the", "o": [{"t": "cavernous sinus", "c": true}, {"t": "frontal sinus", "c": false}, {"t": "superior sagittal sinus", "c": false}, {"t": "straight sinus", "c": false}], "r": "Lateral extension may enter the cavernous sinus.", "s": "II — Hypothalamus and Pituitary Gland"}, {"n": 22, "q": "Which structure is part of the adenohypophysis?", "o": [{"t": "Pars nervosa", "c": false}, {"t": "Infundibulum", "c": false}, {"t": "Pars distalis", "c": true}, {"t": "Hypothalamo-hypophyseal tract", "c": false}], "r": "Pars distalis belongs to the adenohypophysis.", "s": "II — Hypothalamus and Pituitary Gland"}, {"n": 23, "q": "Which structure is part of the neurohypophysis?", "o": [{"t": "Pars distalis", "c": false}, {"t": "Pars tuberalis", "c": false}, {"t": "Pars intermedia", "c": false}, {"t": "Pars nervosa", "c": true}], "r": "Pars nervosa belongs to the neurohypophysis.", "s": "II — Hypothalamus and Pituitary Gland"}, {"n": 24, "q": "The adenohypophysis includes all of the following except", "o": [{"t": "pars distalis", "c": false}, {"t": "pars tuberalis", "c": false}, {"t": "pars intermedia", "c": false}, {"t": "pars nervosa", "c": true}], "r": "Pars nervosa is not part of the adenohypophysis.", "s": "II — Hypothalamus and Pituitary Gland"}, {"n": 25, "q": "The posterior pituitary is connected to the hypothalamus by the", "o": [{"t": "mammillothalamic tract", "c": false}, {"t": "infundibulum", "c": true}, {"t": "optic radiation", "c": false}, {"t": "fornix", "c": false}], "r": "The posterior lobe connects through the infundibulum.", "s": "II — Hypothalamus and Pituitary Gland"}, {"n": 26, "q": "Which hormones are synthesized in the hypothalamus and released from the posterior pituitary?", "o": [{"t": "TSH and ACTH", "c": false}, {"t": "GH and prolactin", "c": false}, {"t": "ADH and oxytocin", "c": true}, {"t": "FSH and LH", "c": false}], "r": "ADH and oxytocin are made in the hypothalamus and released posteriorly.", "s": "II — Hypothalamus and Pituitary Gland"}, {"n": 27, "q": "The anterior pituitary receives blood mainly through the", "o": [{"t": "systemic venous system only", "c": false}, {"t": "hypophyseal portal system", "c": true}, {"t": "cerebral aqueduct", "c": false}, {"t": "superior sagittal sinus", "c": false}], "r": "The anterior pituitary receives portal blood.", "s": "II — Hypothalamus and Pituitary Gland"}, {"n": 28, "q": "The posterior pituitary receives primarily", "o": [{"t": "portal venous blood", "c": false}, {"t": "lymphatic blood", "c": false}, {"t": "direct arterial blood", "c": true}, {"t": "blood from the internal jugular vein", "c": false}], "r": "The posterior pituitary receives direct arterial blood.", "s": "II — Hypothalamus and Pituitary Gland"}, {"n": 29, "q": "The primary capillary plexus of the hypophyseal portal system is associated with the", "o": [{"t": "median eminence", "c": true}, {"t": "pars nervosa", "c": false}, {"t": "sphenoid sinus", "c": false}, {"t": "cavernous sinus", "c": false}], "r": "The primary capillary plexus is at the median eminence.", "s": "II — Hypothalamus and Pituitary Gland"}, {"n": 30, "q": "The hypophyseal portal vessels carry regulatory hormones from the hypothalamus to the", "o": [{"t": "posterior pituitary", "c": false}, {"t": "anterior pituitary", "c": true}, {"t": "thyroid gland", "c": false}, {"t": "adrenal medulla", "c": false}], "r": "Portal veins carry regulatory hormones to the anterior pituitary.", "s": "II — Hypothalamus and Pituitary Gland"}, {"n": 31, "q": "Which artery is most closely associated with the primary capillary plexus supplying the anterior pituitary?", "o": [{"t": "Inferior thyroid artery", "c": false}, {"t": "Superior hypophyseal artery", "c": true}, {"t": "Middle cerebral artery", "c": false}, {"t": "Posterior communicating artery", "c": false}], "r": "The superior hypophyseal artery supplies the portal system.", "s": "II — Hypothalamus and Pituitary Gland"}, {"n": 32, "q": "Which artery primarily supplies the posterior pituitary?", "o": [{"t": "Inferior hypophyseal artery", "c": true}, {"t": "Superior thyroid artery", "c": false}, {"t": "Superior cerebellar artery", "c": false}, {"t": "Anterior spinal artery", "c": false}], "r": "The inferior hypophyseal artery mainly supplies the posterior lobe.", "s": "II — Hypothalamus and Pituitary Gland"}, {"n": 33, "q": "Which anterior pituitary cell produces growth hormone?", "o": [{"t": "Thyrotrope", "c": false}, {"t": "Gonadotrope", "c": false}, {"t": "Somatotrope", "c": true}, {"t": "Corticotrope", "c": false}], "r": "Somatotropes produce GH.", "s": "II — Hypothalamus and Pituitary Gland"}, {"n": 34, "q": "Which anterior pituitary cell produces prolactin?", "o": [{"t": "Lactotrope", "c": true}, {"t": "Thyrotrope", "c": false}, {"t": "Corticotrope", "c": false}, {"t": "Gonadotrope", "c": false}], "r": "Lactotropes produce prolactin.", "s": "II — Hypothalamus and Pituitary Gland"}, {"n": 35, "q": "Which cells produce FSH and LH?", "o": [{"t": "Somatotropes", "c": false}, {"t": "Gonadotropes", "c": true}, {"t": "Lactotropes", "c": false}, {"t": "Pituicytes", "c": false}], "r": "Gonadotropes produce FSH and LH.", "s": "II — Hypothalamus and Pituitary Gland"}, {"n": 36, "q": "Which cell produces TSH?", "o": [{"t": "Thyrotrope", "c": true}, {"t": "Somatotrope", "c": false}, {"t": "Chromaffin cell", "c": false}, {"t": "Chief cell", "c": false}], "r": "Thyrotropes produce TSH.", "s": "II — Hypothalamus and Pituitary Gland"}, {"n": 37, "q": "ACTH is released primarily by", "o": [{"t": "corticotropes", "c": true}, {"t": "lactotropes", "c": false}, {"t": "somatotropes", "c": false}, {"t": "thyrotropes", "c": false}], "r": "Corticotropes release ACTH.", "s": "II — Hypothalamus and Pituitary Gland"}, {"n": 38, "q": "Chromophobes are characterized by", "o": [{"t": "abundant secretory granules", "c": false}, {"t": "no visible cytoplasmic granules", "c": true}, {"t": "storage of colloid", "c": false}, {"t": "production of calcitonin", "c": false}], "r": "Chromophobes lack visible cytoplasmic granules.", "s": "III — Pituitary Histology"}, {"n": 39, "q": "Acidophils of the anterior pituitary produce", "o": [{"t": "GH and prolactin", "c": true}, {"t": "TSH and ACTH", "c": false}, {"t": "FSH and LH only", "c": false}, {"t": "ADH and oxytocin", "c": false}], "r": "Acidophils produce GH and prolactin.", "s": "III — Pituitary Histology"}, {"n": 40, "q": "Basophils of the anterior pituitary produce all of the following except", "o": [{"t": "TSH", "c": false}, {"t": "ACTH", "c": false}, {"t": "FSH", "c": false}, {"t": "GH", "c": true}], "r": "GH is produced by acidophils, not basophils.", "s": "III — Pituitary Histology"}, {"n": 41, "q": "Which structure is characteristic of the posterior pituitary?", "o": [{"t": "Thyroid follicles", "c": false}, {"t": "Herring bodies", "c": true}, {"t": "Pancreatic acini", "c": false}, {"t": "Adrenal glomeruli", "c": false}], "r": "Herring bodies are found in the posterior pituitary.", "s": "III — Pituitary Histology"}, {"n": 42, "q": "Pituicytes are", "o": [{"t": "endocrine cells of the anterior pituitary", "c": false}, {"t": "supporting glial cells of the posterior pituitary", "c": true}, {"t": "thyroid follicular cells", "c": false}, {"t": "adrenal cortical cells", "c": false}], "r": "Pituicytes are supporting glial cells.", "s": "III — Pituitary Histology"}, {"n": 43, "q" e glucagon.", "s": "VIII — Pancreatic Histology"}, {"n": 115, "q": "Delta cells produce", "o": [{"t": "somatostatin", "c": true}, {"t": "cortisol", "c": false}, {"t": "thyroxine", "c": false}, {"t": "prolactin", "c": false}], "r": "Delta cells produce somatostatin.", "s": "VIII — Pancreatic Histology"}, {"n": 116, "q": "F cells produce", "o": [{"t": "pancreatic polypeptide", "c": true}, {"t": "growth hormone", "c": false}, {"t": "calcitriol", "c": false}, {"t": "epinephrine", "c": false}], "r": "F cells produce pancreatic polypeptide.", "s": "VIII — Pancreatic Histology"}, {"n": 117, "q": "Pancreatic islets are highly vascularized and contain", "o": [{"t": "continuous capillaries only", "c": false}, {"t": "fenestrated capillaries", "c": true}, {"t": "no capillaries", "c": false}, {"t": "lymphatic sinusoids only", "c": false}], "r": "Endocrine islets contain fenestrated capillaries.", "s": "VIII — Pancreatic Histology"}, {"n": 118, "q": "The adrenal glands are also called", "o": [{"t": "pararenal glands", "c": false}, {"t": "suprarenal glands", "c": true}, {"t": "hypophyseal glands", "c": false}, {"t": "pineal glands", "c": false}], "r": "Adrenal glands are also called suprarenal glands.", "s": "IX — Adrenal Glands"}, {"n": 119, "q": "The adrenal glands lie", "o": [{"t": "inferior to the kidneys", "c": false}, {"t": "on the superior poles of the kidneys", "c": true}, {"t": "inside the renal pelvis", "c": false}, {"t": "anterior to the bladder", "c": false}], "r": "They sit on the superior poles of the kidneys.", "s": "IX — Adrenal Glands"}, {"n": 120, "q": "The right adrenal gland is typically", "o": [{"t": "semilunar", "c": false}, {"t": "pyramidal", "c": true}, {"t": "spherical", "c": false}, {"t": "bilobed", "c": false}], "r": "The right adrenal gland is pyramidal.", "s": "IX — Adrenal Glands"}, {"n": 121, "q": "The left adrenal gland is typically", "o": [{"t": "pyramidal", "c": false}, {"t": "semilunar", "c": true}, {"t": "triangular only", "c": false}, {"t": "cuboidal", "c": false}], "r": "The left adrenal gland is semilunar.", "s": "IX — Adrenal Glands"}, {"n": 122, "q": "The right adrenal gland is related anteriorly to the", "o": [{"t": "liver and IVC", "c": true}, {"t": "stomach and pancreas", "c": false}, {"t": "spleen and jejunum", "c": false}, {"t": "descending colon only", "c": false}], "r": "The right gland is anteriorly related to the liver and IVC.", "s": "IX — Adrenal Glands"}, {"n": 123, "q": "The left adrenal gland is related anteriorly to the", "o": [{"t": "liver and IVC", "c": false}, {"t": "stomach and pancreas", "c": true}, {"t": "duodenum and gallbladder", "c": false}, {"t": "cecum and appendix", "c": false}], "r": "The left gland is anteriorly related to the stomach and pancreas.", "s": "IX — Adrenal Glands"}, {"n": 124, "q": "Both adrenal glands are related posteriorly to the", "o": [{"t": "diaphragm", "c": true}, {"t": "stomach", "c": false}, {"t": "pancreas", "c": false}, {"t": "liver only", "c": false}], "r": "Both are posteriorly related to the diaphragm.", "s": "IX — Adrenal Glands"}, {"n": 125, "q": "The inferior relation of each adrenal gland is the", "o": [{"t": "thyroid gland", "c": false}, {"t": "kidney", "c": true}, {"t": "spleen", "c": false}, {"t": "duodenum", "c": false}], "r": "Each adrenal gland rests superior to a kidney.", "s": "IX — Adrenal Glands"}, {"n": 126, "q": "The superior suprarenal arteries arise from the", "o": [{"t": "inferior phrenic arteries", "c": true}, {"t": "renal arteries", "c": false}, {"t": "abdominal aorta directly", "c": false}, {"t": "celiac trunk", "c": false}], "r": "Superior suprarenal arteries arise from inferior phrenic arteries.", "s": "IX — Adrenal Glands"}, {"n": 127, "q": "The middle suprarenal arteries arise directly from the", "o": [{"t": "abdominal aorta", "c": true}, {"t": "renal arteries", "c": false}, {"t": "inferior phrenic arteries", "c": false}, {"t": "superior mesenteric artery", "c": false}], "r": "Middle suprarenal arteries arise directly from the aorta.", "s": "IX — Adrenal Glands"}, {"n": 128, "q": "The inferior suprarenal arteries arise from the", "o": [{"t": "renal arteries", "c": true}, {"t": "splenic artery", "c": false}, {"t": "common hepatic artery", "c": false}, {"t": "inferior mesenteric artery", "c": false}], "r": "Inferior suprarenal arteries arise from renal arteries.", "s": "IX — Adrenal Glands"}, {"n": 129, "q": "The right suprarenal vein drains directly into the", "o": [{"t": "left renal vein", "c": false}, {"t": "inferior vena cava", "c": true}, {"t": "portal vein", "c": false}, {"t": "splenic vein", "c": false}], "r": "The right suprarenal vein drains directly to the IVC.", "s": "IX — Adrenal Glands"}, {"n": 130, "q": "The left suprarenal vein drains primarily into the", "o": [{"t": "inferior vena cava directly", "c": false}, {"t": "left renal vein", "c": true}, {"t": "portal vein", "c": false}, {"t": "azygos vein", "c": false}], "r": "The left suprarenal vein drains to the left renal vein.", "s": "IX — Adrenal Glands"}, {"n": 131, "q": "Which adrenal gland generally has a shorter vein?", "o": [{"t": "Left", "c": false}, {"t": "Right", "c": true}, {"t": "Both are equal", "c": false}, {"t": "Neither has a vein", "c": false}], "r": "The right suprarenal vein is shorter.", "s": "IX — Adrenal Glands"}, {"n": 132, "q": "The adrenal gland is divided into", "o": [{"t": "follicles and colloid", "c": false}, {"t": "cortex and medulla", "c": true}, {"t": "anterior and posterior lobes", "c": false}, {"t": "acini and islets", "c": false}], "r": "The gland has cortex and medulla.", "s": "X — Adrenal Histology"}, {"n": 133, "q": "The outermost adrenal cortical zone is the", "o": [{"t": "zona reticularis", "c": false}, {"t": "zona fasciculata", "c": false}, {"t": "zona glomerulosa", "c": true}, {"t": "medulla", "c": false}], "r": "Zona glomerulosa is the outermost cortical layer.", "s": "X — Adrenal Histology"}, {"n": 134, "q": "The middle adrenal cortical zone is the", "o": [{"t": "zona glomerulosa", "c": false}, {"t": "zona fasciculata", "c": true}, {"t": "zona reticularis", "c": false}, {"t": "pars distalis", "c": false}], "r": "Zona fasciculata is the middle cortical layer.", "s": "X — Adrenal Histology"}, {"n": 135, "q": "The innermost cortical zone is the", "o": [{"t": "zona reticularis", "c": true}, {"t": "zona fasciculata", "c": false}, {"t": "zona glomerulosa", "c": false}, {"t": "medulla", "c": false}], "r": "Zona reticularis is the innermost cortical layer.", "s": "X — Adrenal Histology"}, {"n": 136, "q": "The zona glomerulosa produces primarily", "o": [{"t": "mineralocorticoids", "c": true}, {"t": "glucocorticoids", "c": false}, {"t": "catecholamines", "c": false}, {"t": "thyroid hormones", "c": false}], "r": "Zona glomerulosa produces mineralocorticoids.", "s": "X — Adrenal Histology"}, {"n": 137, "q": "The zona fasciculata produces primarily", "o": [{"t": "aldosterone", "c": false}, {"t": "cortisol", "c": true}, {"t": "epinephrine", "c": false}, {"t": "calcitonin", "c": false}], "r": "Zona fasciculata produces cortisol.", "s": "X — Adrenal Histology"}, {"n": 138, "q": "The zona reticularis produces primarily", "o": [{"t": "androgens", "c": true}, {"t": "insulin", "c": false}, {"t": "catecholamines", "c": false}, {"t": "PTH", "c": false}], "r": "Zona reticularis produces androgens.", "s": "X — Adrenal Histology"}, {"n": 139, "q": "Cells of the zona fasciculata are arranged mainly in", "o": [{"t": "spherical follicles", "c": false}, {"t": "radial columns", "c": true}, {"t": "isolated islets", "c": false}, {"t": "nerve bundles", "c": false}], "r": "Fasciculata cells form radial columns.", "s": "X — Adrenal Histology"}, {"n": 140, "q": "The principal cells of the adrenal medulla are", "o": [{"t": "chief cells", "c": false}, {"t": "chromaffin cells", "c": true}, {"t": "follicular cells", "c": false}, {"t": "pituicytes", "c": false}], "r": "Chromaffin cells are the main adrenal medullary cells.", "s": "X — Adrenal Histology"}, {"n": 141, "q": "Chromaffin cells are functionally comparable to modified", "o": [{"t": "preganglionic parasympathetic neurons", "c": false}, {"t": "postganglionic sympathetic neurons", "c": true}, {"t": "somatic motor neurons", "c": false}, {"t": "sensory neurons", "c": false}], "r": "Chromaffin cells resemble modified postganglionic sympathetic neurons.", "s": "X — Adrenal Histology"}, {"n": 142, "q": "The adrenal medulla secretes primarily", "o": [{"t": "aldosterone and cortisol", "c": false}, {"t": "epinephrine and norepinephrine", "c": true}, {"t": "insulin and glucagon", "c": false}, {"t": "TSH and ACTH", "c": false}], "r": "The medulla secretes epinephrine and norepinephrine.", "s": "X — Adrenal Histology"}, {"n": 143, "q": "A prominent histologic feature of the adrenal medulla is a", "o": [{"t": "central vein", "c": true}, {"t": "central colloid-filled follicle", "c": false}, {"t": "pancreatic duct", "c": false}, {"t": "portal triad", "c": false}], "r": "A large central vein is characteristic of the medulla.", "s": "X — Adrenal Histology"}, {"n": 144, "q": "Which endocrine organ contains follicles filled with colloid?", "o": [{"t": "Pituitary", "c": false}, {"t": "Thyroid", "c": true}, {"t": "Parathyroid", "c": false}, {"t": "Adrenal", "c": false}], "r": "The thyroid contains colloid-filled follicles.", "s": "XI — Compare and Contrast"}, {"n": 145, "q": "Which endocrine organ contains chief and oxyphil cells?", "o": [{"t": "Thyroid", "c": false}, {"t": "Parathyroid", "c": true}, {"t": "Pancreas", "c": false}, {"t": "Pituitary", "c": false}], "r": "Parathyroids contain chief and oxyphil cells.", "s": "XI — Compare and Contrast"}, {"n": 146, "q": "Which organ contains both endocrine islets and exocrine acini?", "o": [{"t": "Pituitary", "c": false}, {"t": "Pancreas", "c": true}, {"t": "Adrenal gland", "c": false}, {"t": "Thyroid gland", "c": false}], "r": "The pancreas has endocrine islets and exocrine acini.", "s": "XI — Compare and Contrast"}, {"n": 147, "q": "Which gland contains acidophils, basophils, and chromophobes?", "o": [{"t": "Anterior pituitary", "c": true}, {"t": "Thyroid", "c": false}, {"t": "Parathyroid", "c": false}, {"t": "Adrenal cortex", "c": false}], "r": "The anterior pituitary contains acidophils, basophils, and chromophobes.", "s": "XI — Compare and Contrast"}, {"n": 148, "q": "Which gland contains pituicytes and Herring bodies?", "o": [{"t": "Adenohypophysis", "c": false}, {"t": "Neurohypophysis", "c": true}, {"t": "Thyroid", "c": false}, {"t": "Parathyroid", "c": false}], "r": "The neurohypophysis contains pituicytes and Herring bodies.", "s": "XI — Compare and Contrast"}, {"n": 149, "q": "Which endocrine organ lies within the sella turcica?", "o": [{"t": "Pineal gland", "c": false}, {"t": "Pituitary gland", "c": true}, {"t": "Thyroid gland", "c": false}, {"t": "Adrenal gland", "c": false}], "r": "The pituitary lies in the sella turcica.", "s": "XI — Compare and Contrast"}, {"n": 150, "q": "Which endocrine organs are located on the posterior aspect of another endocrine gland?", "o": [{"t": "Adrenal glands", "c": false}, {"t": "Parathyroid glands", "c": true}, {"t": "Pancreatic islets", "c": false}, {"t": "Pituitary lobes", "c": false}], "r": "Parathyroids sit on the posterior surface of the thyroid.", "s": "XI — Compare and Contrast"}, {"n": 151, "q": "During ligation of the superior thyroid artery, which nerve is most at risk?", "o": [{"t": "Recurrent laryngeal nerve", "c": false}, {"t": "External laryngeal nerve", "c": true}, {"t": "Phrenic nerve", "c": false}, {"t": "Hypoglossal nerve", "c": false}], "r": "The external laryngeal nerve is at risk near the superior thyroid artery.", "s": "XII — Clinical and Anatomical Application"}, {"n": 152, "q": "During ligation of the inferior thyroid artery, which nerve is especially at risk?", "o": [{"t": "External laryngeal nerve", "c": false}, {"t": "Recurrent laryngeal nerve", "c": true}, {"t": "Facial nerve", "c": false}, {"t": "Glossopharyngeal nerve", "c": false}], "r": "The recurrent laryngeal nerve is at risk near the inferior thyroid artery.", "s": "XII — Clinical and Anatomical Application"}, {"n": 153, "q": "A patient develops hoarseness after thyroid surgery. Injury to which nerve is most likely?", "o": [{"t": "Optic nerve", "c": false}, {"t": "Recurrent laryngeal nerve", "c": true}, {"t": "Phrenic nerve", "c": false}, {"t": "Greater auricular nerve", "c": false}], "r": "Recurrent laryngeal nerve damage commonly causes hoarseness.", "s": "XII — Clinical and Anatomical Application"}, {"n": 154, "q": "A mass in the head of the pancreas causes jaundice because it compresses the", "o": [{"t": "common bile duct", "c": true}, {"t": "splenic artery", "c": false}, {"t": "inferior vena cava", "c": false}, {"t": "left renal vein", "c": false}], "r": "Pancreatic head tumors may compress the common bile duct.", "s": "XII — Clinical and Anatomical Application"}, {"n": 155, "q": "A surgeon removing the right adrenal gland must be especially careful because its short vein drains directly into the", "o": [{"t": "portal vein", "c": false}, {"t": "inferior vena cava", "c": true}, {"t": "left renal vein", "c": false}, {"t": "splenic vein", "c": false}], "r": "The right suprarenal vein drains directly to the IVC.", "s": "XII — Clinical and Anatomical Application"}, {"n": 156, "q": "A lesion of the posterior pituitary may impair release of", "o": [{"t": "ACTH", "c": false}, {"t": "TSH", "c": false}, {"t": "ADH", "c": true}, {"t": "GH", "c": false}], "r": "The posterior pituitary releases ADH.", "s": "XII — Clinical and Anatomical Application"}, {"n": 157, "q": "A pituitary tumor extending inferiorly could enter the", "o": [{"t": "sphenoid sinus", "c": true}, {"t": "maxillary sinus", "c": false}, {"t": "frontal sinus", "c": false}, {"t": "mastoid air cells", "c": false}], "r": "Inferior growth may enter the sphenoid sinus.", "s": "XII — Clinical and Anatomical Application"}, {"n": 158, "q": "A lesion involving the cavernous sinus adjacent to the pituitary could affect the", "o": [{"t": "internal carotid artery and multiple cranial nerves", "c": true}, {"t": "vertebral artery only", "c": false}, {"t": "optic nerve only", "c": false}, {"t": "facial artery and vein", "c": false}], "r": "The cavernous sinus contains the internal carotid artery and several cranial nerves.", "s": "XII — Clinical and Anatomical Application"}, {"n": 159, "q": "Accidental removal of all parathyroid tissue during thyroidectomy would most directly affect secretion of", "o": [{"t": "calcitonin", "c": false}, {"t": "PTH", "c": true}, {"t": "TSH", "c": false}, {"t": "ACTH", "c": false}], "r": "Parathyroid removal reduces PTH secretion.", "s": "XII — Clinical and Anatomical Application"}, {"n": 160, "q": "A histology slide shows pale-staining clusters surrounded by darker pancreatic acini. The pale clusters are most likely", "o": [{"t": "adrenal cortical zones", "c": false}, {"t": "pancreatic islets", "c": true}, {"t": "thyroid follicles", "c": false}, {"t": "pituitary basophils", "c": false}], "r": "Pale clusters among darker acini are pancreatic islets.", "s": "XII — Clinical and Anatomical Application"}];
const LETTERS=["A","B","C","D"];
let idx=0, answered={}, chosen={}, score=0;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
// Pre-shuffle option order once per session, stored on the question object
QUESTIONS.forEach(q=>{ if(!q._order){ q._order=shuffle([0,1,2,3]); } });

const app=document.getElementById("app");
const prog=document.getElementById("prog");
const counter=document.getElementById("counter");
const scoreLive=document.getElementById("scoreLive");

function render(){
  const q=QUESTIONS[idx];
  const order=q._order;
  prog.style.width=((idx)/QUESTIONS.length*100)+"%";
  counter.textContent="Question "+(idx+1)+" of "+QUESTIONS.length;
  scoreLive.textContent="Score: "+score+"/"+Object.keys(answered).length;
  const isAns=answered[q.n]!==undefined;

  let opts="";
  order.forEach((origIdx,pos)=>{
    const o=q.o[origIdx];
    let cls="opt";
    if(isAns){
      if(o.c) cls+=" correct";
      else if(chosen[q.n]===origIdx) cls+=" wrong";
    }
    opts+=`<button class="${cls}" ${isAns?"disabled":""} onclick="pick(${q.n},${origIdx})">
      <span class="letter">${LETTERS[pos]}</span><span>${o.t}</span></button>`;
  });

  const correct = isAns && q.o[chosen[q.n]].c;
  const fb = isAns ? `<div class="feedback show ${correct?'ok':'no'}">
      <div class="fh">${correct?'Correct':'Incorrect'}</div>${q.r}</div>` : "";

  app.innerHTML=`<div class="card">
    <span class="section-tag">Section ${q.s}</span>
    <div class="qnum">Q${q.n}</div>
    <div class="qtext">${q.q}</div>
    ${opts}
    ${fb}
    <div class="nav">
      <button class="nav-btn ghost" onclick="go(-1)" ${idx===0?"disabled":""}>← Back</button>
      <button class="nav-btn" onclick="go(1)">${idx===QUESTIONS.length-1?"Finish":"Next →"}</button>
    </div>
  </div>`;
}

function pick(n,origIdx){
  if(answered[n]!==undefined) return;
  const q=QUESTIONS.find(x=>x.n===n);
  answered[n]=true; chosen[n]=origIdx;
  if(q.o[origIdx].c) score++;
  render();
}

function go(dir){
  if(dir===1 && idx===QUESTIONS.length-1){ results(); return; }
  idx=Math.max(0,Math.min(QUESTIONS.length-1,idx+dir));
  render();
}

function results(){
  prog.style.width="100%";
  const total=QUESTIONS.length;
  const pct=Math.round(score/total*100);
  counter.textContent="Complete"; scoreLive.textContent="";
  const missed=QUESTIONS.filter(q=>answered[q.n]!==undefined && !q.o[chosen[q.n]].c);
  const unanswered=QUESTIONS.filter(q=>answered[q.n]===undefined);
  let reviewHtml="";
  if(missed.length){
    reviewHtml+='<h3 class="small" style="text-align:left;margin-top:26px;">Missed questions ('+missed.length+')</h3>';
    missed.forEach(q=>{
      const yours=q.o[chosen[q.n]].t;
      const right=q.o.find(o=>o.c).t;
      reviewHtml+=`<div class="review-item">
        <div class="rq">Q${q.n}. ${q.q}</div>
        <div class="ra"><span class="yours">Your answer: ${yours}</span><br>
        <span class="right">Correct: ${right}</span><br>
        <span style="color:var(--muted)">${q.r}</span></div></div>`;
    });
  }
  app.innerHTML=`<div class="card results">
    <div class="score">${pct}%</div>
    <h2>${score} / ${total} correct</h2>
    <p class="small">${unanswered.length?unanswered.length+" left unanswered · ":""}${missed.length} missed</p>
    <div class="nav" style="justify-content:center;">
      <button class="nav-btn ghost" onclick="restart()">↻ Retake (reshuffle)</button>
      <button class="nav-btn" onclick="idx=0;render();">Review all</button>
    </div>
    ${reviewHtml}
  </div>`;
}

function restart(){
  idx=0;answered={};chosen={};score=0;
  QUESTIONS.forEach(q=>{q._order=shuffle([0,1,2,3]);});
  render();
}
render();
</script>
