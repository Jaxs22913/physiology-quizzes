const QUESTIONS = [{"id": 1, "section": "Section I — Topographic Anatomy and Perineum", "question": "In a midsagittal view of the female pelvis, which structure lies immediately posterior to the pubic symphysis?", "options": {"A": "Vagina", "B": "Uterus", "C": "Rectum", "D": "Urinary bladder"}, "answer": "D", "rationale": "The bladder lies immediately posterior to the pubic symphysis."}, {"id": 2, "section": "Section I — Topographic Anatomy and Perineum", "question": "The uterus normally lies", "options": {"A": "anterior to the bladder and posterior to the rectum", "B": "posterior to the rectum", "C": "posterior to the bladder and anterior to the rectum", "D": "inferior to the vagina"}, "answer": "C", "rationale": "Uterus: posterior to bladder, anterior to rectum."}, {"id": 3, "section": "Section I — Topographic Anatomy and Perineum", "question": "The vagina lies", "options": {"A": "superior to the uterus", "B": "anterior to the urethra and posterior to the rectum", "C": "anterior to the bladder", "D": "posterior to the urethra and anterior to the rectum"}, "answer": "D", "rationale": "Vagina: posterior to urethra, anterior to rectum."}, {"id": 4, "section": "Section I — Topographic Anatomy and Perineum", "question": "The perineum is best described as a", "options": {"A": "circular area surrounding the anus", "B": "triangular area superior to the bladder", "C": "diamond-shaped area inferior to the pelvic diaphragm", "D": "muscular layer inside the uterus"}, "answer": "C", "rationale": "The perineum is diamond-shaped and inferior to the pelvic diaphragm."}, {"id": 5, "section": "Section I — Topographic Anatomy and Perineum", "question": "The anterior boundary of the perineum is the", "options": {"A": "pubic symphysis", "B": "ischial tuberosity", "C": "sacrum", "D": "coccyx"}, "answer": "A", "rationale": "Pubic symphysis forms the anterior boundary."}, {"id": 6, "section": "Section I — Topographic Anatomy and Perineum", "question": "The posterior boundary of the perineum is the", "options": {"A": "coccyx", "B": "obturator foramen", "C": "pubic symphysis", "D": "ischiopubic ramus"}, "answer": "A", "rationale": "Coccyx forms the posterior boundary."}, {"id": 7, "section": "Section I — Topographic Anatomy and Perineum", "question": "The lateral boundaries separating the broad regions of the perineum are marked by the", "options": {"A": "greater trochanters", "B": "anterior superior iliac spines", "C": "ischial tuberosities", "D": "pubic tubercles"}, "answer": "C", "rationale": "A line between the ischial tuberosities divides the perineum."}, {"id": 8, "section": "Section I — Topographic Anatomy and Perineum", "question": "An imaginary line between the ischial tuberosities divides the perineum into the", "options": {"A": "urogenital and anal triangles", "B": "pelvic and abdominal triangles", "C": "ovarian and uterine triangles", "D": "superficial and deep triangles"}, "answer": "A", "rationale": "Urogenital triangle anterior; anal triangle posterior."}, {"id": 9, "section": "Section I — Topographic Anatomy and Perineum", "question": "The urogenital triangle contains the", "options": {"A": "rectum and anal canal only", "B": "anus only", "C": "urethral and vaginal openings", "D": "ovaries and uterine tubes"}, "answer": "C", "rationale": "Urogenital triangle contains urethral and vaginal openings."}, {"id": 10, "section": "Section I — Topographic Anatomy and Perineum", "question": "The anal triangle contains the", "options": {"A": "vaginal opening", "B": "clitoris", "C": "external urethral opening", "D": "anus and ischioanal fossae"}, "answer": "D", "rationale": "Anal triangle contains anus and ischioanal fossae."}, {"id": 11, "section": "Section I — Topographic Anatomy and Perineum", "question": "The posterior apex of the perineum corresponds to the", "options": {"A": "vaginal opening", "B": "pubic symphysis", "C": "coccyx", "D": "clitoris"}, "answer": "C", "rationale": "Coccyx is the posterior apex."}, {"id": 12, "section": "Section I — Topographic Anatomy and Perineum", "question": "Which structure is a central fibromuscular mass between the vaginal opening and anus?", "options": {"A": "Perineal body", "B": "Mesovarium", "C": "Broad ligament", "D": "Cardinal ligament"}, "answer": "A", "rationale": "The perineal body is the central fibromuscular mass."}, {"id": 13, "section": "Section I — Topographic Anatomy and Perineum", "question": "Which muscle attaches to the perineal body?", "options": {"A": "Piriformis only", "B": "Obturator internus only", "C": "Psoas major", "D": "Bulbospongiosus"}, "answer": "D", "rationale": "Bulbospongiosus attaches to the perineal body."}, {"id": 14, "section": "Section I — Topographic Anatomy and Perineum", "question": "Injury to the perineal body during childbirth may contribute to", "options": {"A": "ovarian torsion", "B": "pelvic-organ prolapse", "C": "ectopic pregnancy", "D": "renal failure"}, "answer": "B", "rationale": "Perineal-body injury can weaken pelvic support."}, {"id": 15, "section": "Section I — Topographic Anatomy and Perineum", "question": "The mons pubis is located", "options": {"A": "within the anal triangle", "B": "inside the uterus", "C": "anterior to the pubic symphysis", "D": "posterior to the coccyx"}, "answer": "C", "rationale": "Mons pubis overlies the pubic symphysis."}, {"id": 16, "section": "Section II — Pelvic Floor Muscles", "question": "The pelvic diaphragm is formed primarily by the", "options": {"A": "levator ani and coccygeus", "B": "rectus abdominis and transversus abdominis", "C": "bulbospongiosus and ischiocavernosus", "D": "obturator internus and piriformis"}, "answer": "A", "rationale": "Pelvic diaphragm = levator ani + coccygeus."}, {"id": 17, "section": "Section II — Pelvic Floor Muscles", "question": "Which muscle is part of the levator ani?", "options": {"A": "Obturator externus", "B": "Piriformis", "C": "Gluteus maximus", "D": "Puborectalis"}, "answer": "D", "rationale": "Puborectalis is part of levator ani."}, {"id": 18, "section": "Section II — Pelvic Floor Muscles", "question": "Which muscle is also part of the levator ani?", "options": {"A": "Coccygeus", "B": "Ischiocavernosus", "C": "External anal sphincter", "D": "Iliococcygeus"}, "answer": "D", "rationale": "Iliococcygeus is part of levator ani."}, {"id": 19, "section": "Section II — Pelvic Floor Muscles", "question": "The three major components of levator ani are", "options": {"A": "bulbospongiosus, coccygeus, and obturator internus", "B": "piriformis, coccygeus, and puborectalis", "C": "puborectalis, pubococcygeus, and iliococcygeus", "D": "gluteus maximus, pubococcygeus, and iliococcygeus"}, "answer": "C", "rationale": "Puborectalis, pubococcygeus, iliococcygeus."}, {"id": 20, "section": "Section II — Pelvic Floor Muscles", "question": "The puborectalis muscle forms a sling around the", "options": {"A": "uterine tube", "B": "anorectal junction", "C": "ovarian vessels", "D": "ureter"}, "answer": "B", "rationale": "Puborectalis forms a sling at the anorectal junction."}, {"id": 21, "section": "Section II — Pelvic Floor Muscles", "question": "The puborectalis muscle helps maintain the", "options": {"A": "anorectal angle", "B": "vaginal fornix", "C": "ovarian fossa", "D": "uterine cavity"}, "answer": "A", "rationale": "It maintains the anorectal angle."}, {"id": 22, "section": "Section II — Pelvic Floor Muscles", "question": "Which muscle lies posterior to levator ani and contributes to the pelvic diaphragm?", "options": {"A": "Bulbospongiosus", "B": "External urethral sphincter", "C": "Coccygeus", "D": "Ischiocavernosus"}, "answer": "C", "rationale": "Coccygeus lies posterior to levator ani."}, {"id": 23, "section": "Section II — Pelvic Floor Muscles", "question": "A major function of the pelvic diaphragm is to", "options": {"A": "support pelvic organs", "B": "secrete vaginal mucus", "C": "transport the oocyte", "D": "produce ova"}, "answer": "A", "rationale": "Pelvic diaphragm supports pelvic viscera."}, {"id": 24, "section": "Section II — Pelvic Floor Muscles", "question": "The pelvic diaphragm helps resist increases in", "options": {"A": "intracranial pressure", "B": "intraocular pressure", "C": "intrapleural pressure only", "D": "intra-abdominal pressure"}, "answer": "D", "rationale": "It resists increased intra-abdominal pressure."}, {"id": 25, "section": "Section II — Pelvic Floor Muscles", "question": "Which muscle constricts the vaginal opening?", "options": {"A": "Gluteus medius", "B": "Iliacus", "C": "Piriformis", "D": "Bulbospongiosus"}, "answer": "D", "rationale": "Bulbospongiosus constricts the vaginal opening."}, {"id": 26, "section": "Section II — Pelvic Floor Muscles", "question": "Which muscle covers the crura of the clitoris?", "options": {"A": "Puborectalis", "B": "Urethrovaginal sphincter", "C": "Coccygeus", "D": "Ischiocavernosus"}, "answer": "D", "rationale": "Ischiocavernosus covers the clitoral crura."}, {"id": 27, "section": "Section II — Pelvic Floor Muscles", "question": "The urethrovaginal sphincter surrounds the", "options": {"A": "urethra and vagina", "B": "rectum only", "C": "ovaries", "D": "uterine tubes"}, "answer": "A", "rationale": "Urethrovaginal sphincter surrounds both urethra and vagina."}, {"id": 28, "section": "Section II — Pelvic Floor Muscles", "question": "Which muscle provides voluntary control of urination?", "options": {"A": "Pubococcygeus only", "B": "Myometrium", "C": "External urethral sphincter", "D": "Ovarian ligament"}, "answer": "C", "rationale": "External urethral sphincter provides voluntary urinary control."}, {"id": 29, "section": "Section III — Peritoneum and Pelvic Pouches", "question": "The vesicouterine pouch lies between the", "options": {"A": "uterus and rectum", "B": "bladder and uterus", "C": "ovary and uterine tube", "D": "vagina and rectum"}, "answer": "B", "rationale": "Vesicouterine pouch: bladder and uterus."}, {"id": 30, "section": "Section III — Peritoneum and Pelvic Pouches", "question": "The rectouterine pouch lies between the", "options": {"A": "bladder and uterus", "B": "cervix and bladder", "C": "ovary and pelvic wall", "D": "uterus and rectum"}, "answer": "D", "rationale": "Rectouterine pouch: uterus and rectum."}, {"id": 31, "section": "Section III — Peritoneum and Pelvic Pouches", "question": "The rectouterine pouch is also called the", "options": {"A": "pouch of Douglas", "B": "pouch of Morison", "C": "lesser sac", "D": "ovarian fossa"}, "answer": "A", "rationale": "Rectouterine pouch = pouch of Douglas."}, {"id": 32, "section": "Section III — Peritoneum and Pelvic Pouches", "question": "In an upright female, the lowest portion of the peritoneal cavity is commonly the", "options": {"A": "vesicouterine pouch", "B": "ovarian fossa", "C": "rectouterine pouch", "D": "broad ligament"}, "answer": "C", "rationale": "It is the lowest peritoneal recess in an upright female."}, {"id": 33, "section": "Section III — Peritoneum and Pelvic Pouches", "question": "Blood or infected fluid in the female pelvis may collect within the", "options": {"A": "seminiferous tubules", "B": "rectouterine pouch", "C": "inguinal canal only", "D": "uterine artery"}, "answer": "B", "rationale": "Fluid may collect in the rectouterine pouch."}, {"id": 34, "section": "Section III — Peritoneum and Pelvic Pouches", "question": "The primary female sex organs are the", "options": {"A": "ovaries", "B": "mammary glands", "C": "uterus", "D": "uterine tubes"}, "answer": "A", "rationale": "Ovaries are the primary female sex organs."}, {"id": 35, "section": "Section III — Peritoneum and Pelvic Pouches", "question": "Which structure is classified as an accessory female reproductive organ?", "options": {"A": "Ovary", "B": "Ovarian cortex", "C": "Uterus", "D": "Gonadal ridge"}, "answer": "C", "rationale": "The uterus is an accessory reproductive organ."}, {"id": 36, "section": "Section IV — Embryology", "question": "The major female internal reproductive organs develop primarily from the", "options": {"A": "urachus", "B": "mesonephric ducts", "C": "neural tube", "D": "paramesonephric ducts"}, "answer": "D", "rationale": "Female internal tract develops mainly from paramesonephric ducts."}, {"id": 37, "section": "Section IV — Embryology", "question": "The paramesonephric ducts are also called the", "options": {"A": "Müllerian ducts", "B": "vitelline ducts", "C": "Wolffian ducts", "D": "mesenteric ducts"}, "answer": "A", "rationale": "Paramesonephric ducts = Müllerian ducts."}, {"id": 38, "section": "Section IV — Embryology", "question": "The paramesonephric ducts arise from", "options": {"A": "paraxial mesoderm only", "B": "neural crest", "C": "coelomic epithelium", "D": "endoderm of the foregut"}, "answer": "C", "rationale": "They arise from coelomic epithelium."}, {"id": 39, "section": "Section IV — Embryology", "question": "The Müllerian ducts appear at approximately the", "options": {"A": "time of birth", "B": "sixth week", "C": "twentieth week", "D": "second week"}, "answer": "B", "rationale": "They appear around week 6."}, {"id": 40, "section": "Section IV — Embryology", "question": "The cranial unfused portions of the Miillerian ducts form the", "options": {"A": "uterine tubes", "B": "lower vagina", "C": "ovaries", "D": "round ligaments"}, "answer": "A", "rationale": "Unfused cranial portions form uterine tubes."}, {"id": 41, "section": "Section IV — Embryology", "question": "The fused caudal portions of the Müllerian ducts form the", "options": {"A": "ovaries and uterine tubes", "B": "lower vagina only", "C": "labia majora", "D": "uterus and cervix"}, "answer": "D", "rationale": "Fused caudal portions form uterus and cervix."}, {"id": 42, "section": "Section IV — Embryology", "question": "The upper portion of the vagina develops primarily from the", "options": {"A": "urogenital sinus only", "B": "genital tubercle", "C": "labioscrotal swellings", "D": "fused Müllerian ducts"}, "answer": "D", "rationale": "Upper vagina derives primarily from fused Müllerian ducts."}, {"id": 43, "section": "Section IV — Embryology", "question": "The lower vagina develops primarily from the", "options": {"A": "mesonephric duct", "B": "urogenital sinus", "C": "gubernaculum", "D": "gonadal ridge"}, "answer": "B", "rationale": "Lower vagina derives from the urogenital sinus."}, {"id": 44, "section": "Section IV — Embryology", "question": "The ovary develops from the", "options": {"A": "cloacal membrane", "B": "gonadal ridge", "C": "Müllerian duct", "D": "urogenital sinus"}, "answer": "B", "rationale": "Ovary develops from the gonadal ridge."}, {"id": 45, "section": "Section IV — Embryology", "question": "The ovarian ligament and round ligament are derivatives of the", "options": {"A": "mesovarium", "B": "mesonephric duct", "C": "gubernaculum", "D": "broad ligament"}, "answer": "C", "rationale": "Ovarian and round ligaments derive from gubernaculum."}, {"id": 46, "section": "Section IV — Embryology", "question": "In males, regression of the Müllerian ducts is caused by", "options": {"A": "progesterone", "B": "testosterone only", "C": "estrogen", "D": "anti-Millerian hormone"}, "answer": "D", "rationale": "AMH causes Müllerian regression in males."}, {"id": 47, "section": "Section IV — Embryology", "question": "Incomplete fusion of the Müllerian ducts may result in", "options": {"A": "bicornuate uterus", "B": "renal agenesis only", "C": "imperforate anus", "D": "ovarian torsion"}, "answer": "A", "rationale": "Fusion defects may produce a bicornuate uterus."}, {"id": 48, "section": "Section IV — Embryology", "question": "A completely duplicated uterus may result from failure of", "options": {"A": "follicular development", "B": "ovarian descent", "C": "Müllerian duct fusion", "D": "vaginal canalization only"}, "answer": "C", "rationale": "Uterus didelphys reflects failure of duct fusion."}, {"id": 49, "section": "Section V — Ligaments and Peritoneal Folds", "question": "The broad ligament is a", "options": {"A": "fibrous ovarian capsule", "B": "double fold only spreads first toward", "options": {"A": "axillary nodes", "B": "superficial inguinal nodes only", "C": "para-aortic lymph nodes", "D": "popliteal nodes"}, "answer": "C", "rationale": "Ovary drains to para-aortic nodes."}, {"id": 192, "section": "Section XIII — Clinical and Anatomical Application", "question": "A carcinoma of the breast most commonly spreads initially through", "options": {"A": "axillary lymphatics", "B": "uterine veins", "C": "vaginal arteries", "D": "ovarian lymphatics"}, "answer": "A", "rationale": "Breast cancer commonly spreads through axillary lymphatics."}, {"id": 193, "section": "Section XIII — Clinical and Anatomical Application", "question": "Involvement of Cooper ligaments by breast carcinoma may produce", "options": {"A": "skin retraction", "B": "cervical dilation", "C": "ovarian torsion", "D": "uterine inversion"}, "answer": "A", "rationale": "Cooper-ligament involvement produces retraction."}, {"id": 194, "section": "Section XIII — Clinical and Anatomical Application", "question": "A cystic swelling near the posterolateral vaginal opening may involve the", "options": {"A": "uterine tube", "B": "ovary", "C": "greater vestibular gland", "D": "breast"}, "answer": "C", "rationale": "Posterolateral swelling may be a Bartholin cyst."}, {"id": 195, "section": "Section XIV — Pathway and Relationship Questions", "question": "Arrange the uterine-tube regions from lateral to medial.", "options": {"A": "Ampulla &gt; isthmus &gt; infundibulum &gt; intramural", "B": "Intramural &gt; isthmus &gt; ampulla &gt; infundibulum", "C": "Isthmus &gt; ampulla &gt; infundibulum &gt; intramural", "D": "Infundibulum &gt; ampulla &gt; isthmus &gt; intramural"}, "answer": "D", "rationale": "Infundibulum &gt; ampulla &gt; isthmus &gt; intramural."}, {"id": 196, "section": "Section XIV — Pathway and Relationship Questions", "question": "Which sequence correctly traces ovarian blood supply?", "options": {"A": "Abdominal aorta &gt; ovarian artery &gt; suspensory ligament &gt; ovary", "B": "Uterine artery &gt; round ligament &gt; ovary only", "C": "Internal iliac artery &gt; ovarian artery &gt; ovary", "D": "Femoral artery &gt; external pudendal artery &gt; ovary"}, "answer": "A", "rationale": "Aorta &gt; ovarian artery &gt; suspensory ligament &gt; ovary."}, {"id": 197, "section": "Section XIV — Pathway and Relationship Questions", "question": "Which relationship is correct?", "options": {"A": "Uterine artery under ureter", "B": "Ureter under uterine artery", "C": "Ureter through ovarian ligament", "D": "Uterine artery inside the vagina"}, "answer": "B", "rationale": "Ureter passes under uterine artery."}, {"id": 198, "section": "Section XIV — Pathway and Relationship Questions", "question": "Which relationship is correct?", "options": {"A": "Round ligament: ovary to pelvic wall", "B": "Suspensory ligament: ovary to uterus", "C": "Ovarian ligament: ovary to uterus", "D": "Mesovarium: uterus to labia majora"}, "answer": "C", "rationale": "Ovarian ligament connects ovary to uterus."}, {"id": 199, "section": "Section XIV — Pathway and Relationship Questions", "question": "Which relationship is correct?", "options": {"A": "Uterus posterior to bladder", "B": "Ovary inside the uterine cavity", "C": "Vagina posterior to rectum", "D": "Uterus anterior to bladder"}, "answer": "A", "rationale": "Uterus lies posterior to bladder."}, {"id": 200, "section": "Section XIV — Pathway and Relationship Questions", "question": "Which relationship is correct?", "options": {"A": "Vesicouterine pouch between bladder and uterus", "B": "Rectouterine pouch between bladder and uterus", "C": "Rectouterine pouch between ovary and tube", "D": "Vesicouterine pouch between uterus and rectum"}, "answer": "A", "rationale": "Vesicouterine pouch lies between bladder and uterus."}, {"id": 276, "section": "Section XVII — Final Comprehensive Challenge", "question": "Which structure carries the ovarian artery from the abdominal wall toward the ovary?", "options": {"A": "Suspensory ligament of the ovary", "B": "Ovarian ligament", "C": "Uterosacral ligament", "D": "Round ligament"}, "answer": "A", "rationale": "Suspensory ligament carries ovarian vessels."}, {"id": 277, "section": "Section XVII — Final Comprehensive Challenge", "question": "Which structure maintains anteversion by traveling through the inguinal canal?", "options": {"A": "Ovarian ligament", "B": "Cardinal ligament", "C": "Round ligament", "D": "Suspensory ligament"}, "answer": "C", "rationale": "Round ligament passes through inguinal canal."}, {"id": 278, "section": "Section XVII — Final Comprehensive Challenge", "question": "Which structure provides major lateral support to the cervix?", "options": {"A": "Ovarian ligament", "B": "Mesovarium", "C": "Cardinal ligament", "D": "Mesosalpinx"}, "answer": "C", "rationale": "Cardinal ligament supports cervix laterally."}, {"id": 279, "section": "Section XVII — Final Comprehensive Challenge", "question": "Which statement is correct?", "options": {"A": "The cervix lies superior to the fundus.", "B": "The broad ligament is the strongest uterine support.", "C": "The ovary is suspended only by the round ligament.", "D": "The pelvic floor is a major support of the uterus."}, "answer": "D", "rationale": "Pelvic floor is a major uterine support."}, {"id": 280, "section": "Section XVII — Final Comprehensive Challenge", "question": "Which statement is correct?", "options": {"A": "The uterine tube directly attaches to the ovary.", "B": "The cervix lies above the fundus.", "C": "The fimbriae project into the uterus.", "D": "The ampulla is the most common site of fertilization."}, "answer": "D", "rationale": "Ampulla is usual fertilization site."}, {"id": 281, "section": "Section XVII — Final Comprehensive Challenge", "question": "Which structure is lined by nonkeratinized stratified squamous epithelium?", "options": {"A": "Endometrium", "B": "Vagina", "C": "Ovary", "D": "Uterine tube"}, "answer": "B", "rationale": "Vagina has nonkeratinized stratified squamous epithelium."}, {"id": 282, "section": "Section XVII — Final Comprehensive Challenge", "question": "Which structure is lined by ciliated simple columnar epithelium?", "options": {"A": "Labia majora", "B": "Breast duct only", "C": "Vagina", "D": "Uterine tube"}, "answer": "D", "rationale": "Uterine tube has ciliated simple columnar lining."}, {"id": 283, "section": "Section XVII — Final Comprehensive Challenge", "question": "Which structure drains primarily to para-aortic nodes?", "options": {"A": "Vulva", "B": "Ovary", "C": "Lower vagina", "D": "Labia majora"}, "answer": "B", "rationale": "Ovary drains to para-aortic nodes."}, {"id": 284, "section": "Section XVII — Final Comprehensive Challenge", "question": "Which structure drains primarily to superficial inguinal nodes?", "options": {"A": "Uterine fundus only", "B": "Ovary", "C": "Uterine tube only", "D": "Lower vagina and vulva"}, "answer": "D", "rationale": "Lower vagina and vulva drain to superficial inguinal nodes."}, {"id": 285, "section": "Section XVII — Final Comprehensive Challenge", "question": "Which pairing is correct?", "options": {"A": "Greater vestibular gland — homologous to seminal gland", "B": "Clitoris — homologous to prostate", "C": "Labia majora — homologous to scrotum", "D": "Ovary — homologous to bulbourethral gland"}, "answer": "C", "rationale": "Labia majora are homologous to scrotum."}, {"id": 286, "section": "Section XVII — Final Comprehensive Challenge", "question": "Which pairing is correct?", "options": {"A": "Bulb of vestibule — testis", "B": "Greater vestibular gland — bulbourethral gland", "C": "Ovary — prostate", "D": "Clitoris — scrotum"}, "answer": "B", "rationale": "Greater vestibular glands are homologous to bulbourethral glands."}, {"id": 287, "section": "Section XVII — Final Comprehensive Challenge", "question": "Which structure is most closely related to the posterior vaginal fornix?", "options": {"A": "Pubic symphysis", "B": "Rectouterine pouch", "C": "Urinary bladder only", "D": "Vesicouterine pouch"}, "answer": "B", "rationale": "Posterior fornix is adjacent to rectouterine pouch."}, {"id": 288, "section": "Section XVII — Final Comprehensive Challenge", "question": "Which structure lies between the bladder and rectum?", "options": {"A": "Breast", "B": "Uterus", "C": "External genitalia", "D": "Ovary only"}, "answer": "B", "rationale": "Uterus lies between bladder and rectum."}, {"id": 289, "section": "Section XVII — Final Comprehensive Challenge", "question": "Which uterine layer is primarily responsible for contractions during labor?", "options": {"A": "Perimetrium", "B": "Myometrium", "C": "Broad ligament", "D": "Endometrium"}, "answer": "B", "rationale": "Myometrium contracts during labor."}, {"id": 290, "section": "Section XVII — Final Comprehensive Challenge", "question": "Which uterine layer is shed during menstruation?", "options": {"A": "Myometrium", "B": "Perimetrium", "C": "Stratum functionalis", "D": "Stratum basalis"}, "answer": "C", "rationale": "Functionalis is shed."}, {"id": 291, "section": "Section XVII — Final Comprehensive Challenge", "question": "Which structure regenerates the endometrium after menstruation?", "options": {"A": "Stratum functionalis", "B": "Myometrium", "C": "Cervical canal", "D": "Stratum basalis"}, "answer": "D", "rationale": "Basalis regenerates the endometrium."}, {"id": 292, "section": "Section XVII — Final Comprehensive Challenge", "question": "Which artery supplies the functional layer of the endometrium?", "options": {"A": "Ovarian vein", "B": "Internal pudendal artery", "C": "Straight artery only", "D": "Spiral artery"}, "answer": "D", "rationale": "Spiral arteries supply functionalis."}, {"id": 293, "section": "Section XVII — Final Comprehensive Challenge", "question": "Which artery is at risk during surgery near the ureter and cervix?", "options": {"A": "Femoral artery", "B": "Lateral thoracic artery", "C": "Uterine artery", "D": "Inferior mesenteric artery"}, "answer": "C", "rationale": "Uterine artery crosses near ureter."}, {"id": 294, "section": "Section XVII — Final Comprehensive Challenge", "question": "Which breast structures may shorten and cause dimpling when involved by carcinoma?", "options": {"A": "Lactiferous ducts", "B": "Cooper ligaments", "C": "Round ligaments", "D": "Ovarian ligaments"}, "answer": "B", "rationale": "Cooper-ligament shortening causes dimpling."}, {"id": 295, "section": "Section XVII — Final Comprehensive Challenge", "question": "Which lymph nodes receive most breast lymph?", "options": {"A": "Superficial inguinal nodes", "B": "Para-aortic nodes", "C": "Axillary nodes", "D": "Popliteal nodes"}, "answer": "C", "rationale": "Most breast lymph drains to axillary nodes."}, {"id": 296, "section": "Section XVII — Final Comprehensive Challenge", "question": "Which structure is a peritoneal fold rather than a strong fibrous ligament?", "options": {"A": "Uterosacral ligament", "B": "Broad ligament", "C": "Pelvic diaphragm", "D": "Cardinal ligament"}, "answer": "B", "rationale": "Broad ligament is a peritoneal fold."}, {"id": 297, "section": "Section XVII — Final Comprehensive Challenge", "question": "Which organ is largely intraperitoneal but has a mainly subperitoneal cervix?", "options": {"A": "Uterus", "B": "Vagina", "C": "Bladder", "D": "Ovary"}, "answer": "A", "rationale": "Uterus is mostly intraperitoneal; cervix largely subperitoneal."}, {"id": 298, "section": "Section XVII — Final Comprehensive Challenge", "question": "Which statement best describes the ovary?", "options": {"A": "Drains primarily to superficial inguinal nodes", "B": "Completely covered by typical peritoneum and located inside the uterus", "C": "Attached directly to uterine tube", "D": "Attached to uterus by ovarian ligament and pelvic wall by suspensory ligament"}, "answer": "D", "rationale": "Ovary attaches to uterus and pelvic wall by separate ligaments."}, {"id": 299, "section": "Section XVII — Final Comprehensive Challenge", "question": "Which statement best describes the vagina?", "options": {"A": "Located posterior to the urethra and anterior to the rectum", "B": "Located anterior to the urethra", "C": "Contains numerous mucus glands in its wall", "D": "Lined by ciliated simple columnar epithelium"}, "answer": "A", "rationale": "Vagina lies posterior to urethra and anterior to rectum."}, {"id": 300, "section": "Section XVII — Final Comprehensive Challenge", "question": "Which statement best describes the clitoris?", "options": {"A": "Contains erectile tissue and is homologous to the penis", "B": "Produces oocytes", "C": "Is homologous to the scrotum", "D": "Contains the female urethra"}, "answer": "A", "rationale": "Clitoris is erectile and homologous to penis."}];
const LETTERS=["A","B","C","D"];
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}

// build section list
const sections=[...new Set(QUESTIONS.map(q=>q.section))];
const secSel=document.getElementById("secSel");
secSel.innerHTML=`<option value="__ALL__">All sections (${QUESTIONS.length} questions)</option>`+
  sections.map(s=>{const n=QUESTIONS.filter(q=>q.section===s).length;
    return `<option value="${s.replace(/"/g,'&quot;')}">${s} (${n})</option>`;}).join("");

let countChoice=20;
const counts=[10,20,50,"All"];
const countRow=document.getElementById("countRow");
function renderCounts(max){
  countRow.innerHTML=counts.map(c=>{
    const val=c==="All"?max:c;
    const dis=(c!=="All"&&c>max);
    return `<div class="chip ${val===countChoice?'on':''}" data-v="${val}" ${dis?'style="opacity:.35;pointer-events:none"':''}>${c}</div>`;
  }).join("");
  countRow.querySelectorAll(".chip").forEach(ch=>ch.onclick=()=>{countChoice=+ch.dataset.v;renderCounts(max);});
}
function poolFor(sec){return sec==="__ALL__"?QUESTIONS:QUESTIONS.filter(q=>q.section===sec);}
secSel.onchange=()=>{const max=poolFor(secSel.value).length;if(countChoice>max)countChoice=max;renderCounts(max);};
renderCounts(QUESTIONS.length);

let quiz=[],idx=0,correct=0,answered=false,log=[];
document.getElementById("startBtn").onclick=()=>{
  const pool=poolFor(secSel.value).slice();
  shuffle(pool);
  quiz=pool.slice(0,Math.min(countChoice,pool.length));
  idx=0;correct=0;log=[];
  document.getElementById("setup").classList.add("hide");
  document.getElementById("results").classList.add("hide");
  document.getElementById("quiz").classList.remove("hide");
  render();
};

function render(){
  answered=false;
  const q=quiz[idx];
  document.getElementById("qsec").textContent=q.section;
  document.getElementById("qmeta").textContent=`Question ${idx+1} of ${quiz.length}`;
  document.getElementById("qtext").textContent=q.question;
  document.getElementById("prog").style.width=((idx)/quiz.length*100)+"%";
  document.getElementById("tally").textContent=`Correct so far: ${correct}/${idx}`;
  const fb=document.getElementById("fb");fb.className="fb";fb.textContent="";
  const nb=document.getElementById("nextBtn");nb.disabled=true;
  nb.textContent=(idx===quiz.length-1)?"See results":"Next";
  // shuffle option order
  const order=shuffle(LETTERS.filter(l=>q.options[l]!=null).slice());
  const opts=document.getElementById("opts");opts.innerHTML="";
  order.forEach((L,i)=>{
    const b=document.createElement("button");
    b.className="opt";
    b.innerHTML=`<span class="ltr">${String.fromCharCode(65+i)}.</span><span>${q.options[L]}</span>`;
    b.onclick=()=>choose(b,L,q,opts);
    opts.appendChild(b);
  });
}
function choose(btn,L,q,opts){
  if(answered)return;answered=true;
  const isCorrect=(L===q.answer);
  if(isCorrect)correct++;
  [...opts.children].forEach(c=>c.disabled=true);
  [...opts.children].forEach(c=>{
    const cl=c.querySelector(".ltr").nextSibling.textContent;
    if(cl===q.options[q.answer])c.classList.add("correct");
    else c.classList.add("dim");
  });
  if(!isCorrect)btn.classList.remove("dim"),btn.classList.add("wrong");
  const fb=document.getElementById("fb");
  fb.classList.add("show",isCorrect?"ok":"no");
  fb.innerHTML=(isCorrect?"<b>Correct.</b> ":`<b>Not quite.</b> Correct answer: ${q.options[q.answer]}. `)+
    (q.rationale?`<br>${q.rationale}`:"");
  document.getElementById("nextBtn").disabled=false;
  document.getElementById("tally").textContent=`Correct so far: ${correct}/${idx+1}`;
  log.push({q,chosen:q.options[L],correct:isCorrect});
}
document.getElementById("nextBtn").onclick=()=>{
  if(!answered)return;
  if(idx===quiz.length-1)showResults();
  else{idx++;render();window.scrollTo({top:0,behavior:"smooth"});}
};
document.getElementById("quitBtn").onclick=()=>{if(confirm("Quit and see your results so far?"))showResults();};
document.getElementById("againBtn").onclick=()=>{
  document.getElementById("results").classList.add("hide");
  document.getElementById("setup").classList.remove("hide");
  window.scrollTo({top:0,behavior:"smooth"});
};

function showResults(){
  document.getElementById("quiz").classList.add("hide");
  const r=document.getElementById("results");r.classList.remove("hide");
  const total=log.length;const pct=total?Math.round(correct/total*100):0;
  document.getElementById("score").textContent=pct+"%";
  document.getElementById("scoresub").textContent=`${correct} of ${total} correct`;
  // section breakdown
  const bySec={};
  log.forEach(e=>{const s=e.q.section;bySec[s]=bySec[s]||[0,0];bySec[s][1]++;if(e.correct)bySec[s][0]++;});
  document.getElementById("brk").innerHTML=Object.entries(bySec).map(([s,[c,t]])=>
    `<div class="bl"><span>${s}</span><span class="frac">${c}/${t}</span></div>`).join("");
  // missed review
  const missed=log.filter(e=>!e.correct);
  const rv=document.getElementById("review");
  if(missed.length===0){rv.innerHTML='<h3>Perfect — no missed questions.</h3>';}
  else{rv.innerHTML='<h3>Review missed questions ('+missed.length+')</h3>'+missed.map(e=>
    `<div class="rev"><p class="rq">${e.q.question}</p>
      <p class="ra you">Your answer: ${e.chosen}</p>
      <p class="ra cor">Correct: ${e.q.options[e.q.answer]}</p>
      ${e.q.rationale?`<p class="rr">${e.q.rationale}</p>`:""}</div>`).join("");}
  window.scrollTo({top:0,behavior:"smooth"});
}
</script>
