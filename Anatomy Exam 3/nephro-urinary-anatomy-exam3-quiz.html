<head>

<title>Nephrology &amp; Urinary — Anatomy Exam 3 Practice</title>
<style>
  :root{
    --accent:#0d7a5f; --accent-soft:#e6f4ef; --accent-line:#bfe3d6;
    --correct:#1c8a4e; --correct-bg:#e8f7ee;
    --wrong:#c0392b; --wrong-bg:#fdecea;
    --ink:#1a2320; --muted:#5c6b66; --line:#e2e8e5; --card:#ffffff; --bg:#f4f7f6;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:Georgia,'Times New Roman',serif;line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:760px;margin:0 auto;padding:20px 16px 80px}
  header{text-align:center;padding:24px 0 8px}
  h1{font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    font-size:1.5rem;margin:0 0 4px;letter-spacing:-.01em}
  .sub{font-family:ui-sans-serif,system-ui,sans-serif;color:var(--muted);font-size:.9rem}
  .bar{position:sticky;top:0;z-index:5;background:var(--bg);padding:12px 0;border-bottom:1px solid var(--line);margin-bottom:16px}
  .progress-track{height:8px;background:#dfe8e5;border-radius:99px;overflow:hidden}
  .progress-fill{height:100%;background:var(--accent);width:0;transition:width .3s ease}
  .meta{display:flex;justify-content:space-between;font-family:ui-sans-serif,system-ui,sans-serif;
    font-size:.8rem;color:var(--muted);margin-top:8px}
  .meta b{color:var(--accent)}
  .section-tag{display:inline-block;font-family:ui-sans-serif,system-ui,sans-serif;font-size:.72rem;
    text-transform:uppercase;letter-spacing:.06em;color:var(--accent);background:var(--accent-soft);
    border:1px solid var(--accent-line);padding:3px 10px;border-radius:99px;margin-bottom:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:24px 22px;
    box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .qnum{font-family:ui-sans-serif,system-ui,sans-serif;font-weight:700;color:var(--accent);font-size:.95rem;margin-bottom:6px}
  .stem{font-size:1.14rem;margin:0 0 18px;line-height:1.5}
  .opts{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:10px}
  .opt{display:flex;gap:12px;align-items:flex-start;width:100%;text-align:left;cursor:pointer;
    background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:13px 15px;
    font-family:inherit;font-size:1.02rem;color:var(--ink);transition:all .15s ease}
  .opt:hover:not(:disabled){border-color:var(--accent);background:var(--accent-soft)}
  .opt:disabled{cursor:default}
  .opt .let{font-family:ui-sans-serif,system-ui,sans-serif;font-weight:700;color:var(--muted);flex:none;
    width:24px;height:24px;border-radius:6px;background:#eef2f0;display:grid;place-items:center;font-size:.85rem}
  .opt.correct{border-color:var(--correct);background:var(--correct-bg)}
  .opt.correct .let{background:var(--correct);color:#fff}
  .opt.wrong{border-color:var(--wrong);background:var(--wrong-bg)}
  .opt.wrong .let{background:var(--wrong);color:#fff}
  .feedback{margin-top:16px;padding:14px 16px;border-radius:10px;font-size:.98rem;display:none}
  .feedback.show{display:block}
  .feedback.ok{background:var(--correct-bg);border:1px solid #b6e2c6}
  .feedback.no{background:var(--wrong-bg);border:1px solid #f3c4bd}
  .feedback .lbl{font-family:ui-sans-serif,system-ui,sans-serif;font-weight:700;font-size:.82rem;
    text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:4px}
  .feedback.ok .lbl{color:var(--correct)}
  .feedback.no .lbl{color:var(--wrong)}
  .nav{display:flex;gap:10px;margin-top:20px}
  .btn{font-family:ui-sans-serif,system-ui,sans-serif;font-weight:600;font-size:.98rem;
    border:none;border-radius:10px;padding:13px 20px;cursor:pointer;transition:opacity .15s}
  .btn-primary{background:var(--accent);color:#fff;flex:1}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed}
  .btn-ghost{background:#fff;color:var(--muted);border:1.5px solid var(--line)}
  .btn:hover:not(:disabled){opacity:.9}
  /* results */
  .results{text-align:center;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:34px 24px}
  .score{font-family:ui-sans-serif,system-ui,sans-serif;font-size:3rem;font-weight:800;color:var(--accent);margin:8px 0}
  .score small{font-size:1.1rem;color:var(--muted);font-weight:500}
  .pct{font-family:ui-sans-serif,system-ui,sans-serif;color:var(--muted);margin-bottom:20px}
  .review-head{font-family:ui-sans-serif,system-ui,sans-serif;font-weight:700;text-align:left;margin:26px 0 10px;font-size:1rem}
  .rev{text-align:left;border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:10px;background:#fff}
  .rev .rq{font-size:.98rem;margin-bottom:6px}
  .rev .ra{font-family:ui-sans-serif,system-ui,sans-serif;font-size:.85rem;color:var(--muted)}
  .rev .ra b{color:var(--correct)}
  .rev .your{color:var(--wrong)}
  .picker{margin-bottom:16px}
  .picker label{font-family:ui-sans-serif,system-ui,sans-serif;font-size:.82rem;color:var(--muted);display:block;margin-bottom:6px}
  select{font-family:ui-sans-serif,system-ui,sans-serif;font-size:.95rem;padding:10px 12px;border:1.5px solid var(--line);
    border-radius:10px;width:100%;background:#fff;color:var(--ink)}
  .hide{display:none}
</style>
</head>

<script>
const ALL = [{"id": 1, "section": "Section I — Organization of the Urinary System", "stem": "Which structure is considered a primary organ of the urinary system?", "options": {"A": "Ureter", "B": "Kidney", "C": "Urinary bladder", "D": "Urethra"}, "answer": "B", "rationale": "The kidneys are the primary urinary organs."}, {"id": 2, "section": "Section I — Organization of the Urinary System", "stem": "The primary function of the kidneys is to", "options": {"A": "store urine", "B": "transport urine", "C": "filter blood and produce urine", "D": "provide voluntary urinary control"}, "answer": "C", "rationale": "Kidneys filter blood and convert filtrate into urine."}, {"id": 3, "section": "Section I — Organization of the Urinary System", "stem": "Which structure transports urine from the kidney to the urinary bladder?", "options": {"A": "Urethra", "B": "Ureter", "C": "Renal vein", "D": "Collecting duct"}, "answer": "B", "rationale": "Ureters transport urine to the bladder."}, {"id": 4, "section": "Section I — Organization of the Urinary System", "stem": "Which structure serves primarily as a reservoir for urine?", "options": {"A": "Kidney", "B": "Ureter", "C": "Urinary bladder", "D": "Urethra"}, "answer": "C", "rationale": "The bladder stores urine."}, {"id": 5, "section": "Section I — Organization of the Urinary System", "stem": "The urethra transports urine from the", "options": {"A": "kidney to the bladder", "B": "bladder to the exterior", "C": "renal cortex to the medulla", "D": "renal pelvis to the ureter"}, "answer": "B", "rationale": "The urethra carries urine from bladder to exterior."}, {"id": 6, "section": "Section I — Organization of the Urinary System", "stem": "The medical term for urination is", "options": {"A": "filtration", "B": "micturition", "C": "secretion", "D": "reabsorption"}, "answer": "B", "rationale": "Micturition means urination."}, {"id": 7, "section": "Section I — Organization of the Urinary System", "stem": "Which function is performed directly by the kidney?", "options": {"A": "Storing urine for several hours", "B": "Voluntary control of urination", "C": "Converting filtrate into urine", "D": "Transporting urine to the exterior"}, "answer": "C", "rationale": "The kidney modifies filtrate into urine."}, {"id": 8, "section": "Section I — Organization of the Urinary System", "stem": "Which sequence correctly lists the major urinary organs?", "options": {"A": "Kidney → bladder → ureter → urethra", "B": "Kidney → ureter → bladder → urethra", "C": "Ureter → kidney → bladder → urethra", "D": "Kidney → urethra → bladder → ureter"}, "answer": "B", "rationale": "Kidney → ureter → bladder → urethra."}, {"id": 9, "section": "Section II — Kidney Location and Gross Anatomy", "stem": "The kidneys are classified as", "options": {"A": "intraperitoneal organs", "B": "retroperitoneal organs", "C": "subcutaneous organs", "D": "mediastinal organs"}, "answer": "B", "rationale": "Kidneys are retroperitoneal."}, {"id": 10, "section": "Section II — Kidney Location and Gross Anatomy", "stem": "The right kidney typically extends approximately from", "options": {"A": "T5 to T9", "B": "T12 to L3", "C": "L3 to S1", "D": "T1 to T4"}, "answer": "B", "rationale": "Right kidney: approximately T12-L3."}, {"id": 11, "section": "Section II — Kidney Location and Gross Anatomy", "stem": "The left kidney typically extends approximately from", "options": {"A": "T10 or T11 to L2", "B": "T12 to L5", "C": "L1 to S2", "D": "T5 to T9"}, "answer": "A", "rationale": "Left kidney: approximately T10/11-L2."}, {"id": 12, "section": "Section II — Kidney Location and Gross Anatomy", "stem": "The right kidney lies lower than the left primarily because of the", "options": {"A": "spleen", "B": "stomach", "C": "liver", "D": "pancreas"}, "answer": "C", "rationale": "The liver pushes the right kidney inferiorly."}, {"id": 13, "section": "Section II — Kidney Location and Gross Anatomy", "stem": "The average adult kidney is approximately", "options": {"A": "3 cmlong", "B": "6 cm long", "C": "11cm long", "D": "20 cm long"}, "answer": "C", "rationale": "Average length is approximately 11 cm."}, {"id": 14, "section": "Section II — Kidney Location and Gross Anatomy", "stem": "The renal hilum is located on the", "options": {"A": "convex lateral border", "B": "concave medial border", "C": "superior pole", "D": "inferior pole"}, "answer": "B", "rationale": "The hilum is on the concave medial border."}, {"id": 15, "section": "Section II — Kidney Location and Gross Anatomy", "stem": "Which structure enters or exits through the renal hilum?", "options": {"A": "Renal artery", "B": "Renal vein", "C": "Renal pelvis", "D": "All of the above"}, "answer": "D", "rationale": "Artery, vein, pelvis, nerves, and lymphatics traverse the hilum."}, {"id": 16, "section": "Section II — Kidney Location and Gross Anatomy", "stem": "The correct anterior-to-posterior order at the renal hilum is", "options": {"A": "artery → vein → pelvis", "B": "pelvis → artery → vein", "C": "vein → artery → pelvis", "D": "vein → pelvis → artery"}, "answer": "C", "rationale": "Anterior to posterior: vein, artery, pelvis."}, {"id": 17, "section": "Section II — Kidney Location and Gross Anatomy", "stem": "The mnemonic VAP refers to", "options": {"A": "vein, artery, pelvis", "B": "vein, aorta, papilla", "C": "vessel, artery, pyramid", "D": "vena cava, artery, pelvis"}, "answer": "A", "rationale": "VAP = vein, artery, pelvis."}, {"id": 18, "section": "Section II — Kidney Location and Gross Anatomy", "stem": "The renal artery arises directly from the", "options": {"A": "internal iliac artery", "B": "abdominal aorta", "C": "inferior mesenteric artery", "D": "common iliac artery"}, "answer": "B", "rationale": "Renal arteries arise from the abdominal aorta."}, {"id": 19, "section": "Section II — Kidney Location and Gross Anatomy", "stem": "The renal vein drains directly into the", "options": {"A": "portal vein", "B": "inferior vena cava", "C": "azygos vein", "D": "internal iliac vein"}, "answer": "B", "rationale": "Renal veins drain to the IVC."}, {"id": 20, "section": "Section II — Kidney Location and Gross Anatomy", "stem": "The left renal vein commonly receives the", "options": {"A": "right gonadal vein", "B": "left gonadal vein", "C": "inferior mesenteric vein", "D": "cystic vein"}, "answer": "B", "rationale": "The left gonadal vein drains to the left renal vein."}, {"id": 21, "section": "Section II — Kidney Location and Gross Anatomy", "stem": "The autonomic nerve network supplying the kidney is the", "options": {"A": "hypogastric plexus", "B": "renal plexus", "C": "brachial plexus", "D": "sacral plexus"}, "answer": "B", "rationale": "The renal plexus supplies the kidney."}, {"id": 22, "section": "Section II — Kidney Location and Gross Anatomy", "stem": "Which kidney border is convex?", "options": {"A": "Medial", "B": "Lateral", "C": "Superior", "D": "Inferior"}, "answer": "B", "rationale": "The lateral border is convex."}, {"id": 23, "section": "Section II — Kidney Location and Gross Anatomy", "stem": "Which kidney border contains the hilum?", "options": {"A": "Lateral", "B": "Medial", "C": "Superior", "D": "Posterior"}, "answer": "B", "rationale": "The medial border contains the hilum."}, {"id": 24, "section": "Section II — Kidney Location and Gross Anatomy", "stem": "The superior poles of the kidneys are generally", "options": {"A": "farther from the midline than the inferior poles", "B": "closer to the midline than the inferior poles", "C": "located below the inferior poles", "D": "positioned inside the pelvis"}, "answer": "B", "rationale": "Superior poles lie closer to the midline."}, {"id": 25, "section": "Section II — Kidney Location and Gross Anatomy", "stem": "The kidneys lie anterior to the", "options": {"A": "peritoneal cavity", "B": "posterior abdominal wall muscles", "C": "urinary bladder", "D": "pubic symphysis"}, "answer": "B", "rationale": "Kidneys lie anterior to posterior abdominal muscles."}, {"id": 26, "section": "Section II — Kidney Location and Gross Anatomy", "stem": "The kidneys lie posterior to the", "options": {"A": "parietal peritoneum", "B": "psoas major", "C": "quadratus lumborum", "D": "transversus abdominis"}, "answer": "A", "rationale": "Kidneys lie posterior to parietal peritoneum."}, {"id": 27, "section": "Section III — Renal Hilum, Sinus, and Coverings", "stem": "The renal sinus is best described as", "options": {"A": "an external fascial layer", "B": "an internal cavity continuous with the hilum", "C": "the outer renal cortex", "D": "a venous plexus"}, "answer": "B", "rationale": "Renal sinus is the internal cavity beyond the hilum."}, {"id": 28, "section": "Section III — Renal Hilum, Sinus, and Coverings", "stem": "Which structure is found inside the renal sinus?", "options": {"A": "Major calyces", "B": "Minor calyces", "C": "Renal pelvis", "D": "All of the above"}, "answer": "D", "rationale": "It contains the pelvis and calyces."}, {"id": 29, "section": "Section III — Renal Hilum, Sinus, and Coverings", "stem": "Which structure is found within the renal sinus?", "options": {"A": "Fat", "B": "Nerves", "C": "Blood vessels", "D": "All of the above"}, "answer": "D", "rationale": "It also contains fat, vessels, nerves, and lymphatics."}, {"id": 30, "section": "Section III — Renal Hilum, Sinus, and Coverings", "stem": "The renal hilum differs from the renal sinus because the hilum is the", "options": {"A": "internal cavity, while the sinus is the medial opening", "B": "medial opening, while the sinus is the internal cavity", "C": "outer capsule, while the sinus is the medulla", "D": "renal papilla, while the sinus is the cortex"}, "answer": "B", "rationale": "Hilum = opening; sinus = internal space."}, {"id": 31, "section": "Section III — Renal Hilum, Sinus, and Coverings", "stem": "Which layer directly covers the kidney?", "options": {"A": "Renal fascia", "B": "Fibrous capsule", "C": "Pararenal fat", "D": "Peritoneum"}, "answer": "B", "rationale": "The fibrous capsule directly covers the kidney."}, {"id": 32, "section": "Section III — Renal Hilum, Sinus, and Coverings", "stem": "The fibrous renal capsule is composed mainly of", "options": {"A": "skeletal muscle", "B": "dense irregular connective tissue", "C": "transitional epithelium", "D": "simple squamous epithelium"}, "answer": "B", "rationale": "It is dense irregular connective tissue."}, {"id": 33, "section": "Section III — Renal Hilum, Sinus, and Coverings", "stem": "Which layer cushions and insulates the kidney?", "options": {"A": "Perirenal fat", "B": "Fibrous capsule", "C": "Urothelium", "D": "Renal medulla"}, "answer": "A", "rationale": "Perirenal fat cushions and insulates."}, {"id": 34, "section": "Section III — Renal Hilum, Sinus, and Coverings", "stem": "Perinephric fat is also called", "options": {"A": "pararenal fat", "B": "perirenal fat", "C": "renal cortex", "D": "renal sinus fat only"}, "answer": "B", "rationale": "Perinephric fat = perirenal fat."}, {"id": 35, "section": "Section III — Renal Hilum, Sinus, and Coverings", "stem": "Which structure anchors the kidney to the posterior abdominal wall?", "options": {"A": "Renal fascia", "B": "Renal papilla", "C": "Major calyx", "D": "Glomerular capsule"}, "answer": "A", "rationale": "Renal fascia anchors the kidney."}, {"id": 36, "section": "Section III — Renal Hilum, Sinus, and Coverings", "stem": "Paranephric fat is also called", "options": {"A": "perirenal fat", "B": "pararenal fat", "C": "cortical fat", "D": "sinus fat"}, "answer": "B", "rationale": "Paranephric fat = pararenal fat."}, {"id": 37, "section": "Section III — Renal Hilum, Sinus, and Coverings", "stem": "From deep to superficial, the correct order is", "options": {"A": "fibrous capsule → perirenal fat → renal fascia → pararenal fat", "B": "fibrous capsule → renal fascia → perirenal fat → pararenal fat", "C": "perirenal fat → fibrous capsule → renal fascia → pararenal fat", "D": "renal fascia → fibrous capsule → pararenal fat → perirenal fat"}, "answer": "A", "rationale": "Capsule → perirenal fat → fascia → pararenal fat."}, {"id": 38, "section": "Section III — Renal Hilum, Sinus, and Coverings", "stem": "A posterior needle approaching the kidney after passing through the abdominal wall would next encounter", "options": {"A": "renal capsule first", "B": "pararenal fat first", "C": "perirenal fat first", "D": "renal medulla first"}, "answer": "B", "rationale": "A posterior approach first encounters pararenal fat."}, {"id": 39, "section": "Section III — Renal Hilum, Sinus, and Coverings", "stem": "Which order correctly describes a percutaneous approach toward the renal pelvis?", "options": {"A": "Pararenal fat → renal fascia → perirenal fat → renal capsule", "B": "Perirenal fat → pararenal fat → capsule → fascia", "C": "Renal fascia → capsule → pararenal fat → perirenal fat", "D": "Capsule → perirenal fat → fascia → pararenal fat"}, "answer": "A", "rationale": "This is the correct percutaneous sequence."}, {"id": 40, "section": "Section III — Renal Hilum, Sinus, and Coverings", "stem": "Because the kidneys are retroperitoneal, they may be approached posteriorly without entering the", "options": {"A": "urinary bladder", "B": "peritoneal cavity", "C": "renal sinus", "D": "renal medulla"}, "answer": "B", "rationale": "A posterior approach may avoid the peritoneal cavity."}, {"id": 41, "section": "Section IV — Internal Kidney Anatomy", "stem": "The outer region of the kidney is the", "options": {"A": "renal medulla", "B": "renal cortex", "C": "renal sinus", "D": "renal pelvis"}, "answer": "B", "rationale": "Cortex is the outer region."}, {"id": 42, "section": "Section IV — Internal Kidney Anatomy", "stem": "The inner region of the kidney is the", "options": {"A": "renal cortex", "B": "renal medulla", "C": "fibrous capsule", "D": "renal fascia"}, "answer": "B", "rationale": "Medulla is the inner region."}, {"id": 43, "section": "Section IV — Internal Kidney Anatomy", "stem": "The renal medulla is divided into", "options": {"A": "lobules", "B": "renal pyramids", "C": "glomerular capsules", "D": "renal arches only"}, "answer": "B", "rationale": "Medulla contains renal pyramids."}, {"id": 44, "section": "Section IV — Internal Kidney Anatomy", "stem": "A typical kidney contains approximately", "options": {"A": "1-2 pyramids", "B": "8-15 pyramids", "C": "25-30 pyramids", "D": "50 pyramids"}, "answer": "B", "rationale": "Approximately 8-15 pyramids per kidney."}, {"id": 45, "section": "Section IV — Internal Kidney Anatomy", "stem": "The base of a renal pyramid faces the", "options": {"A": "renal pelvis", "B": "cortex", "C": "hilum", "D": "ureter"}, "answer": "B", "rationale": "Pyramid bases face the cortex."}, {"id": 46, "section": "Section IV — Internal Kidney Anatomy", "stem": "The apex of a renal pyramid is the", "options": {"A": "renal column", "B": "renal papilla", "C": "renal cortex", "D": "renal arch"}, "answer": "B", "rationale": "Pyramid apex = renal papilla."}, {"id": 47, "section": "Section IV — Internal Kidney Anatomy", "stem": "Renal columns are extensions of", "options": {"A": "medullary tissue between calyces", "B": "cortical tissue between pyramids", "C": "fibrous tissue around the ureter", "D": "urothelium around the renal pelvis"}, "answer": "B", "rationale": "Columns are cortical extensions between pyramids."}, {"id": 48, "section": "Section IV — Internal Kidney Anatomy", "stem": "The renal papilla drains urine into the", "options": {"A": "major calyx", "B": "minor calyx", "C": "renal pelvis directly", "D": "ureter directly"}, "answer": "B", "rationale": "Papilla drains to a minor calyx."}, {"id": 49, "section": "Section IV — Internal Kidney Anatomy", "stem": "Several minor calyces combine to form a", "options": {"A": "glomerulus", "B": "major calyx", "C": "renal papilla", "D": "nephron loop"}, "answer": "B", "rationale": "Minor calyces combine into major calyces."}, {"id": 50, "section": "Section IV — Internal Kidney Anatomy", "stem": "Major calyces drain into the", "options": {"A": "collecting duct", "B": "renal pelvis", "C": "proximal tubule", "D": "renal vein"}, "answer": "B", "rationale": "Major calyces drain to the renal pelvis."}, {"id": 51, "section": "Section IV — Internal Kidney Anatomy", "stem": "The renal pelvis continues as the", "options": {"A": "urethra", "B": "ureter", "C": "collecting duct", "D": "renal artery"}, "answer": "B", "rationale": "Renal pelvis continues as the ureter."}, {"id": 52, "section": "Section IV — Internal Kidney Anatomy", "stem": "Which sequence is correct?", "options": {"A": "Papilla → major calyx → minor calyx → pelvis", "B": "Papilla → minor calyx → major calyx → pelvis", "C": "Minor calyx → papilla → major calyx → ureter", "D": "Cortex → major calyx → papilla → pelvis"}, "answer": "B", "rationale": "Papilla → minor calyx → major calyx → pelvis."}, {"id": 53, "section": "Section IV — Internal Kidney Anatomy", "stem": "The renal cortex contains", "options": {"A": "renal corpuscles", "B": "proximal convoluted tubules", "C": "distal convoluted tubules", "D": "All of the above"}, "answer": "D", "rationale": "Cortex contains corpuscles, PCTs, and DCTs."}, {"id": 54, "section": "Section IV — Internal Kidney Anatomy", "stem": "Renal pyramids are located within the", "options": {"A": "cortex", "B": "medulla", "C": "sinus only", "D": "capsule"}, "answer": "B", "rationale": "Renal pyramids are medullary."}, {"id": 55, "section": "Section V — Renal Arterial Blood Flow", "stem": "The first arterial branch entering the kidney after the renal artery is the", "options": {"A": "arcuate artery", "B": "segmental artery", "C": "interlobular artery", "D": "afferent arteriole"}, "answer": "B", "rationale": "Renal artery first divides into segmental arteries."}, {"id": 56, "section": "Section V — Renal Arterial Blood Flow", "stem": "Which artery follows the segmental artery?", "options": {"A": "Lobar artery", "B": "Interlobular artery", "C": "Arcuate artery", "D": "Efferent arteriole"}, "answer": "A", "rationale": "Segmental arteries give rise to lobar arteries."}, {"id": 57, "section": "Section V — Renal Arterial Blood Flow", "stem": "Interlobar arteries travel", "options": {"A": "inside glomeruli", "B": "between renal pyramids", "C": "around the ureter", "D": "through the renal papilla"}, "answer": "B", "rationale": "Interlobar arteries travel between pyramids."}, {"id": 58, "section": "Section V — Renal Arterial Blood Flow", "stem": "Arcuate arteries travel along the", "options": {"A": "renal capsule", "B": "corticomedullary junction", "C": "ureterovesical junction", "D": "renal pelvis"}, "answer": "B", "rationale": "Arcuate arteries follow the corticomedullary junction."}, {"id": 59, "section": "Section V — Renal Arterial Blood Flow", "stem": "Interlobular arteries are also called", "options": {"A": "cortical radiate arteries", "B": "medullary arteries", "C": "papillary arteries", "D": "vesical arteries"}, "answer": "A", "rationale": "Interlobular = cortical radiate artery."}, {"id": 60, "section": "Section V — Renal Arterial Blood Flow", "stem": "Which vessel directly supplies the glomerulus?", "options": {"A": "Efferent arteriole", "B": "Afferent arteriole", "C": "Interlobar vein", "D": "Renal vein"}, "answer": "B", "rationale": "Afferent arteriole directly supplies the glomerulus."}, {"id": 61, "section": "Section V — Renal Arterial Blood Flow", "stem": "Blood exits the glomerulus through the", "options": {"A": "afferent arteriole", "B": "efferent arteriole", "C": "renal vein", "D": "arcuate vein"}, "answer": "B", "rationale": "Blood exits through the efferent arteriole."}, {"id": 62, "section": "Section V — Renal Arterial Blood Flow", "stem": "Which sequence correctly traces blood to the glomerulus?", "options": {"A": "Renal artery → segmental → lobar → interlobar → arcuate → interlobular → afferent arteriole", "B": "Renal artery → lobar → segmental → arcuate → interlobar → afferent arteriole", "C": "Aorta → interlobar → renal artery → segmental → glomerulus", "D": "Renal artery → arcuate → lobar → segmental → glomerulus"}, "answer": "A", "rationale": "Correct arterial sequence."}, {"id": 63, "section": "Section V — Renal Arterial Blood Flow", "stem": "The glomerulus is unusual because it is a capillary bed between", "options": {"A": "two veins", "B": "two arterioles", "C": "one artery and one vein", "D": "one venule and one artery"}, "answer": "B", "rationale": "The glomerulus lies between two arterioles."}, {"id": 64, "section": "Section V — Renal Arterial Blood Flow", "stem": "The vessel entering the glomerulus is usually", "options": {"A": "the efferent arteriole", "B": "the afferent arteriole", "C": "the renal vein", "D": "the vasa recta"}, "answer": "B", "rationale": "Afferent enters."}, {"id": 65, "section": "Section V — Renal Arterial Blood Flow", "stem": "The vessel leaving the glomerulus is usually", "options": {"A": "the afferent arteriole", "B": "the efferent arteriole", "C": "the interlobular vein", "D": "the arcuate artery Drainage"}, "answer": "B", "rationale": "Efferent exits."}, {"id": 66, "section": "Section VI — Postglomerular Circulation and Venous Drainage", "stem": "In cortical nephrons, the efferent arteriole usually forms", "options": {"A": "vasa recta", "B": "peritubular capillaries", "C": "arcuate veins", "D": "venous sinuses"}, "answer": "B", "rationale": "Cortical efferent arterioles form peritubular capillaries."}, {"id": 67, "section": "Section VI — Postglomerular Circulation and Venous Drainage", "stem": "In juxtamedullary nephrons, the efferent arteriole forms the", "options": {"A": "peritubular plexus only", "B": "vasa recta", "C": "renal vein", "D": "interlobular artery"}, "answer": "B", "rationale": "Juxtamedullary efferent arterioles form vasa recta."}, {"id": 68, "section": "Section VI — Postglomerular Circulation and Venous Drainage", "stem": "Peritubular capillaries are especially associated with", "options": {"A": "cortical nephrons", "B": "juxtamedullary nephrons only", "C": "the renal pelvis", "D": "the bladder"}, "answer": "A", "rationale": "Peritubular capillaries accompany cortical nephrons."}, {"id": 69, "section": "Section VI — Postglomerular Circulation and Venous Drainage", "stem": "Vasa recta are especially associated with", "options": {"A": "cortical nephrons", "B": "juxtamedullary nephrons", "C": "the ureter", "D": "the bladder trigone"}, "answer": "B", "rationale": "Vasa recta accompany juxtamedullary nephrons."}, {"id": 70, "section": "Section VI — Postglomerular Circulation and Venous Drainage", "stem": "The vasa recta are important for maintaining the", "options": {"A": "bladder pressure", "B": "medullary osmotic gradient", "C": "glomerular capsule", "D": "renal fascia"}, "answer": "B", "rationale": "They preserve the medullary gradient."}, {"id": 71, "section": "Section VI — Postglomerular Circulation and Venous Drainage", "stem": "Which capillary network primarily surrounds PCTs and DCTs in the cortex?", "options": {"A": "Vasa recta", "B": "Peritubular capillaries", "C": "Portal veins", "D": "Glomerular sinusoids"}, "answer": "B", "rationale": "Peritubular capillaries surround cortical tubules."}, {"id": 72, "section": "Section VI — Postglomerular Circulation and Venous Drainage", "stem": "The correct venous drainage sequence is", "options": {"A": "interlobular → arcuate → interlobar → renal vein", "B": "arcuate → interlobular → renal vein → interlobar", "C": "interlobar → arcuate → interlobular → renal vein", "D": "renal vein → interlobar → arcuate → interlobular"}, "answer": "A", "rationale": "Interlobular → arcuate → interlobar → renal vein."}, {"id": 73, "section": "Section VI — Postglomerular Circulation and Venous Drainage", "stem": "The renal vein drains into the", "options": {"A": "abdominal aorta", "B": "inferior vena cava", "C": "portal vein", "D": "internal iliac vein"}, "answer": "B", "rationale": "Renal vein → IVC."}, {"id": 74, "section": "Section VI — Postglomerular Circulation and Venous Drainage", "stem": "Which vessel is absent from the standard renal venous pathway?", "options": {"A": "Interlobular vein", "B": "Arcuate vein", "C": "Segmental vein", "D": "Interlobar vein"}, "answer": "C", "rationale": "No standard segmental vein in the classic sequence."}, {"id": 75, "section": "Section VI — Postglomerular Circulation and Venous Drainage", "stem": "Which complete sequence is correct?", "options": {"A": "Glomerulus → afferent arteriole → peritubular capillary", "B": "Glomerulus → efferent arteriole → peritubular capillary or vasa recta", "C": "Efferent arteriole → glomerulus → afferent arteriole", "D": "Arcuate vein → glomerulus → renal artery"}, "answer": "B", "rationale": "Glomerulus → efferent → peritubular/vasa recta."}, {"id": 76, "section": "Section VII — Renal Innervation", "stem": "The renal plexus accompanies the", "options": {"A": "renal vein", "B": "renal artery", "C": "ureter only", "D": "inferior vena cava only"}, "answer": "B", "rationale": "The renal plexus accompanies the renal artery."}, {"id": 77, "section": "Section VII — Renal Innervation", "stem": "The renal plexus enters the kidney through the", "options": {"A": "renal papilla", "B": "renal hilum", "C": "minor calyx", "D": "renal capsule"}, "answer": "B", "rationale": "It enters through the hilum."}, {"id": 78, "section": "Section VII — Renal Innervation", "stem": "Most autonomic innervation to the kidney is", "options": {"A": "sympathetic", "B": "somatic motor", "C": "parasympathetic only", "D": "sensory only"}, "answer": "A", "rationale": "Renal autonomic supply is predominantly sympathetic."}, {"id": 79, "section": "Section VII — Renal Innervation", "stem": "Adrenergic receptors are primarily associated with the", "options": {"A": "parasympathetic system", "B": "sympathetic system", "C": "somatic system", "D": "enteric system"}, "answer": "B", "rationale": "Adrenergic generally means sympathetic."}, {"id": 80, "section": "Section VII — Renal Innervation", "stem": "Muscarinic receptors are generally associated with", "options": {"A": "sympathetic stimulation", "B": "parasympathetic stimulation", "C": "somatic motor control", "D": "sensory transmission only"}, "answer": "B", "rationale": "Muscarinic generally indicates parasympathetic activity."}, {"id": 81, "section": "Section VII — Renal Innervation", "stem": "The greater splanchnic nerves arise mainly from", "options": {"A": "T5-T9", "B": "T10-T11", "C": "T12", "D": "S2-S4"}, "answer": "A", "rationale": "Greater splanchnic: T5-T9."}, {"id": 82, "section": "Section VII — Renal Innervation", "stem": "The lesser splanchnic nerves arise mainly from", "options": {"A": "T5-T9", "B": "T10-T11", "C": "712", "D": "L4-L5"}, "answer": "B", "rationale": "Lesser splanchnic: T10-T11."}, {"id": 83, "section": "Section VII — Renal Innervation", "stem": "The least splanchnic nerve arises mainly from", "options": {"A": "T6", "B": "T12", "C": "L5", "D": "S2"}, "answer": "B", "rationale": "Least splanchnic: T12."}, {"id": 84, "section": "Section VII — Renal Innervation", "stem": "Which nerve carries important renal visceral sensory fibers?", "options": {"A": "Least splanchnic nerve", "B": "Pudendal nerve", "C": "Phrenic nerve", "D": "Femoral nerve"}, "answer": "A", "rationale": "Least splanchnic carries important renal afferents."}, {"id": 85, "section": "Section VII — Renal Innervation", "stem": "Sympathetic stimulation of renal arterioles generally causes", "options": {"A": "vasodilation", "B": "vasoconstriction", "C": "no change in blood flow", "D": "bladder contraction"}, "answer": "B", "rationale": "Sympathetic stimulation constricts renal arterioles."}, {"id": 86, "section": "Section VII — Renal Innervation", "stem": "Strong sympathetic activity generally causes renal blood flow to", "options": {"A": "increase", "B": "decrease", "C": "remain unchanged", "D": "reverse direction"}, "answer": "B", "rationale": "Renal blood flow decreases."}, {"id": 87, "section": "Section VII — Renal Innervation", "stem": "Strong sympathetic activity generally causes urine production to", "options": {"A": "increase", "B": "decrease", "C": "remain unchanged", "D": "stop permanently"}, "answer": "B", "rationale": "Urine production generally decreases."}, {"id": 88, "section": "Section VII — Renal Innervation", "stem": "Renal pain is commonly perceived in the", "options": {"A": "shoulder", "B": "flank or costovertebral angle", "C": "anterior chest", "D": "hand"}, "answer": "B", "rationale": "Renal pain is often felt in the flank/CVA."}, {"id": 89, "section": "Section VII — Renal Innervation", "stem": "The exact parasympathetic role of the vagus nerve in kidney function is", "options": {"A": "completely absent", "B": "not clearly defined", "C": "the primary source of renal pain", "D": "responsible for voluntary urination"}, "answer": "B", "rationale": "Vagal renal function is not clearly defined."}, {"id": 90, "section": "Section VIII — Nephron Organization", "stem": "The functional unit of the kidney is the", "options": {"A": "renal pyramid", "B": "nephron", "C": "renal pelvis", "D": "ureter"}, "answer": "B", "rationale": "Nephron is the functional unit."}, {"id": 91, "section": "Section VIII — Nephron Organization", "stem": "The renal corpuscle consists of the", "options": {"A": "PCT and DCT", "B": "glomerulus and Bowman's capsule", "C": "loop of Henle and collecting duct", "D": "papilla and minor calyx"}, "answer": "B", "rationale": "Corpuscle = glomerulus + Bowman's capsule."}, {"id": 92, "section": "Section VIII — Nephron Organization", "stem": "Which structure is part of the renal tubule?", "options": {"A": "Proximal convoluted tubule", "B": "Loop of Henle", "C": "Distal convoluted tubule", "D": "All of the above"}, "answer": "D", "rationale": "PCT, loop, and DCT form the renal tubule."}, {"id": 93, "section": "Section VIII — Nephron Organization", "stem": "The proximal convoluted tubule begins at the", "options": {"A": "vascular pole", "B": "tubular pole", "C": "renal papilla", "D": "major calyx"}, "answer": "B", "rationale": "PCT begins at the tubular pole."}, {"id": 94, "section": "Section VIII — Nephron Organization", "stem": "The loop of Henle begins after the", "options": {"A": "distal convoluted tubule", "B": "proximal convoluted tubule", "C": "collecting duct", "D": "renal pelvis"}, "answer": "B", "rationale": "Loop follows the PCT."}, {"id": 95, "section": "Section VIII — Nephron Organization", "stem": "The distal convoluted tubule begins after the", "options": {"A": "thick ascending limb", "B": "thin descending limb", "C": "proximal convoluted tubule", "D": "collecting duct"}, "answer": "A", "rationale": "DCT follows the thick ascending limb."}, {"id": 96, "section": "Section VIII — Nephron Organization", "stem": "Collecting tubules receive filtrate from multiple", "options": {"A": "renal arteries", "B": "distal convoluted tubules", "C": "glomeruli directly", "D": "major calyces"}, "answer": "B", "rationale": "Multiple DCTs empty into collecting tubules."}, {"id": 97, "section": "Section IX — Cortical versus Juxtamedullary Nephrons", "stem": "Approximately what percentage of nephrons are cortical?", "options": {"A": "15%", "B": "50%", "C": "85%", "D": "100%"}, "answer": "C", "rationale": "Approximately 85% are cortical."}, {"id": 98, "section": "Section IX — Cortical versus Juxtamedullary Nephrons", "stem": "Approximately what percentage of nephrons are juxtamedullary?", "options": {"A": "15%", "B": "25%", "C": "50%", "D": "85%"}, "answer": "A", "rationale": "Approximately 15% are juxtamedullary."}, {"id": 99, "section": "Section IX — Cortical versus Juxtamedullary Nephrons", "stem": "Cortical nephrons usually have", "options": {"A": "long loops extending deeply into medulla", "B": "short loops", "C": "no loop of Henle", "D": "vasa recta only"}, "answer": "B", "rationale": "Cortical nephrons have short loops."}, {"id": 100, "section": "Section IX — Cortical versus Juxtamedullary Nephrons", "stem": "Juxtamedullary nephrons have", "options": {"A": "short loops", "B": "long loops extending into medulla", "C": "no glomeruli", "D": "only peritubular capillaries"}, "answer": "B", "rationale": "Juxtamedullary nephrons have long loops."}, {"id": 101, "section": "Section IX — Cortical versus Juxtamedullary Nephrons", "stem": "Which nephron type is most important for concentrating urine?", "options": {"A": "Cortical", "B": "Juxtamedullary", "C": "Papillary", "D": "Vesical"}, "answer": "B", "rationale": "Juxtamedullary nephrons concentrate urine."}, {"id": 102, "section": "Section IX — Cortical versus Juxtamedullary Nephrons", "stem": "Which nephron type is associated with vasa recta?", "options": {"A": "Cortical", "B": "Juxtamedullary", "C": "Both equally only", "D": "Neither"}, "answer": "B", "rationale": "They are associated with vasa recta."}, {"id": 103, "section": "Section IX — Cortical versus Juxtamedullary Nephrons", "stem": "Which nephron type is associated mainly with peritubular capillaries?", "options": {"A": "Cortical", "B": "Juxtamedullary", "C": "Papillary", "D": "Medullary collecting"}, "answer": "A", "rationale": "Cortical nephrons have peritubular capillaries."}, {"id": 104, "section": "Section IX — Cortical versus Juxtamedullary Nephrons", "stem": "Juxtamedullary renal corpuscles are located near the", "options": {"A": "renal capsule", "B": "corticomedullary junction", "C": "renal pelvis", "D": "ureteropelvic junction"}, "answer": "B", "rationale": "Their corpuscles lie near the corticomedullary junction."}, {"id": 105, "section": "Section X — Glomerular Filtration Barrier", "stem": "The glomerulus is contained within", "options": {"A": "the renal pelvis", "B": "Bowman's capsule", "C": "the collecting duct", "D": "the ureter"}, "answer": "B", "rationale": "Glomerulus is enclosed by Bowman's capsule."}, {"id": 106, "section": "Section X — Glomerular Filtration Barrier", "stem": "The first layer of the filtration barrier is the", "options": {"A": "podocyte slit diaphragm", "B": "fenestrated capillary endothelium", "C": "renal capsule", "D": "urothelium"}, "answer": "B", "rationale": "First filtration layer is fenestrated endothelium."}, {"id": 107, "section": "Section X — Glomerular Filtration Barrier", "stem": "The glomerular endothelium is", "options": {"A": "nonfenestrated", "B": "fenestrated", "C": "stratified squamous", "D": "transitional"}, "answer": "B", "rationale": "Glomerular capillaries are fenestrated."}, {"id": 108, "section": "Section X — Glomerular Filtration Barrier", "stem": "The fenestrations permit passage of", "options": {"A": "blood cells", "B": "water and small solutes", "C": "large plasma proteins only", "D": "platelets"}, "answer": "B", "rationale": "Fenestrations permit water and small solutes."}, {"id": 109, "section": "Section X — Glomerular Filtration Barrier", "stem": "The glomerular basement membrane lies between the", "options": {"A": "renal capsule and cortex", "B": "endothelium and podocytes", "C": "PCT and DCT", "D": "ureter and bladder"}, "answer": "B", "rationale": "Basement membrane lies between endothelium and podocytes."}, {"id": 110, "section": "Section X — Glomerular Filtration Barrier", "stem": "The basement membrane contains negatively charged", "options": {"A": "collagen only", "B": "proteoglycans", "C": "skeletal muscle fibers", "D": "urothelial cells"}, "answer": "B", "rationale": "It contains negatively charged proteoglycans."}, {"id": 111, "section": "Section X — Glomerular Filtration Barrier", "stem": "The negative charge of the filtration barrier helps prevent passage of", "options": {"A": "sodium", "B": "albumin", "C": "glucose", "D": "urea"}, "answer": "B", "rationale": "Negative charge repels albumin."}, {"id": 112, "section": "Section X — Glomerular Filtration Barrier", "stem": "Podocytes form the", "options": {"A": "parietal layer", "B": "visceral layer of Bowman's capsule", "C": "ureteral mucosa", "D": "bladder muscularis"}, "answer": "B", "rationale": "Podocytes form the visceral layer."}, {"id": 113, "section": "Section X — Glomerular Filtration Barrier", "stem": "The foot processes of podocytes are called", "options": {"A": "papillae", "B": "pedicels", "C": "fimbriae", "D": "rugae"}, "answer": "B", "rationale": "Foot processes are pedicels."}, {"id": 114, "section": "Section X — Glomerular Filtration Barrier", "stem": "Spaces between podocyte foot processes are called", "options": {"A": "fenestrations only", "B": "filtration slits", "C": "ureteral openings", "D": "calyces"}, "answer": "B", "rationale": "Spaces between pedicels are filtration slits."}, {"id": 115, "section": "Section X — Glomerular Filtration Barrier", "stem": "Which substance is normally filtered?", "options": {"A": "Red blood cells", "B": "Albumin in large quantities", "C": "Glucose", "D": "Platelets"}, "answer": "C", "rationale": "Glucose is normally filtered."}, {"id": 116, "section": "Section X — Glomerular Filtration Barrier", "stem": "Which substance is normally retained within the blood?", "options": {"A": "Urea", "B": "Water", "C": "Most plasma proteins", "D": "Sodium"}, "answer": "C", "rationale": "Most plasma proteins are retained."}, {"id": 117, "section": "Section X — Glomerular Filtration Barrier", "stem": "Which substance normally passes through the glomerular filter?", "options": {"A": "Amino acids", "B": "Electrolytes", "C": "Vitamins", "D": "All of the above"}, "answer": "D", "rationale": "Amino acids, electrolytes, and vitamins are filtered."}, {"id": 118, "section": "Section XI — Renal Corpuscle Anatomy", "stem": "The parietal layer of Bowman's capsule is composed of", "options": {"A": "simple squamous epithelium", "B": "transitional epithelium", "C": "simple cuboidal epithelium", "D": "stratified squamous epithelium"}, "answer": "A", "rationale": "Parietal Bowman's layer is simple squamous."}, {"id": 119, "section": "Section XI — Renal Corpuscle Anatomy", "stem": "The visceral layer of Bowman's capsule is composed of", "options": {"A": "principal cells", "B": "podocytes", "C": "intercalated cells", "D": "macula densa cells"}, "answer": "B", "rationale": "Visceral layer contains podocytes."}, {"id": 120, "section": "Section XI — Renal Corpuscle Anatomy", "stem": "Filtrate first collects in the", "options": {"A": "vascular pole", "B": "capsular space", "C": "efferent arteriole", "D": "renal vein"}, "answer": "B", "rationale": "Filtrate enters capsular space."}, {"id": 121, "section": "Section XI — Renal Corpuscle Anatomy", "stem": "The vascular pole is the site where", "options": {"A": "the PCT begins", "B": "afferent and efferent arterioles enter and leave", "C": "urine enters the minor calyx", "D": "the collecting duct begins"}, "answer": "B", "rationale": "Arterioles enter and leave at vascular pole."}, {"id": 122, "section": "Section XI — Renal Corpuscle Anatomy", "stem": "The tubular pole is the site where", "options": {"A": "Bowman's capsule continues into the PCT", "B": "the renal artery enters the kidney", "C": "the ureter enters the bladder", "D": "the DCT contacts the afferent arteriole"}, "answer": "A", "rationale": "PCT begins at tubular pole."}, {"id": 123, "section": "Section XII — Juxtaglomerular Apparatus", "stem": "The juxtaglomerular apparatus helps regulate", "options": {"A": "blood pressure", "B": "GFR", "C": "renin release", "D": "All of the above"}, "answer": "D", "rationale": "JGA regulates BP, GFR, and renin release."}, {"id": 124, "section": "Section XII — Juxtaglomerular Apparatus", "stem": "The macula densa consists of specialized cells of the", "options": {"A": "proximal tubule", "B": "distal tubule", "C": "collecting duct", "D": "glomerular capsule"}, "answer": "B", "rationale": "Macula densa consists of specialized DCT cells."}, {"id": 125, "section": "Section XII — Juxtaglomerular Apparatus", "stem": "The macula densa senses changes in", "options": {"A": "blood glucose only", "B": "NaCl concentration and tubular flow", "C": "plasma protein concentration only", "D": "urinary bilirubin"}, "answer": "B", "ratio roximal Convoluted Tubule", "stem": "The PCT is lined by", "options": {"A": "simple squamous epithelium", "B": "simple cuboidal epithelium", "C": "transitional epithelium", "D": "stratified squamous epithelium"}, "answer": "B", "rationale": "PCT has simple cuboidal epithelium."}, {"id": 133, "section": "Section XIII — Proximal Convoluted Tubule", "stem": "The PCT has a prominent", "options": {"A": "ciliary border", "B": "brush border", "C": "keratin layer", "D": "collagen capsule"}, "answer": "B", "rationale": "It has a prominent brush border."}, {"id": 134, "section": "Section XIII — Proximal Convoluted Tubule", "stem": "The brush border is formed by", "options": {"A": "cilia", "B": "microvilli", "C": "pedicels", "D": "fenestrations"}, "answer": "B", "rationale": "Brush border consists of microvilli."}, {"id": 135, "section": "Section XIII — Proximal Convoluted Tubule", "stem": "The PCT is a major site of", "options": {"A": "urine storage", "B": "bulk reabsorption", "C": "voluntary sphincter control", "D": "renal arterial branching"}, "answer": "B", "rationale": "PCT performs bulk reabsorption."}, {"id": 136, "section": "Section XIII — Proximal Convoluted Tubule", "stem": "Which substance is substantially reabsorbed in the PCT?", "options": {"A": "Glucose", "B": "Amino acids", "C": "Sodium", "D": "All of the above"}, "answer": "D", "rationale": "It reabsorbs glucose, amino acids, sodium, and much more."}, {"id": 137, "section": "Section XIII — Proximal Convoluted Tubule", "stem": "The PCT lumen often appears", "options": {"A": "very clear and smooth", "B": "fuzzy due to microvilli", "C": "lined by transitional epithelium", "D": "filled with red blood cells"}, "answer": "B", "rationale": "Brush border creates a fuzzy lumen."}, {"id": 138, "section": "Section XIII — Proximal Convoluted Tubule", "stem": "PCT cells usually have relatively", "options": {"A": "pale cytoplasm and no mitochondria", "B": "eosinophilic cytoplasm", "C": "stratified nuclei", "D": "keratinized : "DCT begins after thick ascending limb."}, {"id": 145, "section": "Section XIV — Loop of Henle and DCT", "stem": "The DCT returns near the", "options": {"A": "ureter", "B": "afferent arteriole", "C": "renal vein", "D": "bladder wall"}, "answer": "B", "rationale": "DCT returns near afferent arteriole."}, {"id": 146, "section": "Section XIV — Loop of Henle and DCT", "stem": "Compared with PCT cells, DCT cells have", "options": {"A": "more microvilli", "B": "fewer microvilli", "C": "a thicker keratin layer", "D": "podocyte foot processes"}, "answer": "B", "rationale": "DCT has fewer microvilli."}, {"id": 147, "section": "Section XIV — Loop of Henle and DCT", "stem": "Compared with the PCT, the DCT lumen appears", "options": {"A": "fuzzier and narrower", "B": "clearer and wider", "C": "completely closed", "D": "filled with colloid"}, "answer": "B", "rationale": "DCT has a clearer, wider lumen."}, {"id": 148, "section": "Section XIV — Loop of Henle and DCT", "stem": "The DCT is important for fine control of", "options": {"A": "sodium and potassium", "B": "calcium", "C": "acid-base balance", "D": "All of the above"}, "answer": "D", "rationale": "It fine-tunes electrolytes and acid-base balance."}, {"id": 149, "section": "Section XV — Collecting Tubules and Ducts", "stem": "Collecting tubules receive fluid from multiple", "options": {"A": "PCTs", "B": "DCTs", "C": "glomeruli directly", "D": "ureters"}, "answer": "B", "rationale": "Collecting tubules receive fluid from DCTs."}, {"id": 150, "section": "Section XV — Collecting Tubules and Ducts", "stem": "Collecting ducts ultimately drain into", "options": {"A": "papillary ducts", "B": "renal veins", "C": "afferent arterioles", "D": "Bowman's space"}, "answer": "A", "rationale": "Collecting ducts drain into papillary ducts."}, {"id": 151, "section": "Section XV — Collecting Tubules and Ducts", "stem": "Principal cells respond to", "options": {"A": "ADH and aldosterone", "B": "TSH and ACTH", "C": "insulin and glucagon", "D": "PTH only"}, "answer": "A", "rationale": "Principal cells respond to ADH and aldosterone."}, {"id": 152, "section": "Section XV — Collecting Tubules and Ducts", "stem": "Principal cells participate in", "options": {"A": "sodium reabsorption", "B": "water reabsorption", "C": "potassium secretion", "D": "All of the above"}, "answer": "D", "rationale": "They regulate water, sodium, and potassium."}, {"id": 153, "section": "Section XV — Collecting Tubules and Ducts", "stem": "Intercalated cells are important for", "options": {"A": "acid-base balance", "B": "production of renin", "C": "filtration of red blood cells", "D": "ureteral peristalsis"}, "answer": "A", "rationale": "Intercalated cells regulate acid-base balance."}, {"id": 154, "section": "Section XV — Collecting Tubules and Ducts", "stem": "Collecting ducts are lined by epithelium that ranges from", "options": {"A": "cuboidal to columnar", "B": "simple squamous only", "C": "transitional only", "D": "keratinized squamous"}, "answer": "A", "rationale": "Collecting epithelium ranges from cuboidal to columnar."}, {"id": 155, "section": "Section XV — Collecting Tubules and Ducts", "stem": "Which sequence is correct?", "options": {"A": "Collecting duct → papillary duct → renal papilla", "B": "Papillary duct → collecting duct → renal papilla", "C": "Renal papilla → collecting duct → minor calyx", "D": "DCT → renal papilla → collecting duct"}, "answer": "A", "rationale": "Collecting duct → papillary duct → papilla."}, {"id": 156, "section": "Section XV — Collecting Tubules and Ducts", "stem": "Final adjustments to water reabsorption can occur in the", "options": {"A": "collecting duct", "B": "renal pelvis only", "C": "major calyx", "D": "ureter"}, "answer": "A", "rationale": "ADH-dependent water adjustment occurs in collecting ducts."}, {"id": 157, "section": "Section XVI — Urinary Flow", "stem": "Filtrate first enters the", "options": {"A": "renal pelvis", "B": "Bowman's space", "C": "ureter", "D": "collecting duct"}, "answer": "B", "rationale": "Filtrate first enters Bowman's space."}, {"id": 158, "section": "Section XVI — Urinary Flow", "stem": "Which structure follows Bowman's space?", "options": {"A": "Proximal convoluted tubule", "B": "Distal convoluted tubule", "C": "Collecting duct", "D": "Minor calyx"}, "answer": "A", "rationale": "Bowman's space drains to PCT."}, {"id": 159, "section": "Section XVI — Urinary Flow", "stem": "Which structure follows the PCT?", "options": {"A": "Descending limb", "B": "DCT", "C": "Collecting duct", "D": "Renal pelvis"}, "answer": "A", "rationale": "PCT is followed by descending limb."}, {"id": 160, "section": "Section XVI — Urinary Flow", "stem": "Which structure follows the ascending limb?", "options": {"A": "PCT", "B": "DCT", "C": "Renal papilla", "D": "Ureter"}, "answer": "B", "rationale": "Ascending limb is followed by DCT."}, {"id": 161, "section": "Section XVI — Urinary Flow", "stem": "Which structure follows the DCT?", "options": {"A": "Collecting tubule or duct", "B": "Renal pelvis", "C": "Minor calyx", "D": "Ureter"}, "answer": "A", "rationale": "DCT drains into collecting tubule/duct."}, {"id": 162, "section": "Section XVI — Urinary Flow", "stem": "Which structure follows the papillary duct?", "options": {"A": "Renal papilla", "B": "Ureter", "C": "Bladder", "D": "Renal vein"}, "answer": "A", "rationale": "Papillary duct opens at renal papilla."}, {"id": 163, "section": "Section XVI — Urinary Flow", "stem": "Which structure receives urine from the renal papilla?", "options": {"A": "Major calyx", "B": "Minor calyx", "C": "Renal pelvis", "D": "Ureter"}, "answer": "B", "rationale": "Minor calyx receives papillary urine."}, {"id": 164, "section": "Section XVI — Urinary Flow", "stem": "Which structure follows the major calyx?", "options": {"A": "Renal pelvis", "B": "Minor calyx", "C": "Papillary duct", "D": "Collecting duct"}, "answer": "A", "rationale": "Major calyx drains to renal pelvis."}, {"id": 165, "section": "Section XVI — Urinary Flow", "stem": "Which complete sequence is correct?", "options": {"A": "Bowman's space → PCT → loop → DCT → collecting duct → papilla → minor calyx", "B": "Bowman's space → DCT → PCT → collecting duct → papilla", "C": "PCT → Bowman's space → loop → DCT → ureter", "D": "Glomerulus → major calyx → minor calyx → renal pelvis"}, "answer": "A", "rationale": "Correct intrarenal pathway."}, {"id": 166, "section": "Section XVI — Urinary Flow", "stem": "Which sequence correctly describes extrarenal urine flow?", "options": {"A": "Renal pelvis → ureter → bladder → urethra", "B": "Ureter → renal pelvis → bladder → urethra", "C": "Bladder → ureter → urethra → renal pelvis", "D": "Renal pelvis → bladder → ureter → urethra"}, "answer": "A", "rationale": "Pelvis → ureter → bladder → urethra."}, {"id": 167, "section": "Section XVII — Ureter Anatomy", "stem": "The ureters are", "options": {"A": "intraperitoneal hollow organs", "B": "retroperitoneal muscular tubes", "C": "endocrine glands", "D": "venous structures"}, "answer": "B", "rationale": "Ureters are retroperitoneal muscular tubes."}, {"id": 168, "section": "Section XVII — Ureter Anatomy", "stem": "The average ureter is approximately", "options": {"A": "5 cm long", "B": "10 cm long", "C": "25 cm long", "D": "50 cm long"}, "answer": "C", "rationale": "Average length is approximately 25 cm."}, {"id": 169, "section": "Section XVII — Ureter Anatomy", "stem": "The ureter begins at the", "options": {"A": "minor calyx", "B": "renal pelvis", "C": "renal papilla", "D": "collecting duct"}, "answer": "B", "rationale": "Ureter begins at renal pelvis."}, {"id": 170, "section": "Section XVII — Ureter Anatomy", "stem": "The ureter enters the bladder at the", "options": {"A": "anterior superior wall", "B": "posterolateral wall", "C": "bladder apex only", "D": "internal urethral opening"}, "answer": "B", "rationale": "It enters posterolateral bladder wall."}, {"id": 171, "section": "Section XVII — Ureter Anatomy", "stem": "The oblique pass "A": "serosa", "B": "adventitia", "C": "muscularis mucosae", "D": "fibrous renal capsule"}, "answer": "B", "rationale": "Adventitia is the outer ureteral layer."}, {"id": 178, "section": "Section XVII — Ureter Anatomy", "stem": "Ureteral pain fibers enter spinal cord levels approximately", "options": {"A": "C1-C4", "B": "T12-L2", "C": "S4-S5 only", "D": "T1-T4 only"}, "answer": "B", "rationale": "Ureteral pain fibers commonly enter T12-L2."}, {"id": 179, "section": "Section XVII — Ureter Anatomy", "stem": "Ureteral pain may radiate from the flank toward the", "options": {"A": "shoulder", "B": "groin", "C": "upper arm", "D": "jaw"}, "answer": "B", "rationale": "Pain often radiates toward the groin."}, {"id": 180, "section": "Section XVIII — Ureteral Constrictions and Relationships", "stem": "The first common site of ureteral obstruction is the", "options": {"A": "ureteropelvic junction", "B": "urethral meatus", "C": "renal artery", "D": "glomerular capsule"}, "answer": "A", "rationale": "First constriction: UPJ."}, {"id": 181, "section": "Section XVIII — Ureteral Constrictions and Relationships", "stem": "A second common site of obstruction is where the ureter crosses the", "options": {"A": "iliac vessels", "B": "renal vein", "C": "inferior mesenteric vein", "D": "portal vein"}, "answer": "A", "rationale": "Second: crossing of iliac vessels."}, {"id": 182, "section": "Section XVIII — Ureteral Constrictions and Relationships", "stem": "The third common obstruction site is the", "options": {"A": "ureterovesical junction", "B": "renal papilla", "C": "major calyx", "D": "afferent arteriole"}, "answer": "A", "rationale": "Third: UVJ."}, {"id": 183, "section": "Section XVIII — Ureteral Constrictions and Relationships", "stem": "Which sequence lists the classic stone sites correctly?", "options": {"A": "UPJ → iliac crossing → UVJ", "B": "UVJ → renal papilla → urethra", "C": "Major calyx → renal vein → UPJ", "D": "Bladder neck → urethra → renal pelvis"}, "answer": "A", "rati r", "D": "inhibit the detrusor"}, "answer": "B", "rationale": "Parasympathetics relax/open internal outlet."}, {"id": 235, "section": "Section XXIII — Urethral Epithelium and Sphincters", "stem": "During urine storage, sympathetic stimulation tends to", "options": {"A": "relax the bladder neck", "B": "contract the bladder neck", "C": "contract the detrusor", "D": "open the urethral outlet"}, "answer": "B", "rationale": "Sympathetics contract bladder neck during storage."}, {"id": 236, "section": "Section XXIII — Urethral Epithelium and Sphincters", "stem": "Voluntary urinary control depends primarily on the", "options": {"A": "internal sphincter", "B": "external urethral sphincter", "C": "renal plexus", "D": "ureteral muscularis"}, "answer": "B", "rationale": "Voluntary control uses external sphincter."}, {"id": 237, "section": "Section XXIII — Urethral Epithelium and Sphincters", "stem": "Damage to the pudendal nerve may result in", "options": {"A": "loss of voluntary urinary continence", "B": "loss of glomerular filtration", "C": "loss of renal blood supply", "D": "obstruction of the ureteropelvic junction"}, "answer": "A", "rationale": "Pudendal damage may cause incontinence."}, {"id": 238, "section": "Section XXIV — Histology and Cell-Type Comparison", "stem": "The glomerular capillaries are lined by", "options": {"A": "fenestrated endothelium", "B": "transitional epithelium", "C": "simple cuboidal epithelium", "D": "stratified squamous epithelium"}, "answer": "A", "rationale": "Glomerular capillaries have fenestrated endothelium."}, {"id": 239, "section": "Section XXIV — Histology and Cell-Type Comparison", "stem": "The parietal layer of Bowman's capsule is", "options": {"A": "simple squamous epithelium", "B": "simple cuboidal epithelium", "C": "transitional epithelium", "D": "pseudostratified epithelium"}, "answer": "A", "rationale": "Bowman's parietal layer is simple squamous."}, {"id": 240, "section": "Section XXIV — Histology and Cell-Type Comparison", "ste o podocyte foot processes would disrupt the", "options": {"A": "filtration slits", "B": "bladder trigone", "C": "ureteral muscularis", "D": "renal fascia"}, "answer": "A", "rationale": "Podocyte damage disrupts filtration slits."}, {"id": 259, "section": "Section XXV — Clinical Application", "stem": "Damage to the macula densa would impair sensing of", "options": {"A": "tubular NaC!", "B": "oxygen in the renal interstitium only", "C": "urinary glucose only", "D": "bladder stretch"}, "answer": "A", "rationale": "Macula densa senses tubular NaCl."}, {"id": 260, "section": "Section XXV — Clinical Application", "stem": "Damage to juxtaglomerular cells would directly impair secretion of", "options": {"A": "renin", "B": "ADH", "C": "aldosterone", "D": "erythropoietin only"}, "answer": "A", "rationale": "Granular cells secrete renin."}, {"id": 261, "section": "Section XXV — Clinical Application", "stem": "Loss of erythropoietin-producing renal cells may lead to", "options": {"A": "anemia", "B": "polycythemia", "C": "urinary obstruction", "D": "hypercalcemia"}, "answer": "A", "rationale": "Reduced EPO may cause anemia."}, {"id": 262, "section": "Section XXV — Clinical Application", "stem": "A blockage at the renal papilla would first prevent urine from entering the", "options": {"A": "minor calyx", "B": "major calyx", "C": "renal pelvis", "D": "ureter"}, "answer": "A", "rationale": "Papilla normally drains to minor calyx."}, {"id": 263, "section": "Section XXV — Clinical Application", "stem": "A blockage of a major calyx would prevent urine from reaching the", "options": {"A": "renal pelvis", "B": "collecting duct", "C": "glomerulus", "D": "renal artery"}, "answer": "A", "rationale": "Major calyx drains to renal pelvis."}, {"id": 264, "section": "Section XXV — Clinical Application", "stem": "A lesion of the renal sympathetic nerves would most directly alter", "options": {"A": "renal vascular tone", "B": "external urethral sphincter control", "C": "bladder rugae", "D": "urethral epithelium For Questions 265-280, select the structure that comes next."}, "answer": "A", "rationale": "Renal sympathetic nerves regulate vascular tone."}, {"id": 265, "section": "Section XXVI — Pathway Questions", "stem": "Renal artery →", "options": {"A": "Segmental artery", "B": "Interlobular artery", "C": "Afferent arteriole", "D": "Arcuate artery"}, "answer": "A", "rationale": "Renal artery → segmental artery."}, {"id": 266, "section": "Section XXVI — Pathway Questions", "stem": "Segmental artery →", "options": {"A": "Lobar artery", "B": "Renal vein", "C": "Interlobular vein", "D": "Efferent arteriole"}, "answer": "A", "rationale": "Segmental → lobar."}, {"id": 267, "section": "Section XXVI — Pathway Questions", "stem": "Lobar artery →", "options": {"A": "Interlobar artery", "B": "Arcuate artery", "C": "Afferent arteriole", "D": "Glomerulus"}, "answer": "A", "rationale": "Lobar → interlobar."}, {"id": 268, "section": "Section XXVI — Pathway Questions", "stem": "Interlobar artery →", "options": {"A": "Arcuate artery", "B": "Interlobular artery", "C": "Renal vein", "D": "Segmental artery"}, "answer": "A", "rationale": "Interlobar → arcuate."}, {"id": 269, "section": "Section XXVI — Pathway Questions", "stem": "Arcuate artery →", "options": {"A": "Interlobular artery", "B": "Interlobar artery", "C": "Afferent arteriole directly only", "D": "Renal vein"}, "answer": "A", "rationale": "Arcuate → interlobular."}, {"id": 270, "section": "Section XXVI — Pathway Questions", "stem": "Interlobular artery →", "options": {"A": "Afferent arteriole", "B": "Efferent arteriole", "C": "Glomerular vein", "D": "Renal pelvis"}, "answer": "A", "rationale": "Interlobular → afferent arteriole."}, {"id": 271, "section": "Section XXVI — Pathway Questions", "stem": "Afferent arteriole →", "options": {"A": "Glomerulus", "B": "Efferent arteriole directly without a capillary bed", "C": "Peritubular capillary", "D": "Renal vein"}, "answer": "A", "rationale": "Afferent → glomerulus."}, {"id": 272, "section": "Section XXVI — Pathway Questions", "stem": "Glomerulus →", "options": {"A": "Efferent arteriole", "B": "Afferent arteriole", "C": "Interlobular vein", "D": "Arcuate vein"}, "answer": "A", "rationale": "Glomerulus → efferent arteriole."}, {"id": 273, "section": "Section XXVI — Pathway Questions", "stem": "Efferent arteriole →", "options": {"A": "Peritubular capillaries or vasa recta", "B": "Renal pelvis", "C": "Minor calyx", "D": "Bowman's space"}, "answer": "A", "rationale": "Efferent → peritubular capillaries/vasa recta."}, {"id": 274, "section": "Section XXVI — Pathway Questions", "stem": "Bowman's space →", "options": {"A": "PCT", "B": "DCT", "C": "Collecting duct", "D": "Minor calyx"}, "answer": "A", "rationale": "Bowman's space → PCT."}, {"id": 275, "section": "Section XXVI — Pathway Questions", "stem": "PCT →", "options": {"A": "Descending limb", "B": "DCT", "C": "Renal papilla", "D": "Ureter"}, "answer": "A", "rationale": "PCT → descending limb."}, {"id": 276, "section": "Section XXVI — Pathway Questions", "stem": "Ascending limb →", "options": {"A": "DCT", "B": "PCT", "C": "Minor calyx", "D": "Collecting duct directly"}, "answer": "A", "rationale": "Ascending limb → DCT."}, {"id": 277, "section": "Section XXVI — Pathway Questions", "stem": "DCT →", "options": {"A": "Collecting tubule", "B": "PCT", "C": "Renal pelvis", "D": "Major calyx"}, "answer": "A", "rationale": "DCT → collecting tubule."}, {"id": 278, "section": "Section XXVI — Pathway Questions", "stem": "Papillary duct →", "options": {"A": "Renal papilla", "B": "Major calyx", "C": "Ureter", "D": "Bladder"}, "answer": "A", "rationale": "Papillary duct → renal papilla."}, {"id": 279, "section": "Section XXVI — Pathway Questions", "stem": "Renal papilla →", "options": {"A": "Minor calyx", "B": "Major calyx", "C": "Renal pelvis", "D": "Ureter"}, "answer": "A", "rationale": "Papilla → minor calyx."}, {"id": 280, "section": "Section XXVI — Pathway Questions", "stem": "Renal pelvis →", "options": {"A": "Ureter", "B": "Bladder", "C": "Urethra", "D": "Minor calyx"}, "answer": "A", "rationale": "Renal pelvis → ureter."}];
let pool=[], idx=0, score=0, answers=[], locked=false;

const secSel=document.getElementById('secSel');
const sections=[...new Set(ALL.map(q=>q.section))];
const optAll=document.createElement('option');
optAll.value='__ALL__'; optAll.textContent='Full Bank — all 280 questions';
secSel.appendChild(optAll);
sections.forEach(s=>{
  const c=ALL.filter(q=>q.section===s).length;
  const o=document.createElement('option');
  o.value=s; o.textContent=s+' ('+c+')';
  secSel.appendChild(o);
});

document.getElementById('startBtn').onclick=start;
document.getElementById('nextBtn').onclick=next;
document.getElementById('quitBtn').onclick=()=>{ if(confirm('Exit and see your score so far?')) finish(); };

function start(){
  const v=secSel.value;
  pool = v==='__ALL__' ? ALL.slice() : ALL.filter(q=>q.section===v);
  idx=0; score=0; answers=[];
  document.getElementById('setup').classList.add('hide');
  document.getElementById('done').classList.add('hide');
  document.getElementById('quiz').classList.remove('hide');
  render();
}

function render(){
  locked=false;
  const q=pool[idx];
  document.getElementById('secTag').textContent=q.section;
  document.getElementById('qnum').textContent='Question '+(idx+1)+' of '+pool.length;
  document.getElementById('stem').textContent=q.stem;
  document.getElementById('posLbl').textContent='#'+q.id;
  document.getElementById('scoreLbl').textContent=score;
  document.getElementById('pfill').style.width=((idx)/pool.length*100)+'%';
  const fb=document.getElementById('fb'); fb.className='feedback';
  const nb=document.getElementById('nextBtn'); nb.disabled=true;
  nb.textContent = idx===pool.length-1 ? 'See Results' : 'Next';
  const box=document.getElementById('opts'); box.innerHTML='';
  ['A','B','C','D'].forEach(L=>{
    const b=document.createElement('button');
    b.className='opt';
    b.innerHTML='<span class="let">'+L+'</span><span>'+esc(q.options[L])+'</span>';
    b.onclick=()=>choose(L,b);
    box.appendChild(b);
  });
}

function choose(L,btn){
  if(locked) return; locked=true;
  const q=pool[idx];
  const correct=q.answer;
  const btns=[...document.querySelectorAll('.opt')];
  btns.forEach(b=>b.disabled=true);
  const ok = L===correct;
  if(ok){ score++; btn.classList.add('correct'); }
  else{
    btn.classList.add('wrong');
    btns.find(b=>b.querySelector('.let').textContent===correct).classList.add('correct');
  }
  answers.push({id:q.id,stem:q.stem,chosen:L,correct:correct,ok:ok,
    options:q.options,rationale:q.rationale});
  const fb=document.getElementById('fb');
  fb.className='feedback show '+(ok?'ok':'no');
  document.getElementById('fbLbl').textContent = ok?'Correct':'Incorrect — answer: '+correct;
  document.getElementById('fbTxt').textContent=q.rationale;
  document.getElementById('scoreLbl').textContent=score;
  document.getElementById('nextBtn').disabled=false;
}

function next(){
  if(idx<pool.length-1){ idx++; render(); }
  else finish();
}

function finish(){
  document.getElementById('quiz').classList.add('hide');
  const total=answers.length;
  const pct= total? Math.round(score/total*100):0;
  let html='<div class="results"><div class="pct">You scored</div>'+
    '<div class="score">'+score+'<small>/'+total+'</small></div>'+
    '<div class="pct">'+pct+'% correct</div>'+
    '<div class="nav" style="max-width:340px;margin:0 auto"><button class="btn btn-ghost" id="againBtn">New Quiz</button>'+
    '<button class="btn btn-primary" id="retryBtn">Retry Section</button></div>';
  const missed=answers.filter(a=>!a.ok);
  if(missed.length){
    html+='<div class="review-head">Review missed ('+missed.length+')</div>';
    missed.forEach(a=>{
      html+='<div class="rev"><div class="rq"><b>#'+a.id+'.</b> '+esc(a.stem)+'</div>'+
        '<div class="ra">Your answer: <span class="your">'+a.chosen+'. '+esc(a.options[a.chosen])+'</span><br>'+
        'Correct: <b>'+a.correct+'. '+esc(a.options[a.correct])+'</b><br>'+
        '<em>'+esc(a.rationale)+'</em></div></div>';
    });
  } else if(total){
    html+='<div class="review-head">Perfect score — every question correct.</div>';
  }
  html+='</div>';
  const d=document.getElementById('done');
  d.innerHTML=html; d.classList.remove('hide');
  document.getElementById('againBtn').onclick=()=>{
    d.classList.add('hide'); document.getElementById('setup').classList.remove('hide');
  };
  document.getElementById('retryBtn').onclick=()=>{ idx=0;score=0;answers=[];
    d.classList.add('hide'); document.getElementById('quiz').classList.remove('hide'); render(); };
  window.scrollTo(0,0);
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
