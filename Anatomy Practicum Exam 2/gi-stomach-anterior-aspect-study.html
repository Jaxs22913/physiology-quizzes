<style>
  html, body { overscroll-behavior-y: contain; }
  #pull-refresh {
    position: fixed; top: 0; left: 0; right: 0; height: 0; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    background: transparent; z-index: 1000;
  }
  #pull-refresh svg { width: 100%; height: 44px; }
  #pull-refresh path {
    fill: none; stroke: #0f766e; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round;
    stroke-dasharray: 420; stroke-dashoffset: 420;
  }
  #pull-refresh.refreshing path { animation: ekg-sweep 0.9s linear infinite; }
  @keyframes ekg-sweep { 0% { stroke-dashoffset: 420; } 100% { stroke-dashoffset: -420; } }
</style>

<script>
(function () {
  const indicator = document.getElementById("pull-refresh");
  const path = indicator.querySelector("path");
  const pathLength = 420, threshold = 70, maxPull = 90;
  let startY = 0, pulling = false, refreshing = false;
  document.addEventListener("touchstart", function (e) {
    if (window.scrollY === 0 && !refreshing) { startY = e.touches[0].clientY; pulling = true; }
  }, { passive: true });
  document.addEventListener("touchmove", function (e) {
    if (!pulling || refreshing) return;
    var delta = e.touches[0].clientY - startY;
    if (delta > 0) {
      var dist = Math.min(delta * 0.5, maxPull);
      indicator.style.height = dist + "px";
      var progress = Math.min(dist / threshold, 1);
      path.style.strokeDashoffset = pathLength * (1 - progress);
    }
  }, { passive: true });
  document.addEventListener("touchend", function () {
    if (!pulling || refreshing) return;
    pulling = false;
    var currentHeight = parseInt(indicator.style.height || "0", 10);
    if (currentHeight >= threshold * 0.5) {
      refreshing = true;
      indicator.style.height = maxPull + "px";
      indicator.classList.add("refreshing");
      setTimeout(function () { location.reload(); }, 500);
    } else {
      indicator.style.height = "0px";
      path.style.strokeDashoffset = pathLength;
    }
  });
})();
</script>
