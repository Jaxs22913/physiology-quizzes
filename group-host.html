<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group Study — Host</title>
<style>
  :root{
    --ink:#161a24; --muted:#6b7280; --line:#e5e7ef; --paper:#f6f7fb; --card:#fff;
    --acc:#4f46e5; --acc2:#4338ca; --good:#16a34a; --goodbg:#eafaf0;
    --bad:#dc2626; --badbg:#fdecec; --shadow:0 1px 2px rgba(20,22,40,.05),0 10px 30px rgba(20,22,40,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);
    font:400 16px/1.6 ui-sans-serif,"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;
    padding:24px 16px 92px;}
  .wrap{max-width:680px;margin:0 auto}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:28px 26px}
  h1{font-size:22px;margin:0 0 4px;display:flex;align-items:center;gap:8px}
  .h1-icon{width:22px;height:22px;flex:none;color:var(--acc)}
  .sub{color:var(--muted);font-size:14px;margin:0 0 22px}
  label.row{display:flex;align-items:center;justify-content:space-between;gap:12px;font-size:14.5px;margin:0 0 14px;cursor:pointer}
  select, input[type=number]{font:inherit;padding:8px 10px;border-radius:8px;border:1px solid var(--line);background:var(--paper);color:var(--ink)}
  .btn{appearance:none;border:0;cursor:pointer;font:700 15px/1 ui-sans-serif;border-radius:12px;
    padding:14px 24px;background:var(--acc);color:#fff;transition:background .15s;width:100%}
  .btn:hover{background:var(--acc2)}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .btn.sec{background:#eceef6;color:var(--ink)}
  .hidden{display:none!important}
  .roomcode{font:800 54px/1 ui-monospace,Menlo,monospace;letter-spacing:.08em;text-align:center;color:var(--acc);margin:6px 0 4px}
  .roomcode-label{text-align:center;color:var(--muted);font-size:13px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:18px}
  .joinhint{text-align:center;color:var(--muted);font-size:13.5px;margin-bottom:22px}
  .playerlist{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 22px;min-height:32px}
  .pchip{background:var(--paper);border:1px solid var(--line);border-radius:999px;padding:6px 14px;font-size:13.5px;font-weight:600}
  .qnum{font:700 12px/1 ui-sans-serif;letter-spacing:.1em;text-transform:uppercase;color:var(--acc);margin-bottom:10px}
  .qtext{font:700 19px/1.4 ui-sans-serif;margin:0 0 20px}
  .choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
  .choice{border:1.5px solid var(--line);border-radius:12px;padding:14px 15px;font-size:14.5px}
  .choice.correct{border-color:var(--good);background:var(--goodbg)}
  .progress{color:var(--muted);font-size:13.5px;margin-bottom:16px;text-align:center}
  .timer{font:800 40px/1 ui-monospace,monospace;text-align:center;margin:0 0 16px;color:var(--acc)}
  .timer.low{color:var(--bad)}
  .lb-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-radius:10px;margin-bottom:6px;background:var(--paper);border:1px solid var(--line)}
  .lb-row .rank{font-weight:800;color:var(--muted);width:28px}
  .lb-row .name{flex:1;font-weight:600}
  .lb-row .score{font-weight:800;color:var(--acc)}
  .status-toast{text-align:center;color:var(--muted);font-size:14px;margin-top:8px}
  .field-label{display:block;font-size:14.5px;font-weight:600;margin-bottom:8px}
  .quiz-search-input{width:100%;font:inherit;font-size:15px;padding:11px 14px;border-radius:10px;
    border:1.5px solid var(--line);background:var(--paper);color:var(--ink)}
  .quiz-search-input:focus{outline:none;border-color:var(--acc)}
  .quiz-results{max-height:260px;overflow-y:auto;margin-top:8px;border-radius:10px}
  .quiz-result{display:flex;justify-content:space-between;align-items:center;gap:10px;
    padding:12px 14px;border-radius:10px;cursor:pointer;border:1.5px solid transparent}
  .quiz-result:hover{background:var(--paper)}
  .quiz-result .qr-title{font-weight:600;font-size:14.5px}
  .quiz-result .qr-count{color:var(--muted);font-size:12.5px;white-space:nowrap}
  .quiz-none{color:var(--muted);font-size:14px;padding:14px;text-align:center}
  .quiz-selected{display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:12px 14px;border-radius:10px;border:1.5px solid var(--acc);background:#eef0fd}
  .quiz-selected .qs-title{font-weight:700;font-size:14.5px}
  .quiz-selected .qs-count{color:var(--muted);font-size:12.5px}
  .quiz-change-btn{appearance:none;border:0;background:none;color:var(--acc);font:700 13px/1 inherit;cursor:pointer;padding:6px}
  .back-link{display:inline-flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13.5px;font-weight:600;margin-bottom:16px}
  .back-link:hover{color:var(--acc)}
  .host-code-badge{position:fixed;top:64px;left:14px;z-index:590;background:var(--card);
    border:1.5px solid var(--acc);border-radius:10px;padding:8px 14px;box-shadow:var(--shadow);
    display:flex;align-items:baseline;gap:8px}
  .host-code-badge .hcb-label{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700}
  .host-code-badge .hcb-value{font:800 18px/1 ui-monospace,Menlo,monospace;letter-spacing:.05em;color:var(--acc)}
  .pchip .pc-av{margin-right:6px}
  .answerer-avatars{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:0 0 16px}
  .answerer-avatar{font-size:26px;width:46px;height:46px;display:flex;align-items:center;justify-content:center;
    border-radius:50%;background:var(--paper);border:2px solid var(--line);filter:grayscale(100%);opacity:.5;
    transition:filter .25s,opacity .25s,transform .25s,border-color .25s}
  .answerer-avatar.answered{filter:grayscale(0%);opacity:1;border-color:var(--good);transform:scale(1.1)}
  .answerer-avatar.away{opacity:.3;border-color:var(--bad);position:relative}
  .answerer-avatar.away::after{content:"";position:absolute;left:2px;right:2px;top:50%;height:2px;background:var(--bad);transform:rotate(-15deg)}
  .lb-row.away{opacity:.55}
  .lb-row .left-tag{color:var(--bad);font-weight:700;font-size:11.5px;margin-left:6px}
  .podium{display:flex;align-items:flex-end;justify-content:center;gap:12px;margin:6px 0 26px;min-height:180px}
  .podium-slot{display:flex;flex-direction:column;align-items:center;width:30%;max-width:130px}
  .podium-avatar{font-size:36px;margin-bottom:4px}
  .podium-medal{font-size:20px;margin-bottom:2px}
  .podium-name{font-weight:700;font-size:13.5px;text-align:center;margin-bottom:3px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .podium-score{font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:700}
  .podium-riser{width:100%;border-radius:10px 10px 0 0}
  .podium-riser.first{height:116px;background:linear-gradient(180deg,#f5c344,#d89e1f)}
  .podium-riser.second{height:84px;background:linear-gradient(180deg,#b8c0cc,#8f99a8)}
  .podium-riser.third{height:60px;background:linear-gradient(180deg,#dba36a,#b97b41)}
  .footer-mark-ink { stroke: #1f2937; }
  .footer-mark-accent { stroke: #2563eb; }
  @media (prefers-color-scheme: dark) {
    .footer-mark-ink { stroke: #e5e7eb; }
    .footer-mark-accent { stroke: #60a5fa; }
  }
  /* On narrow viewports .wrap has no side margin for #host-code-badge to
     float in (unlike desktop, where it sits in the empty space left of the
     centered .wrap) -- it would otherwise sit directly on top of the header
     text. Reserve clearance instead of trying to squeeze the badge in. */
  @media (max-width: 480px) {
    header { margin-top: 46px; }
    .podium { gap: 6px; }
    .podium-slot { max-width: 96px; }
    .podium-avatar { font-size: 28px; }
    .podium-medal { font-size: 16px; }
    .podium-name { font-size: 12px; }
    .podium-score { font-size: 10.5px; }
  }
</style>
</head>

  <a href="index.html" aria-label="Back to home" style="pointer-events:auto;cursor:pointer;flex-shrink:0;display:block;">

    <path class="footer-mark-ink" d="M148,171 L198,88 L218,125" fill="none" stroke-width="10"/>

<div id="host-code-badge" class="host-code-badge hidden">
  <span class="hcb-label">Code</span>

<div class="wrap" style="padding-bottom:40px">
  <a href="index.html" class="back-link">← Back to home</a>
  <header style="margin-bottom:18px">
    <h1><svg class="h1-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h4M8 10v4M15 11h.01M18 13h.01"/></svg> Group Study — Host</h1>
    <p class="sub">Kahoot-style live session. Everyone joins with a room code, no account needed.</p>
  </header>

  <section id="setup" class="card">
    <label class="field-label">Quiz</label>
    <div id="quiz-picker">
      <input type="text" id="quiz-search" class="quiz-search-input" placeholder="Search quizzes…" autocomplete="off">
      <div id="quiz-results" class="quiz-results"></div>
    </div>
    <div id="quiz-selected-box" class="quiz-selected hidden" style="margin-bottom:14px">
      <div>
        <div class="qs-title" id="quiz-selected-title"></div>
        <div class="qs-count" id="quiz-selected-count"></div>
      </div>
      <button type="button" class="quiz-change-btn" id="quiz-change-btn">Change</button>
    </div>
    <label class="row" style="margin-top:14px">
      Timed questions
      <input type="checkbox" id="timed-toggle">
    </label>
    <label class="row" id="seconds-row">
      Seconds per question
      <input type="number" id="seconds-input" value="20" min="5" max="120" style="width:70px">
    </label>

    <p style="text-align:center;font-size:13.5px;color:var(--muted);margin:16px 0 0">
      Have a room code already? <a href="group-join.html" style="color:var(--acc);font-weight:600">Join a game →</a>
    </p>
  </section>

  <section id="lobby" class="card hidden">
    <div class="roomcode-label">Room code</div>
    <div class="roomcode" id="room-code-display">-----</div>
    <div class="joinhint">Have everyone go to <b id="join-url-hint"></b> and enter this code.</div>
    <div class="playerlist" id="player-list"></div>
    <button class="btn" id="start-btn" disabled>Waiting for players…</button>
  </section>

  <section id="question-screen" class="card hidden">
    <div class="qnum" id="q-num"></div>
    <div class="timer hidden" id="timer-display">20</div>
    <div class="qtext" id="q-text"></div>
    <div class="choices" id="q-choices"></div>
    <div class="answerer-avatars" id="answerer-avatars"></div>
    <div class="progress" id="answer-progress"></div>
    <button class="btn" id="reveal-btn">Reveal answer</button>

  <section id="reveal-screen" class="card hidden">
    <div class="qnum">Correct answer</div>
    <div class="qtext" id="reveal-q-text"></div>
    <div class="choices" id="reveal-choices"></div>
    <h3 style="font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:22px 0 10px">Leaderboard</h3>
    <div id="reveal-leaderboard"></div>
    <button class="btn" id="next-btn" style="margin-top:16px">Next question</button>

  <section id="finished-screen" class="card hidden">
    <h2 style="margin-top:0">🏁 Final results</h2>
    <div class="podium" id="podium"></div>
    <div id="final-leaderboard"></div>
    <button class="btn sec" id="new-game-btn" style="margin-top:18px">Start a new game</button>
  </section>

  <p class="status-toast" id="status-toast"></p>
</div>

<script>
(function () {
  var roomCode = null;
  var currentQuiz = null;
  var unsubRoom = null, unsubPlayers = null;
  var latestPlayers = [];
  var questionStartedAtMs = null;
  var timerInterval = null;

  function $(id) { return document.getElementById(id); }
  function show(id) { $(id).classList.remove("hidden"); }
  function hide(id) { $(id).classList.add("hidden"); }
  function toast(msg) { $("status-toast").textContent = msg || ""; }
  function playSound(name) { if (window.playSiteSound) window.playSiteSound(name); }

  var selectedQuizId = null;
  var groupStudyReady = false;

  function quizList() {
    var quizzes = window.GROUP_QUIZZES || {};
    return Object.keys(quizzes).map(function (id) {
      return { id: id, title: quizzes[id].title, count: quizzes[id].questions.length };
    });
  }

  function renderQuizResults(filterText) {
    var box = $("quiz-results");
    box.innerHTML = "";
    var list = quizList();
    var term = (filterText || "").trim().toLowerCase();
    if (term) list = list.filter(function (q) { return q.title.toLowerCase().indexOf(term) !== -1; });
    if (list.length === 0) {
      var none = document.createElement("div");
      none.className = "quiz-none";
      none.textContent = term ? ('No quizzes match "' + filterText + '".') : "No quizzes available yet.";
      box.appendChild(none);
      return;
    }
    list.forEach(function (q) {
      var row = document.createElement("div");
      row.className = "quiz-result";
      row.innerHTML = '<span class="qr-title"></span><span class="qr-count">' + q.count + ' questions</span>';
      row.querySelector(".qr-title").textContent = q.title;
      row.addEventListener("click", function () { selectQuiz(q.id); });
      box.appendChild(row);
    });
  }

  function selectQuiz(id) {
    var quizzes = window.GROUP_QUIZZES || {};
    if (!quizzes[id]) return;
    selectedQuizId = id;
    hide("quiz-picker");
    show("quiz-selected-box");
    $("quiz-selected-title").textContent = quizzes[id].title;
    $("quiz-selected-count").textContent = quizzes[id].questions.length + " questions";
    updateCreateBtnState();
  }

  function clearQuizSelection() {
    selectedQuizId = null;
    hide("quiz-selected-box");
    show("quiz-picker");
    $("quiz-search").value = "";
    renderQuizResults("");
    $("quiz-search").focus();
    updateCreateBtnState();
  }

  function updateCreateBtnState() {
    var btn = $("create-btn");
    if (!groupStudyReady) { btn.disabled = true; btn.textContent = "Connecting…"; return; }
    if (!selectedQuizId) { btn.disabled = true; btn.textContent = "Pick a quiz to continue"; return; }
    btn.disabled = false;
    btn.textContent = "Create room →";
  }

  $("quiz-search").addEventListener("input", function () { renderQuizResults(this.value); });
  $("quiz-change-btn").addEventListener("click", clearQuizSelection);

  $("timed-toggle").addEventListener("change", function () {
    $("seconds-row").classList.toggle("hidden", !this.checked);
  });
  $("seconds-row").classList.add("hidden");

  function waitForGroupStudy(cb) {
    if (window.GroupStudy && window.GroupStudy.whenReady) { cb(); return; }
    if (window.GroupStudy && window.GroupStudy.unavailable) { toast(window.GroupStudy.unavailable); return; }
    setTimeout(function () { waitForGroupStudy(cb); }, 150);
  }

  // group-questions.js is a separate `defer` script -- deferred scripts run
  // in document order right before DOMContentLoaded, which is AFTER this
  // inline (non-deferred) script block has already executed. So GROUP_QUIZZES
  // is not guaranteed to exist yet at this point; poll for it instead of
  // assuming it's ready, or the picker permanently shows "no quizzes" until
  // something else (e.g. typing in the search box) forces a re-render.
  function waitForGroupQuizzes(cb) {
    if (window.GROUP_QUIZZES) { cb(); return; }
    setTimeout(function () { waitForGroupQuizzes(cb); }, 50);
  }

  waitForGroupQuizzes(function () {
    renderQuizResults("");
    var urlParams = new URLSearchParams(location.search);
    var preselectId = urlParams.get("quiz");
    if (preselectId && window.GROUP_QUIZZES[preselectId]) {
      selectQuiz(preselectId);
    }
    updateCreateBtnState();
  });

  // A page reload used to lose the entire in-memory session (roomCode,
  // currentQuiz, listeners) even though the room itself was still alive in
  // Firestore -- the host would get kicked back to a blank setup screen with
  // no way back in except sharing a brand-new room code. sessionStorage (not
  // localStorage -- this is reload-recovery for the current tab only, not
  // something that should follow the host to another device) remembers the
  // room code across a reload so it can be validated and rejoined.
  var HOST_SESSION_KEY = "gsHostSession";

  // Firestore has no built-in disconnect/presence signal (unlike Realtime
  // Database), so "did this player leave" is inferred from a heartbeat
  // each player writes every ~10s (see group-study.js/group-join.html) --
  // a player is considered gone once their lastSeen is stale, checked on a
  // timer since staleness alone (time passing with no new write) never
  // triggers a fresh Firestore snapshot on its own.
  var STALE_MS = 25000;
  var staleCheckInterval = null;
  var announcedLeftUids = new Set();
  function isPlayerAway(p) {
    var seenMs = (p.lastSeen && p.lastSeen.toMillis) ? p.lastSeen.toMillis()
      : (p.joinedAt && p.joinedAt.toMillis) ? p.joinedAt.toMillis() : Date.now();
    return (Date.now() - seenMs) > STALE_MS;
  }

  function updateStartBtn() {
    if (lastRoomState && lastRoomState.status !== "lobby") return;
    var presentCount = latestPlayers.filter(function (p) { return !isPlayerAway(p); }).length;
    $("start-btn").disabled = presentCount === 0;
    $("start-btn").textContent = presentCount === 0
      ? "Waiting for players…"
      : "Start game (" + presentCount + " joined) →";
  }

  function refreshPresence() {
    if (!lastRoomState) return;
    renderPlayerList(latestPlayers);
    updateStartBtn();
    if (lastRoomState.status === "question") updateAnswerProgress();
    if (lastRoomState.status === "reveal") renderLeaderboard("reveal-leaderboard", latestPlayers);
    if (lastRoomState.status === "finished") {
      renderPodium("podium", latestPlayers);
      renderLeaderboard("final-leaderboard", latestPlayers, 3);
    }
    if (lastRoomState.status !== "lobby") {
      latestPlayers.forEach(function (p) {
        if (isPlayerAway(p) && !announcedLeftUids.has(p.uid)) {
          announcedLeftUids.add(p.uid);
          toast((p.avatar || "🦊") + " " + p.nickname + " left the game");
        } else if (!isPlayerAway(p) && announcedLeftUids.has(p.uid)) {
          announcedLeftUids.delete(p.uid); // reconnected (e.g. a reload)
        }
      });
    }
  }

  function enterRoom(code, quizId) {
    roomCode = code;
    currentQuiz = window.GROUP_QUIZZES[quizId];
    $("room-code-display").textContent = code;
    $("host-code-badge-value").textContent = code;
    show("host-code-badge");
    hide("setup");
    sessionStorage.setItem(HOST_SESSION_KEY, JSON.stringify({ code: code, quizId: quizId }));

    if (unsubPlayers) unsubPlayers();
    if (unsubRoom) unsubRoom();
    if (staleCheckInterval) clearInterval(staleCheckInterval);
    staleCheckInterval = setInterval(refreshPresence, 5000);

    var knownPlayerUids = null;
    unsubPlayers = GroupStudy.listenPlayers(roomCode, function (players) {
      if (knownPlayerUids && lastRoomState && lastRoomState.status === "lobby") {
        var isNewJoin = players.some(function (p) { return !knownPlayerUids.has(p.uid) && !isPlayerAway(p); });
        if (isNewJoin) playSound("join");
      }
      knownPlayerUids = new Set(players.filter(function (p) { return !isPlayerAway(p); }).map(function (p) { return p.uid; }));

      latestPlayers = players;
      renderPlayerList(players);
      updateAnswerProgress();
      if (lastRoomState) {
        if (lastRoomState.status === "reveal") renderLeaderboard("reveal-leaderboard", latestPlayers);
        if (lastRoomState.status === "finished") {
          renderPodium("podium", latestPlayers);
          renderLeaderboard("final-leaderboard", latestPlayers, 3);
        }
      }
      updateStartBtn();
    });
    unsubRoom = GroupStudy.listenRoom(roomCode, onRoomUpdate);
  }

  function tryResumeHostSession() {
    var raw = sessionStorage.getItem(HOST_SESSION_KEY);
    if (!raw) return;
    var saved = null;
    try { saved = JSON.parse(raw); } catch (e) { /* fall through to cleanup below */ }
    if (!saved || !saved.code) { sessionStorage.removeItem(HOST_SESSION_KEY); return; }

    GroupStudy.getRoom(saved.code).then(function (room) {
      if (!room || room.hostUid !== GroupStudy.currentUid()) {
        sessionStorage.removeItem(HOST_SESSION_KEY);
        return;
      }
      enterRoom(saved.code, room.quizId);
    }).catch(function () {
      sessionStorage.removeItem(HOST_SESSION_KEY);
    });
  }

  waitForGroupStudy(function () {
    GroupStudy.whenReady().then(function () {
      groupStudyReady = true;
      updateCreateBtnState();
      tryResumeHostSession();
    });
  });

  $("join-url-hint").textContent = location.href.replace(/group-host\.html.*/, "group-join.html");

  $("create-btn").addEventListener("click", function () {
    if (!selectedQuizId) return;
    $("create-btn").disabled = true;
    $("create-btn").textContent = "Creating…";
    var quizIdToCreate = selectedQuizId;
    var opts = {
      timedMode: $("timed-toggle").checked,
      secondsPerQuestion: parseInt($("seconds-input").value, 10) || 20
    };
    GroupStudy.createRoom(quizIdToCreate, opts).then(function (code) {
      enterRoom(code, quizIdToCreate);
    }).catch(function (err) {
      toast("Couldn't create room: " + (err && err.message));
      $("create-btn").disabled = false;
      $("create-btn").textContent = "Create room →";
    });
  });

  function renderPlayerList(players) {
    var box = $("player-list");
    box.innerHTML = "";
    // Lobby roster only ever shows players who are actually still present --
    // a player who closed the tab before the game started just quietly
    // drops off this list once their heartbeat goes stale, rather than
    // sitting there as a ghost entry the host has to mentally filter out.
    var present = (!lastRoomState || lastRoomState.status === "lobby")
      ? players.filter(function (p) { return !isPlayerAway(p); })
      : players;
    present.forEach(function (p) {
      var chip = document.createElement("span");
      chip.className = "pchip";
      chip.innerHTML = '<span class="pc-av">' + (p.avatar || "🦊") + '</span>';
      chip.appendChild(document.createTextNode(p.nickname));
      box.appendChild(chip);
    });
  }

  $("start-btn").addEventListener("click", function () {
    GroupStudy.startGame(roomCode);
  });

  $("reveal-btn").addEventListener("click", function () {
    GroupStudy.revealQuestion(roomCode);
  });

  $("next-btn").addEventListener("click", function () {
    var room = lastRoomState;
    var nextIdx = room.currentQuestionIndex + 1;
    if (nextIdx >= currentQuiz.questions.length) {
      GroupStudy.finishGame(roomCode);
    } else {
      GroupStudy.nextQuestion(roomCode, nextIdx);
    }
  });

  $("new-game-btn").addEventListener("click", function () {
    sessionStorage.removeItem(HOST_SESSION_KEY);
    location.reload();
  });

  var lastRoomState = null;
  function onRoomUpdate(room) {
    lastRoomState = room;
    if (!currentQuiz) currentQuiz = window.GROUP_QUIZZES[room.quizId];

    if (room.status === "lobby") {
      hide("question-screen"); hide("reveal-screen"); hide("finished-screen"); show("lobby");
      show("quiz-footer-logo");
    } else if (room.status === "question") {
      renderQuestionScreen(room);
    } else if (room.status === "reveal") {
      renderRevealScreen(room);
    } else if (room.status === "finished") {
      renderFinishedScreen();
    }
  }

  function stopTimer() {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  }

  function renderQuestionScreen(room) {
    hide("lobby"); hide("reveal-screen"); hide("finished-screen"); show("question-screen");
    // The fixed bottom-center homepage logo can end up flush against
    // reveal-btn/next-btn on short mobile viewports (compact card, few
    // choices) -- there's no reliable amount of padding that avoids this
    // for every content-length/scroll-position combination (a
    // scrollIntoView("end") on the button always lands its bottom edge at
    // the viewport bottom, same place the fixed footer always sits,
    // regardless of trailing space). Hiding the footer for just these two
    // screens sidesteps it entirely -- the "Back to home" link already at
    // the top of the page keeps every screen compliant with the sitewide
    // "every page needs a way home" requirement.
    hide("quiz-footer-logo");
    var q = currentQuiz.questions[room.currentQuestionIndex];
    $("q-num").textContent = "Question " + (room.currentQuestionIndex + 1) + " of " + currentQuiz.questions.length;
    $("q-text").textContent = q.q;
    var box = $("q-choices");
    box.innerHTML = "";
    q.choices.forEach(function (c) {
      var d = document.createElement("div");
      d.className = "choice";
      d.textContent = c;
      box.appendChild(d);
    });

    stopTimer();
    if (room.timedMode && room.currentQuestionStartedAt) {
      show("timer-display");
      questionStartedAtMs = room.currentQuestionStartedAt.toMillis();
      timerInterval = setInterval(function () {
        var remain = room.secondsPerQuestion - Math.floor((Date.now() - questionStartedAtMs) / 1000);
        if (remain <= 0) {
          $("timer-display").textContent = "0";
          stopTimer();
          GroupStudy.revealQuestion(roomCode);
          return;
        }
        $("timer-display").textContent = remain;
        $("timer-display").classList.toggle("low", remain <= 5);
      }, 250);
    } else {
      hide("timer-display");
    }

    updateAnswerProgress();
  }

  var lastTickedAnsweredCount = -1;
  function updateAnswerProgress() {
    if (!lastRoomState || lastRoomState.status !== "question") { lastTickedAnsweredCount = -1; return; }
    var idx = lastRoomState.currentQuestionIndex;
    var answeredCount = 0;

    var box = $("answerer-avatars");
    box.innerHTML = "";
    latestPlayers.forEach(function (p) {
      var didAnswer = p.answers && p.answers[idx] != null;
      if (didAnswer) answeredCount++;
      var away = isPlayerAway(p);
      var chip = document.createElement("div");
      chip.className = "answerer-avatar" + (didAnswer ? " answered" : "") + (away ? " away" : "");
      chip.textContent = p.avatar || "🦊";
      chip.title = p.nickname + (away ? " -- left the game" : didAnswer ? " -- answered" : " -- thinking...");
      box.appendChild(chip);
    });

    if (lastTickedAnsweredCount >= 0 && answeredCount > lastTickedAnsweredCount) playSound("tick");
    lastTickedAnsweredCount = answeredCount;

    $("answer-progress").textContent = answeredCount + " of " + latestPlayers.length + " answered";
  }

  var soundedRevealIndex = -1;
  function renderRevealScreen(room) {
    stopTimer();
    hide("question-screen"); hide("lobby"); hide("finished-screen"); show("reveal-screen");
    hide("quiz-footer-logo"); // see renderQuestionScreen for why
    if (soundedRevealIndex !== room.currentQuestionIndex) {
      soundedRevealIndex = room.currentQuestionIndex;
      playSound("reveal");
    }
    var q = currentQuiz.questions[room.currentQuestionIndex];
    $("reveal-q-text").textContent = q.q;
    var box = $("reveal-choices");
    box.innerHTML = "";
    q.choices.forEach(function (c, i) {
      var d = document.createElement("div");
      d.className = "choice" + (i === q.answer ? " correct" : "");
      d.textContent = c;
      box.appendChild(d);
    });
    renderLeaderboard("reveal-leaderboard", latestPlayers);
    var isLast = room.currentQuestionIndex >= currentQuiz.questions.length - 1;
    $("next-btn").textContent = isLast ? "Finish game →" : "Next question →";
  }

  var podiumSounded = false;
  function renderFinishedScreen() {
    stopTimer();
    hide("question-screen"); hide("reveal-screen"); hide("lobby"); show("finished-screen");
    show("quiz-footer-logo");
    if (!podiumSounded) { podiumSounded = true; playSound("podium"); }
    renderPodium("podium", latestPlayers);
    renderLeaderboard("final-leaderboard", latestPlayers, 3);
  }

  function renderPodium(containerId, players) {
    var box = $(containerId);
    if (!box) return;
    box.innerHTML = "";
    var sorted = players.slice().sort(function (a, b) { return (b.score || 0) - (a.score || 0); });
    var top3 = sorted.slice(0, 3);
    var order = [top3[1], top3[0], top3[2]];
    var classes = ["second", "first", "third"];
    var medals = ["🥈", "🥇", "🥉"];
    order.forEach(function (p, i) {
      if (!p) { var empty = document.createElement("div"); empty.className = "podium-slot"; box.appendChild(empty); return; }
      var slot = document.createElement("div");
      slot.className = "podium-slot";
      slot.innerHTML =
        '<div class="podium-avatar"></div>' +
        '<div class="podium-medal">' + medals[i] + '</div>' +
        '<div class="podium-name"></div>' +
        '<div class="podium-score"></div>' +
        '<div class="podium-riser ' + classes[i] + '"></div>';
      slot.querySelector(".podium-avatar").textContent = p.avatar || "🦊";
      slot.querySelector(".podium-name").textContent = p.nickname;
      slot.querySelector(".podium-score").textContent = (p.score || 0) + " pts";
      box.appendChild(slot);
    });
  }

  function renderLeaderboard(containerId, players, startIndex) {
    startIndex = startIndex || 0;
    var box = $(containerId);
    box.innerHTML = "";
    var sorted = players.slice().sort(function (a, b) { return (b.score || 0) - (a.score || 0); }).slice(startIndex);
    sorted.forEach(function (p, i) {
      var away = isPlayerAway(p);
      var row = document.createElement("div");
      row.className = "lb-row" + (away ? " away" : "");
      row.innerHTML =
        '<span class="rank">#' + (startIndex + i + 1) + '</span>' +
        '<span class="name">' + (p.avatar || "🦊") + ' <span></span>' + (away ? '<span class="left-tag">left</span>' : '') + '</span>' +
        '<span class="score">' + (p.score || 0) + '</span>';
      row.querySelector(".name span").textContent = p.nickname;
      box.appendChild(row);
    });
  }

})();
</script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () { navigator.serviceWorker.register("sw.js").catch(function(){}); });
  }
</script>
</body>
