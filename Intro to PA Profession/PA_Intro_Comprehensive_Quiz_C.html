<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intro to the PA Profession — Form C</title>
<style>
:root{--ink:#1c1a17;--paper:#fbf9f5;--accent:#7c2d2d;--accent2:#b08331;--accent3:#256d68;--line:#e4ddd1;--soft:#6d655a;--good:#256d3f;--bad:#9a2b2b;}
*{box-sizing:border-box;}
body{margin:0;background:var(--paper);color:var(--ink);font-family:Georgia,'Times New Roman',serif;line-height:1.5;}
header{background:var(--accent);color:#fff;padding:26px 22px;}
header h1{font-family:ui-sans-serif,system-ui,sans-serif;margin:0 0 4px;font-size:1.5rem;}
header p{margin:0;color:#f0ddd1;font-size:.9rem;}
.wrap{max-width:820px;margin:0 auto;padding:22px 18px 80px;}
.bar{position:sticky;top:0;background:var(--paper);padding:12px 0;border-bottom:1px solid var(--line);z-index:5;}
.progtrack{height:8px;background:#eae3d6;border-radius:6px;overflow:hidden;}
.progfill{height:100%;width:0;background:var(--accent2);transition:width .25s;}
.meta{display:flex;justify-content:space-between;font-family:ui-sans-serif,sans-serif;font-size:.8rem;color:var(--soft);margin-top:6px;}
.card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:22px 22px 18px;margin-top:18px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.iotag{display:inline-block;background:#f1ede3;color:var(--accent3);font-family:ui-sans-serif,sans-serif;font-size:.68rem;letter-spacing:.5px;padding:3px 9px;border-radius:10px;margin-bottom:12px;text-transform:uppercase;}
.qnum{font-family:ui-sans-serif,sans-serif;color:var(--soft);font-size:.8rem;}
.stem{font-size:1.1rem;margin:6px 0 16px;font-weight:600;}
.opt{display:block;width:100%;text-align:left;background:#faf7f1;border:1.5px solid var(--line);border-radius:8px;padding:12px 15px;margin-bottom:10px;font-family:Georgia,serif;font-size:1rem;cursor:pointer;transition:.12s;color:var(--ink);}
.opt:hover:not(:disabled){border-color:var(--accent2);background:#f6efe0;}
.opt:disabled{cursor:default;}
.opt .lbl{font-weight:bold;color:var(--accent);margin-right:8px;font-family:ui-sans-serif,sans-serif;}
.opt.correct{border-color:var(--good);background:#e8f3ec;}
.opt.correct .lbl{color:var(--good);}
.opt.wrong{border-color:var(--bad);background:#f6e7e7;}
.opt.wrong .lbl{color:var(--bad);}
.fb{margin-top:8px;font-family:ui-sans-serif,sans-serif;font-size:.9rem;padding:10px 14px;border-radius:8px;display:none;}
.fb.show{display:block;}
.fb.ok{background:#e8f3ec;color:var(--good);}
.fb.no{background:#f6e7e7;color:var(--bad);}
.nav{display:flex;justify-content:space-between;margin-top:18px;gap:12px;}
button.act{font-family:ui-sans-serif,sans-serif;font-size:.95rem;padding:11px 20px;border-radius:8px;border:none;cursor:pointer;background:var(--accent);color:#fff;}
button.act.ghost{background:#efe9dd;color:var(--ink);}
button.act:disabled{opacity:.4;cursor:default;}
.results{background:#fff;border:1px solid var(--line);border-radius:12px;padding:28px;margin-top:20px;text-align:center;}
.results h2{font-family:ui-sans-serif,sans-serif;color:var(--accent);}
.score{font-size:3rem;font-family:ui-sans-serif,sans-serif;color:var(--accent2);margin:8px 0;}
.iobreak{text-align:left;margin:18px auto 0;max-width:520px;}
.iobreak h3{font-family:ui-sans-serif,sans-serif;font-size:.9rem;color:var(--accent3);text-transform:uppercase;letter-spacing:1px;}
.iorow{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line);font-size:.95rem;}
.hidden{display:none;}
.rev-item{text-align:left;border-top:1px solid var(--line);padding:14px 0;}
.rev-q{font-weight:600;}
.rev-a{font-family:ui-sans-serif,sans-serif;font-size:.9rem;margin-top:4px;}
.rev-a .yours{color:var(--bad);} .rev-a .right{color:var(--good);}
</style>
</head>
<body>
<header>
  <h1>Introduction to the PA Profession</h1>
  <p>Comprehensive Quiz · Form C · 60 Questions · Class of 2028</p>
</header>
<div class="wrap">
  <div class="bar">
    <div class="progtrack"><div class="progfill" id="pf"></div></div>
    <div class="meta"><span id="pos">Question 1 of 60</span><span id="sc">Score: 0/0</span></div>
  </div>
  <div id="quiz"></div>
  <div id="end" class="hidden"></div>
</div>
<script>
const QUESTIONS = [{"q": "Times of societal turmoil such as war often create a shortage of which professionals, prompting new roles?", "o": ["Pharmacists", "Nurses", "Administrators", "Physicians"], "a": 3, "io": "History of the PA Profession"}, {"q": "Dr. Eugene Stead envisioned a new provider positioned between the level of nurse and:", "o": ["Doctor", "Administrator", "Technician", "Pharmacist"], "a": 0, "io": "History of the PA Profession"}, {"q": "The first PA program was nationally publicized by Reader's Digest and which magazine?", "o": ["Life", "Newsweek", "Look", "Time"], "a": 2, "io": "History of the PA Profession"}, {"q": "In the same year the first Duke PA program formed (1965), which two federal programs were created?", "o": ["Medicare and Medicaid", "FEHB and VA", "ACA and HMOs", "TRICARE and CHIP"], "a": 0, "io": "History of the PA Profession"}, {"q": "Which stage of development involves 'acceptance and institutionalization of the profession among health occupations'?", "o": ["Maturation", "Evaluation", "Ideology", "Implementation"], "a": 0, "io": "History of the PA Profession"}, {"q": "Implementation of the PA profession primarily occurred during which period?", "o": ["1980-1985", "1990-1995", "1966-1972", "1955-1960"], "a": 2, "io": "History of the PA Profession"}, {"q": "Amendments to medical practice acts allowing PA practice were first made in NC, NY, CA, and:", "o": ["Washington", "Texas", "Florida", "Colorado"], "a": 3, "io": "History of the PA Profession"}, {"q": "The 1971 Health Manpower Act provided what for PA programs?", "o": ["Accreditation", "Certification", "Licensure", "Federal funding"], "a": 3, "io": "History of the PA Profession"}, {"q": "The first AAPA meeting (1973) was held in Wichita Falls, TX at which location?", "o": ["Sheppard Air Force Base", "Grady Hospital", "A VA hospital", "Duke University"], "a": 0, "io": "History of the PA Profession"}, {"q": "In 1992, which branches of service began commissioning PAs?", "o": ["Coast Guard only", "Navy only", "All branches of the armed services", "Army only"], "a": 2, "io": "History of the PA Profession"}, {"q": "The 100,000th PA was certified in which year?", "o": ["2012", "2021", "2010", "2001"], "a": 0, "io": "History of the PA Profession"}, {"q": "In 2014, NCCPA changed recertification to occur every how many years?", "o": ["6", "5", "10", "2"], "a": 2, "io": "History of the PA Profession"}, {"q": "The COVID pandemic notably increased PA utilization especially in telemedicine and:", "o": ["Radiology", "Pathology", "Mental health", "Surgery"], "a": 2, "io": "History of the PA Profession"}, {"q": "In 2026, how many accredited entry-level PA programs existed?", "o": ["222", "330", "322", "476"], "a": 1, "io": "History of the PA Profession"}, {"q": "Which of the PAHx core values refers to being the 'primary repository' of the profession's history?", "o": ["Dedication", "Recognition", "Credibility", "Engagement"], "a": 2, "io": "History of the PA Profession"}, {"q": "Approximately how many accredited PA programs does ARC-PA report?", "o": ["476", "322", "222", "330"], "a": 1, "io": "PA Organizations"}, {"q": "ARC-PA accreditation for clinical postgraduate programs is described as a(n):", "o": ["Federal requirement", "Voluntary process", "State requirement", "Mandatory process"], "a": 1, "io": "PA Organizations"}, {"q": "Which standards category do ARC-PA standards address?", "o": ["Malpractice rates", "Salary benchmarks", "Faculty qualifications", "Reimbursement schedules"], "a": 2, "io": "PA Organizations"}, {"q": "PAEA's student section provides information on paying for PA school and the National:", "o": ["Institutes of Health", "Health Service Corps", "Guard", "Board of Medical Examiners"], "a": 1, "io": "PA Organizations"}, {"q": "The NCCPA assures the public that certified PAs maintain the knowledge and cognitive skills to practice:", "o": ["Independently", "Safely and effectively", "Without supervision", "In any state"], "a": 1, "io": "PA Organizations"}, {"q": "Which certificate program does NCCPA administer in addition to certification exams?", "o": ["PACKRAT", "OSCE", "CASPA", "CAQ"], "a": 3, "io": "PA Organizations"}, {"q": "Which is listed as a CAQ offered by NCCPA?", "o": ["Anesthesiology", "Nephrology", "Pathology", "Radiology"], "a": 1, "io": "PA Organizations"}, {"q": "The AAPA vision emphasizes PAs transforming health through patient-centered and what kind of practice?", "o": ["Team-based", "Independent", "Solo", "Physician-led"], "a": 0, "io": "PA Organizations"}, {"q": "How many officially recognized specialty organizations are within the AAPA House of Delegates?", "o": ["58", "22", "15", "27"], "a": 3, "io": "PA Organizations"}, {"q": "The SAAAPA board includes how many regional directors?", "o": ["9", "6", "5", "3"], "a": 1, "io": "PA Organizations"}, {"q": "Which PAF value is listed alongside 'Making a Difference' and 'Inspiring the Next Generation'?", "o": ["Lobbying Congress", "Certifying PAs", "Accrediting Programs", "Supporting Patient Education"], "a": 3, "io": "PA Organizations"}, {"q": "FAPA holds an annual conference primarily for what purpose?", "o": ["Accreditation", "Certification testing", "CME", "Licensure exams"], "a": 2, "io": "PA Organizations"}, {"q": "Student members of FAPA may serve on but generally may not do what with committees?", "o": ["Vote on chapter business", "Attend them", "Receive publications", "Chair them (except Student Affairs)"], "a": 3, "io": "PA Organizations"}, {"q": "The PA History Society website is:", "o": ["nccpa.net", "aapa.org", "arc-pa.org", "pahx.org"], "a": 3, "io": "PA Organizations"}, {"q": "The Student Academy delegation is the largest in the HOD at how many delegates?", "o": ["15", "22", "13", "27"], "a": 1, "io": "PA Organizations"}, {"q": "Which PA competency domain covers 'demonstrate a commitment to practicing medicine in ethically and legally appropriate ways'?", "o": ["Professionalism and ethics", "Interprofessional collaboration", "Society and population health", "Person-centered care"], "a": 0, "io": "Professional Practice"}, {"q": "The core competencies were originally developed in response to a growing demand for:", "o": ["Accountability and assessment", "Independent practice", "Higher salaries", "Shorter training"], "a": 0, "io": "Professional Practice"}, {"q": "On PANCE, questions cover 7 knowledge/skill areas and how many disease/disorder categories?", "o": ["10", "20", "7", "13"], "a": 3, "io": "Professional Practice"}, {"q": "The PANCE is administered at which testing centers?", "o": ["Prometric", "Pearson VUE", "ETS", "LSAC"], "a": 1, "io": "Professional Practice"}, {"q": "PANCE results are usually available within approximately how long?", "o": ["1 month", "1 week", "2 weeks", "24 hours"], "a": 2, "io": "Professional Practice"}, {"q": "The PANRE recertification exam allots how many hours to complete?", "o": ["3 hours", "6 hours", "5 hours", "2 hours"], "a": 2, "io": "Professional Practice"}, {"q": "During PANRE, reference material availability is:", "o": ["Full access allowed", "Open-book", "Limited formulary only", "No reference material"], "a": 3, "io": "Professional Practice"}, {"q": "In Florida, PAs are regulated in part by the Medical Practice Act numbered:", "o": ["458.347", "459.022", "456", "64B8-30"], "a": 0, "io": "Professional Practice"}, {"q": "A Florida temporary PA license expires how long after receipt of exam scores?", "o": ["7 days", "30 days", "1 year", "90 days"], "a": 1, "io": "Professional Practice"}, {"q": "A Florida temporary PA license may be granted a maximum of how many times?", "o": ["Three times", "Unlimited", "Twice", "Once"], "a": 2, "io": "Professional Practice"}, {"q": "Which body establishes a formulary of medicinal drugs that a Florida PA may NOT prescribe?", "o": ["The Florida PA Council", "AAPA", "NCCPA", "FAPA"], "a": 0, "io": "Professional Practice"}, {"q": "The Professionals Resource Network (PRN) in Florida addresses:", "o": ["Malpractice claims", "Impairing health conditions/substance misuse", "Billing disputes", "Licensure applications"], "a": 1, "io": "Professional Practice"}, {"q": "Which is TRUE regarding PA billing under Medicaid/TRICARE?", "o": ["TRICARE reimburses PAs at 85%; incident-to not permitted", "Incident-to is always used", "Medicaid never covers PA services", "TRICARE reimburses at 50%"], "a": 0, "io": "Professional Practice"}, {"q": "Regarding restraint and seclusion, PA orders are time-limited to what range depending on patient age?", "o": ["24 hours", "6-8 hours", "12 hours", "1-4 hours"], "a": 3, "io": "Professional Practice"}, {"q": "Which is a service PAs are NOT permitted to certify or order?", "o": ["Performing an MSE", "Certifying terminal illness for hospice", "Prescriptions", "Ordering routine labs"], "a": 1, "io": "Professional Practice"}, {"q": "A Patient-Centered Medical Home (PCMH) focuses primarily on:", "o": ["Inpatient psychiatry", "Emergency care", "Primary care coordination", "Specialty surgery"], "a": 2, "io": "Professional Practice"}, {"q": "As of January 2025, Medicare had approximately how many ACOs?", "o": ["476", "676", "176", "1,000"], "a": 0, "io": "Professional Practice"}, {"q": "Medicare Part B covers which services?", "o": ["Prescription drugs", "Hospital services", "Managed care plans", "Outpatient services"], "a": 3, "io": "Professional Practice"}, {"q": "Effective interprofessional collaboration requires effective communication enhanced by talking and:", "o": ["Actively listening", "Supervising", "Documenting", "Delegating"], "a": 0, "io": "Health Care is Teamwork"}, {"q": "Which advanced practice nurse administers anesthesia and earns among the highest nursing salaries?", "o": ["CNM", "LPN", "CRNA", "Clinical Nurse Specialist"], "a": 2, "io": "Health Care is Teamwork"}, {"q": "A genetic counselor is certified by which board?", "o": ["ARC-PA", "ABGC (American Board of Genetic Counseling)", "FSMB", "NCCPA"], "a": 1, "io": "Health Care is Teamwork"}, {"q": "A chiropractor holds which degree?", "o": ["Doctor of Physical Therapy", "Doctor of Podiatric Medicine", "Doctor of Osteopathy", "Doctor of Chiropractic"], "a": 3, "io": "Health Care is Teamwork"}, {"q": "Which provider recently gained oral (in addition to topical) medication prescribing privileges in Florida?", "o": ["Audiologist", "Dietitian", "Podiatrist", "Optometrist"], "a": 3, "io": "Health Care is Teamwork"}, {"q": "A speech-language pathologist requires which degree?", "o": ["Master's", "Doctorate", "Bachelor's", "Associate's"], "a": 0, "io": "Health Care is Teamwork"}, {"q": "Which team member manages resources under 'administration' in patient-centered care?", "o": ["Nursing", "Housekeeping", "Administration", "Maintenance"], "a": 2, "io": "Health Care is Teamwork"}, {"q": "A podiatrist provides medical and surgical care of the feet, ankles, and:", "o": ["Hands", "Lower extremities", "Spine", "Shoulders"], "a": 1, "io": "Health Care is Teamwork"}, {"q": "Comprehensive care in primary care refers to providing:", "o": ["A full range of services", "Surgical services", "Specialty-only care", "Only urgent services"], "a": 0, "io": "PAs & Clinical Practice"}, {"q": "Accessible care means the provider serves as the:", "o": ["Consultant only", "First point of contact", "Specialist referral", "Last resort"], "a": 1, "io": "PAs & Clinical Practice"}, {"q": "The Joint Commission is best described as a driver of quality improvement and:", "o": ["Certification", "Licensure", "Patient safety", "Reimbursement"], "a": 2, "io": "Professionalism"}, {"q": "Which describes patient-centered care's shift in focus?", "o": ["Away from patient input", "Toward administrative control", "Toward insurer priorities", "Toward including patient and family perspectives"], "a": 3, "io": "Health Care is Teamwork"}];
let idx=0, score=0, answered=0;
const responses = new Array(QUESTIONS.length).fill(null);
const quiz=document.getElementById('quiz');
const pf=document.getElementById('pf'), pos=document.getElementById('pos'), sc=document.getElementById('sc');
const LETTERS=['A','B','C','D'];

function render(){
  const q=QUESTIONS[idx];
  const chosen=responses[idx];
  let opts=q.o.map((t,i)=>{
    let cls='opt';
    if(chosen!==null){
      if(i===q.a) cls+=' correct';
      else if(i===chosen.pick && !chosen.correct) cls+=' wrong';
    }
    const dis = chosen!==null ? 'disabled' : '';
    return `<button class="${cls}" ${dis} onclick="pick(${i})"><span class="lbl">${LETTERS[i]}</span>${escapeHtml(t)}</button>`;
  }).join('');
  let fb='';
  if(chosen!==null){
    fb = chosen.correct
      ? `<div class="fb ok show">Correct.</div>`
      : `<div class="fb no show">Incorrect. The correct answer is ${LETTERS[q.a]}: ${escapeHtml(q.o[q.a])}</div>`;
  }
  quiz.innerHTML=`<div class="card">
    <span class="iotag">${escapeHtml(q.io)}</span>
    <div class="qnum">Question ${idx+1}</div>
    <div class="stem">${escapeHtml(q.q)}</div>
    ${opts}${fb}
    <div class="nav">
      <button class="act ghost" onclick="prev()" ${idx===0?'disabled':''}>Back</button>
      ${idx<QUESTIONS.length-1
         ? `<button class="act" onclick="next()" ${chosen===null?'disabled':''} id="nextb">Next</button>`
         : `<button class="act" onclick="finish()" ${answered<QUESTIONS.length?'disabled':''} id="nextb">See Results</button>`}
    </div>
  </div>`;
  pos.textContent=`Question ${idx+1} of ${QUESTIONS.length}`;
  sc.textContent=`Score: ${score}/${answered}`;
  pf.style.width=(answered/QUESTIONS.length*100)+'%';
}
function pick(i){
  if(responses[idx]!==null) return;
  const q=QUESTIONS[idx];
  const correct=(i===q.a);
  responses[idx]={pick:i,correct};
  answered++; if(correct) score++;
  render();
}
function next(){ if(idx<QUESTIONS.length-1){idx++;render();} }
function prev(){ if(idx>0){idx--;render();} }
function finish(){
  const io={};
  QUESTIONS.forEach((q,i)=>{
    if(!io[q.io]) io[q.io]={c:0,t:0};
    io[q.io].t++;
    if(responses[i]&&responses[i].correct) io[q.io].c++;
  });
  let iohtml=Object.entries(io).map(([k,v])=>`<div class="iorow"><span>${escapeHtml(k)}</span><span>${v.c}/${v.t}</span></div>`).join('');
  const pct=Math.round(score/QUESTIONS.length*100);
  let rev=QUESTIONS.map((q,i)=>{
    const r=responses[i];
    if(r&&r.correct) return '';
    const yours = r? q.o[r.pick] : '(no answer)';
    return `<div class="rev-item"><div class="rev-q">${i+1}. ${escapeHtml(q.q)}</div>
      <div class="rev-a"><span class="yours">Your answer: ${escapeHtml(yours)}</span><br>
      <span class="right">Correct: ${escapeHtml(q.o[q.a])}</span></div></div>`;
  }).join('');
  document.querySelector('.bar').classList.add('hidden');
  quiz.classList.add('hidden');
  const end=document.getElementById('end');
  end.classList.remove('hidden');
  end.innerHTML=`<div class="results">
    <h2>Quiz Complete — Form C</h2>
    <div class="score">${score}/${QUESTIONS.length}</div>
    <div style="font-family:ui-sans-serif,sans-serif;color:var(--soft)">${pct}%</div>
    <div class="iobreak"><h3>Breakdown by Topic</h3>${iohtml}</div>
    <div style="margin-top:22px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <button class="act" onclick="location.reload()">Retake</button>
      <button class="act ghost" onclick="toggleReview()">Review Missed</button>
    </div>
    <div id="review" class="hidden" style="margin-top:20px">${rev||'<p>Perfect score — nothing to review!</p>'}</div>
  </div>`;
  window.scrollTo(0,0);
}
function toggleReview(){document.getElementById('review').classList.toggle('hidden');}
function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
render();
</script>
</body>
</html>
