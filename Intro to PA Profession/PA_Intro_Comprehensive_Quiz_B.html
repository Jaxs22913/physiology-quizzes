<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intro to the PA Profession — Form B</title>
<style>
:root{--ink:#1c1a17;--paper:#fbf9f5;--accent:#7c2d2d;--accent2:#b08331;--accent3:#256d68;--line:#e4ddd1;--soft:#6d655a;--good:#256d3f;--bad:#9a2b2b;}
*{box-sizing:border-box;}
body{margin:0;background:var(--paper);color:var(--ink);font-family:Georgia,'Times New Roman',serif;line-height:1.5;}
header{background:var(--accent);color:#fff;padding:26px 22px;}
header h1{font-family:ui-sans-serif,system-ui,sans-serif;margin:0 0 4px;font-size:1.5rem;}
header p{margin:0;color:#f0ddd1;font-size:.9rem;}
.wrap{max-width:820px;margin:0 auto;padding:22px 18px 80px;}
.bar{position:sticky;top:0;background:var(--paper);padding:12px 0;border-bottom:1px solid var(--line);z-index:5;}
.progtrack{height:8px;background:#eae3d6;border-radius:6px;overflow:hidden;}
.progfill{height:100%;width:0;background:var(--accent2);transition:width .25s;}
.meta{display:flex;justify-content:space-between;font-family:ui-sans-serif,sans-serif;font-size:.8rem;color:var(--soft);margin-top:6px;}
.card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:22px 22px 18px;margin-top:18px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.iotag{display:inline-block;background:#f1ede3;color:var(--accent3);font-family:ui-sans-serif,sans-serif;font-size:.68rem;letter-spacing:.5px;padding:3px 9px;border-radius:10px;margin-bottom:12px;text-transform:uppercase;}
.qnum{font-family:ui-sans-serif,sans-serif;color:var(--soft);font-size:.8rem;}
.stem{font-size:1.1rem;margin:6px 0 16px;font-weight:600;}
.opt{display:block;width:100%;text-align:left;background:#faf7f1;border:1.5px solid var(--line);border-radius:8px;padding:12px 15px;margin-bottom:10px;font-family:Georgia,serif;font-size:1rem;cursor:pointer;transition:.12s;color:var(--ink);}
.opt:hover:not(:disabled){border-color:var(--accent2);background:#f6efe0;}
.opt:disabled{cursor:default;}
.opt .lbl{font-weight:bold;color:var(--accent);margin-right:8px;font-family:ui-sans-serif,sans-serif;}
.opt.correct{border-color:var(--good);background:#e8f3ec;}
.opt.correct .lbl{color:var(--good);}
.opt.wrong{border-color:var(--bad);background:#f6e7e7;}
.opt.wrong .lbl{color:var(--bad);}
.fb{margin-top:8px;font-family:ui-sans-serif,sans-serif;font-size:.9rem;padding:10px 14px;border-radius:8px;display:none;}
.fb.show{display:block;}
.fb.ok{background:#e8f3ec;color:var(--good);}
.fb.no{background:#f6e7e7;color:var(--bad);}
.nav{display:flex;justify-content:space-between;margin-top:18px;gap:12px;}
button.act{font-family:ui-sans-serif,sans-serif;font-size:.95rem;padding:11px 20px;border-radius:8px;border:none;cursor:pointer;background:var(--accent);color:#fff;}
button.act.ghost{background:#efe9dd;color:var(--ink);}
button.act:disabled{opacity:.4;cursor:default;}
.results{background:#fff;border:1px solid var(--line);border-radius:12px;padding:28px;margin-top:20px;text-align:center;}
.results h2{font-family:ui-sans-serif,sans-serif;color:var(--accent);}
.score{font-size:3rem;font-family:ui-sans-serif,sans-serif;color:var(--accent2);margin:8px 0;}
.iobreak{text-align:left;margin:18px auto 0;max-width:520px;}
.iobreak h3{font-family:ui-sans-serif,sans-serif;font-size:.9rem;color:var(--accent3);text-transform:uppercase;letter-spacing:1px;}
.iorow{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line);font-size:.95rem;}
.hidden{display:none;}
.rev-item{text-align:left;border-top:1px solid var(--line);padding:14px 0;}
.rev-q{font-weight:600;}
.rev-a{font-family:ui-sans-serif,sans-serif;font-size:.9rem;margin-top:4px;}
.rev-a .yours{color:var(--bad);} .rev-a .right{color:var(--good);}
</style>
</head>
<body>
<header>
  <h1>Introduction to the PA Profession</h1>
  <p>Comprehensive Quiz · Form B · 60 Questions · Class of 2028</p>
</header>
<div class="wrap">
  <div class="bar">
    <div class="progtrack"><div class="progfill" id="pf"></div></div>
    <div class="meta"><span id="pos">Question 1 of 60</span><span id="sc">Score: 0/0</span></div>
  </div>
  <div id="quiz"></div>
  <div id="end" class="hidden"></div>
</div>
<script>
const QUESTIONS = [{"q": "Dr. Eugene Stead served as Chairman of Medicine at which university in the 1960s?", "o": ["Emory University", "University of Washington", "University of Colorado", "Duke University"], "a": 3, "io": "History of the PA Profession"}, {"q": "The concept of using medical corpsmen with 2-3 years of training as 'externs' was proposed by:", "o": ["Dr. Richard Smith", "Dr. Eugene Stead", "Dr. Henry Silver", "Dr. Charles Hudson"], "a": 3, "io": "History of the PA Profession"}, {"q": "The first PA program at Duke was how many years in length?", "o": ["Two years", "Three years", "Four years", "One year"], "a": 0, "io": "History of the PA Profession"}, {"q": "Which French non-physician provider role existed in the 1800s?", "o": ["Village health worker", "Externe", "Officer de Santé", "Feldsher"], "a": 2, "io": "History of the PA Profession"}, {"q": "Which stage of PA development is characterized by 'increased utilization outside of scope originally designed' and reimbursement obtained through Medicare?", "o": ["Evaluation", "Incorporation", "Ideology", "Maturation"], "a": 1, "io": "History of the PA Profession"}, {"q": "In 1970, the National Academy of Science outlined three types of PAs; which type did national medical organizations support for primary care?", "o": ["Type A", "Type B", "Type D", "Type C"], "a": 0, "io": "History of the PA Profession"}, {"q": "The organization now known as PAEA was originally founded in 1972 under what name?", "o": ["ARC-PA", "AAPA", "APAP", "NCCPA"], "a": 2, "io": "History of the PA Profession"}, {"q": "In 1993, which agency agreed to register PAs to prescribe controlled substances?", "o": ["DEA", "FDA", "CMS", "FSMB"], "a": 0, "io": "History of the PA Profession"}, {"q": "Mississippi, the last state to license PAs, did so in what year?", "o": ["2010", "2007", "2000", "1997"], "a": 2, "io": "History of the PA Profession"}, {"q": "By 2007, what milestone was reached regarding PA prescribing?", "o": ["PANRE-LA launched", "First CAQ issued", "Name change to Physician Associate", "All states allowed PAs to prescribe"], "a": 3, "io": "History of the PA Profession"}, {"q": "The first Certificates of Added Qualifications (CAQs) were created by NCCPA in what year?", "o": ["2001", "2014", "2011", "2007"], "a": 2, "io": "History of the PA Profession"}, {"q": "Which 2010 legislation dramatically increased the need for PAs by covering an additional 20-30 million patients?", "o": ["Balanced Budget Act", "Affordable Care Act", "Health Manpower Act", "Rural Health Clinic Services Act"], "a": 1, "io": "History of the PA Profession"}, {"q": "Who became the first PA to travel in space (2021)?", "o": ["Sally Ride", "Hayley Arceneaux", "Christina Koch", "Mae Jemison"], "a": 1, "io": "History of the PA Profession"}, {"q": "The 1977 Rural Health Clinic Services Act provided what for PAs working in rural clinics?", "o": ["Automatic licensure", "Free malpractice coverage", "Medicare reimbursement", "Loan forgiveness"], "a": 2, "io": "History of the PA Profession"}, {"q": "Where is the Stead Center, associated with the PA History Society, located?", "o": ["Florida", "North Carolina", "Washington DC", "Colorado"], "a": 1, "io": "History of the PA Profession"}, {"q": "Up to what fraction of ARC-PA Commissioners must be PAs?", "o": ["All", "Three-fourths", "Two-thirds", "One-half"], "a": 2, "io": "PA Organizations"}, {"q": "Which body accredits post-professional PA doctoral programs (PPDP)?", "o": ["AAPA", "NCCPA", "ARC-PA", "PAEA"], "a": 2, "io": "PA Organizations"}, {"q": "The mission of PAEA emphasizes advancing excellence in PA education through leadership, scholarship, equity, and:", "o": ["Certification", "Inclusion", "Reimbursement", "Advocacy"], "a": 1, "io": "PA Organizations"}, {"q": "NCCPA logging of CME hours must occur how often?", "o": ["Every 2 years", "Every 5 years", "Every 10 years", "Annually"], "a": 0, "io": "PA Organizations"}, {"q": "Which exam is administered by NCCPA for initial certification?", "o": ["PANCE", "OSCE", "PACKRAT", "CASPA"], "a": 0, "io": "PA Organizations"}, {"q": "NCCPA Code of Conduct breaches may result in all of the following EXCEPT:", "o": ["Revocation of certification", "Formal censure", "Automatic license suspension by the state", "Letter of concern"], "a": 2, "io": "PA Organizations"}, {"q": "Approximately how many members does the AAPA have?", "o": ["330,000+", "74,000+", "200,000+", "24,000+"], "a": 1, "io": "PA Organizations"}, {"q": "The AAPA House of Delegates includes chapters from the 50 states, DC, US Virgin Islands, Puerto Rico, and how many uniformed services?", "o": ["3", "5", "7", "9"], "a": 1, "io": "PA Organizations"}, {"q": "Which is an AAPA commission?", "o": ["Commission on Licensure", "Commission on Accreditation", "Commission on the Health of the Public", "Commission on Certification"], "a": 2, "io": "PA Organizations"}, {"q": "To become an Assembly of Representatives (AOR) rep, a student must be a SAAAPA member in what standing?", "o": ["Honorary", "Emeritus", "Probationary", "Good standing"], "a": 3, "io": "PA Organizations"}, {"q": "FAPA student membership costs how much for the entire enrollment period?", "o": ["$100", "$195", "$60", "$75"], "a": 2, "io": "PA Organizations"}, {"q": "FAPA was established in what year?", "o": ["1974", "1972", "2001", "1965"], "a": 0, "io": "PA Organizations"}, {"q": "The Florida PA Council recommends PAs to the Governor for appointment to which body?", "o": ["The ARC-PA Commission", "The Florida Board of Medicine's Council on PAs", "The NCCPA Board", "The AAPA Board"], "a": 1, "io": "PA Organizations"}, {"q": "PAF funds include the R.K. Pedersen Global Outreach Endowment and PA Student:", "o": ["Loans", "Scholarships", "Malpractice funds", "Grants for licensure"], "a": 1, "io": "PA Organizations"}, {"q": "The National Medical Challenge Bowl is held annually at which meeting?", "o": ["ARC-PA site visit", "PAEA forum", "NCCPA conference", "AAPA national meeting"], "a": 3, "io": "PA Organizations"}, {"q": "Which PA competency domain includes 'demonstrate emotional resilience, stability, adaptability, and tolerance of ambiguity'?", "o": ["Interpersonal and communication skills", "Knowledge for practice", "Person-centered care", "Professionalism and ethics"], "a": 0, "io": "Professional Practice"}, {"q": "The PA competencies have been adopted and revised by how many national PA organizations?", "o": ["Three", "Four", "Five", "Two"], "a": 1, "io": "Professional Practice"}, {"q": "On the PANCE, up to what percentage of questions are legal/ethical?", "o": ["2%", "1%", "5%", "10%"], "a": 0, "io": "Professional Practice"}, {"q": "The PANCE test day consists of six blocks of how many questions each?", "o": ["90", "70", "50", "60"], "a": 3, "io": "Professional Practice"}, {"q": "A PANCE candidate must wait how many days after the expected graduation date to test?", "o": ["30 days", "14 days", "3 days", "7 days"], "a": 3, "io": "Professional Practice"}, {"q": "For grads on/after Jan 1, 2003, PANCE eligibility lasts up to how many years?", "o": ["Five", "Three", "Six", "Ten"], "a": 2, "io": "Professional Practice"}, {"q": "The maximum number of PANCE attempts allowed is:", "o": ["Three", "Four", "Six", "Unlimited"], "a": 2, "io": "Professional Practice"}, {"q": "In Florida, is continued NCCPA certification required to maintain licensure?", "o": ["No, but 100 hrs CME every 2 yrs is required", "Yes, for the first 5 years only", "Yes, always", "Only for prescribing"], "a": 0, "io": "Professional Practice"}, {"q": "Which process demonstrates the ability to perform certain tasks and procedures and is renewed annually at the institutional level?", "o": ["Certification", "Privileging", "Licensure", "Credentialing"], "a": 1, "io": "Professional Practice"}, {"q": "Institutional credentialing is mandated by the Joint Commission and which other body?", "o": ["CMS", "FSMB", "NCQA", "ARC-PA"], "a": 2, "io": "Professional Practice"}, {"q": "Scope of practice is determined by Medicare regulations, federal/state laws, and:", "o": ["National PA organizations", "Patient preference", "The supervising physician alone", "Hospital bylaws and policies"], "a": 3, "io": "Professional Practice"}, {"q": "A PA serving as a surgical first assistant is reimbursed at what rate of the primary surgeon fee?", "o": ["50%", "100%", "13.6%", "85%"], "a": 2, "io": "Professional Practice"}, {"q": "Since what year has Medicare allowed direct reimbursement to PAs (if state law allows)?", "o": ["2022", "2020", "2017", "2021"], "a": 0, "io": "Professional Practice"}, {"q": "Which payment model uses a single payment covering all services for a condition over a defined period?", "o": ["Fee-for-service", "Incident-to", "Capitation", "Bundled payment"], "a": 3, "io": "Professional Practice"}, {"q": "Under EMTALA, if an unstable patient is transferred, what must occur?", "o": ["The PA signs alone", "A physician must be consulted and sign the certificate", "Nothing additional", "The patient signs a waiver"], "a": 1, "io": "Professional Practice"}, {"q": "Regarding documentation, an original note may be:", "o": ["Deleted if incorrect", "Rewritten entirely", "Ignored after signing", "Amended but never deleted"], "a": 3, "io": "Professional Practice"}, {"q": "Which OTP component addresses PA liability?", "o": ["PAs are responsible for the care they provide", "A physician is always liable for PA care", "PAs are never liable", "Liability rests with the hospital only"], "a": 0, "io": "Professional Practice"}, {"q": "The Licensure Compact is best described as a(n):", "o": ["Optional agreement between states easing multistate practice", "Certification exam", "Malpractice pool", "Mandatory federal requirement"], "a": 0, "io": "Professional Practice"}, {"q": "Interprofessional collaboration relies on trust, mutual respect, and:", "o": ["Independence", "Shared values", "Hierarchy", "Competition"], "a": 1, "io": "Health Care is Teamwork"}, {"q": "Which nursing role monitors all aspects of labor and delivery and may provide well-woman care?", "o": ["Clinical Nurse Specialist", "LPN", "CRNA", "Certified Nurse Midwife (CNM)"], "a": 3, "io": "Health Care is Teamwork"}, {"q": "A Registered Dietitian Nutritionist performs which of the following?", "o": ["Medical nutrition therapy", "Anesthesia", "Radiologic imaging", "Psychotherapy"], "a": 0, "io": "Health Care is Teamwork"}, {"q": "Which provider diagnoses and treats hearing and balance problems and holds a doctorate?", "o": ["Optometrist", "Respiratory therapist", "Speech-language pathologist", "Audiologist"], "a": 3, "io": "Health Care is Teamwork"}, {"q": "A Physical Therapist requires which level of education?", "o": ["Bachelor's", "Doctoral", "Associate's", "Master's"], "a": 1, "io": "Health Care is Teamwork"}, {"q": "Occupational therapy primarily helps patients:", "o": ["Deliver babies", "Administer medications", "Interpret lab results", "Perform tasks in daily living and working environments"], "a": 3, "io": "Health Care is Teamwork"}, {"q": "The healthcare system has shifted from a physician-centered model to one that includes:", "o": ["Administrator perspectives", "Patient/family perspectives", "Insurer perspectives", "Regulator perspectives"], "a": 1, "io": "Health Care is Teamwork"}, {"q": "A respiratory therapist assumes primary responsibility for:", "o": ["Wound care", "Medication dispensing", "All respiratory care treatments", "Surgical assisting"], "a": 2, "io": "Health Care is Teamwork"}, {"q": "Which is a primary-care specialty field?", "o": ["Internal medicine", "Radiology", "Cardiothoracic surgery", "Dermatology"], "a": 0, "io": "PAs & Clinical Practice"}, {"q": "A growing hospital-based role for PAs described in the clinical practice lecture is:", "o": ["Independent surgery", "Locum radiology", "Solo anesthesia", "Hospitalist practice"], "a": 3, "io": "PAs & Clinical Practice"}, {"q": "Per PAEA, professionalism is described as one of the top 10 what?", "o": ["Licensing requirements", "Cognitive skills", "Clinical procedures", "Noncognitive attributes"], "a": 3, "io": "Professionalism"}, {"q": "The AAPA annual CME conference provides members with which key opportunity?", "o": ["Networking and continuing education", "Certification testing", "Program accreditation", "Licensure renewal"], "a": 0, "io": "PA Organizations"}];
let idx=0, score=0, answered=0;
const responses = new Array(QUESTIONS.length).fill(null);
const quiz=document.getElementById('quiz');
const pf=document.getElementById('pf'), pos=document.getElementById('pos'), sc=document.getElementById('sc');
const LETTERS=['A','B','C','D'];

function render(){
  const q=QUESTIONS[idx];
  const chosen=responses[idx];
  let opts=q.o.map((t,i)=>{
    let cls='opt';
    if(chosen!==null){
      if(i===q.a) cls+=' correct';
      else if(i===chosen.pick && !chosen.correct) cls+=' wrong';
    }
    const dis = chosen!==null ? 'disabled' : '';
    return `<button class="${cls}" ${dis} onclick="pick(${i})"><span class="lbl">${LETTERS[i]}</span>${escapeHtml(t)}</button>`;
  }).join('');
  let fb='';
  if(chosen!==null){
    fb = chosen.correct
      ? `<div class="fb ok show">Correct.</div>`
      : `<div class="fb no show">Incorrect. The correct answer is ${LETTERS[q.a]}: ${escapeHtml(q.o[q.a])}</div>`;
  }
  quiz.innerHTML=`<div class="card">
    <span class="iotag">${escapeHtml(q.io)}</span>
    <div class="qnum">Question ${idx+1}</div>
    <div class="stem">${escapeHtml(q.q)}</div>
    ${opts}${fb}
    <div class="nav">
      <button class="act ghost" onclick="prev()" ${idx===0?'disabled':''}>Back</button>
      ${idx<QUESTIONS.length-1
         ? `<button class="act" onclick="next()" ${chosen===null?'disabled':''} id="nextb">Next</button>`
         : `<button class="act" onclick="finish()" ${answered<QUESTIONS.length?'disabled':''} id="nextb">See Results</button>`}
    </div>
  </div>`;
  pos.textContent=`Question ${idx+1} of ${QUESTIONS.length}`;
  sc.textContent=`Score: ${score}/${answered}`;
  pf.style.width=(answered/QUESTIONS.length*100)+'%';
}
function pick(i){
  if(responses[idx]!==null) return;
  const q=QUESTIONS[idx];
  const correct=(i===q.a);
  responses[idx]={pick:i,correct};
  answered++; if(correct) score++;
  render();
}
function next(){ if(idx<QUESTIONS.length-1){idx++;render();} }
function prev(){ if(idx>0){idx--;render();} }
function finish(){
  const io={};
  QUESTIONS.forEach((q,i)=>{
    if(!io[q.io]) io[q.io]={c:0,t:0};
    io[q.io].t++;
    if(responses[i]&&responses[i].correct) io[q.io].c++;
  });
  let iohtml=Object.entries(io).map(([k,v])=>`<div class="iorow"><span>${escapeHtml(k)}</span><span>${v.c}/${v.t}</span></div>`).join('');
  const pct=Math.round(score/QUESTIONS.length*100);
  let rev=QUESTIONS.map((q,i)=>{
    const r=responses[i];
    if(r&&r.correct) return '';
    const yours = r? q.o[r.pick] : '(no answer)';
    return `<div class="rev-item"><div class="rev-q">${i+1}. ${escapeHtml(q.q)}</div>
      <div class="rev-a"><span class="yours">Your answer: ${escapeHtml(yours)}</span><br>
      <span class="right">Correct: ${escapeHtml(q.o[q.a])}</span></div></div>`;
  }).join('');
  document.querySelector('.bar').classList.add('hidden');
  quiz.classList.add('hidden');
  const end=document.getElementById('end');
  end.classList.remove('hidden');
  end.innerHTML=`<div class="results">
    <h2>Quiz Complete — Form B</h2>
    <div class="score">${score}/${QUESTIONS.length}</div>
    <div style="font-family:ui-sans-serif,sans-serif;color:var(--soft)">${pct}%</div>
    <div class="iobreak"><h3>Breakdown by Topic</h3>${iohtml}</div>
    <div style="margin-top:22px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <button class="act" onclick="location.reload()">Retake</button>
      <button class="act ghost" onclick="toggleReview()">Review Missed</button>
    </div>
    <div id="review" class="hidden" style="margin-top:20px">${rev||'<p>Perfect score — nothing to review!</p>'}</div>
  </div>`;
  window.scrollTo(0,0);
}
function toggleReview(){document.getElementById('review').classList.toggle('hidden');}
function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
render();
</script>
</body>
</html>
