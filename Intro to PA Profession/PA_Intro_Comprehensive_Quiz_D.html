<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intro to the PA Profession — Form D</title>
<style>
:root{--ink:#1c1a17;--paper:#fbf9f5;--accent:#7c2d2d;--accent2:#b08331;--accent3:#256d68;--line:#e4ddd1;--soft:#6d655a;--good:#256d3f;--bad:#9a2b2b;}
*{box-sizing:border-box;}
body{margin:0;background:var(--paper);color:var(--ink);font-family:Georgia,'Times New Roman',serif;line-height:1.5;}
header{background:var(--accent);color:#fff;padding:26px 22px;}
header h1{font-family:ui-sans-serif,system-ui,sans-serif;margin:0 0 4px;font-size:1.5rem;}
header p{margin:0;color:#f0ddd1;font-size:.9rem;}
.wrap{max-width:820px;margin:0 auto;padding:22px 18px 80px;}
.bar{position:sticky;top:0;background:var(--paper);padding:12px 0;border-bottom:1px solid var(--line);z-index:5;}
.progtrack{height:8px;background:#eae3d6;border-radius:6px;overflow:hidden;}
.progfill{height:100%;width:0;background:var(--accent2);transition:width .25s;}
.meta{display:flex;justify-content:space-between;font-family:ui-sans-serif,sans-serif;font-size:.8rem;color:var(--soft);margin-top:6px;}
.card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:22px 22px 18px;margin-top:18px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.iotag{display:inline-block;background:#f1ede3;color:var(--accent3);font-family:ui-sans-serif,sans-serif;font-size:.68rem;letter-spacing:.5px;padding:3px 9px;border-radius:10px;margin-bottom:12px;text-transform:uppercase;}
.qnum{font-family:ui-sans-serif,sans-serif;color:var(--soft);font-size:.8rem;}
.stem{font-size:1.1rem;margin:6px 0 16px;font-weight:600;}
.opt{display:block;width:100%;text-align:left;background:#faf7f1;border:1.5px solid var(--line);border-radius:8px;padding:12px 15px;margin-bottom:10px;font-family:Georgia,serif;font-size:1rem;cursor:pointer;transition:.12s;color:var(--ink);}
.opt:hover:not(:disabled){border-color:var(--accent2);background:#f6efe0;}
.opt:disabled{cursor:default;}
.opt .lbl{font-weight:bold;color:var(--accent);margin-right:8px;font-family:ui-sans-serif,sans-serif;}
.opt.correct{border-color:var(--good);background:#e8f3ec;}
.opt.correct .lbl{color:var(--good);}
.opt.wrong{border-color:var(--bad);background:#f6e7e7;}
.opt.wrong .lbl{color:var(--bad);}
.fb{margin-top:8px;font-family:ui-sans-serif,sans-serif;font-size:.9rem;padding:10px 14px;border-radius:8px;display:none;}
.fb.show{display:block;}
.fb.ok{background:#e8f3ec;color:var(--good);}
.fb.no{background:#f6e7e7;color:var(--bad);}
.nav{display:flex;justify-content:space-between;margin-top:18px;gap:12px;}
button.act{font-family:ui-sans-serif,sans-serif;font-size:.95rem;padding:11px 20px;border-radius:8px;border:none;cursor:pointer;background:var(--accent);color:#fff;}
button.act.ghost{background:#efe9dd;color:var(--ink);}
button.act:disabled{opacity:.4;cursor:default;}
.results{background:#fff;border:1px solid var(--line);border-radius:12px;padding:28px;margin-top:20px;text-align:center;}
.results h2{font-family:ui-sans-serif,sans-serif;color:var(--accent);}
.score{font-size:3rem;font-family:ui-sans-serif,sans-serif;color:var(--accent2);margin:8px 0;}
.iobreak{text-align:left;margin:18px auto 0;max-width:520px;}
.iobreak h3{font-family:ui-sans-serif,sans-serif;font-size:.9rem;color:var(--accent3);text-transform:uppercase;letter-spacing:1px;}
.iorow{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line);font-size:.95rem;}
.hidden{display:none;}
.rev-item{text-align:left;border-top:1px solid var(--line);padding:14px 0;}
.rev-q{font-weight:600;}
.rev-a{font-family:ui-sans-serif,sans-serif;font-size:.9rem;margin-top:4px;}
.rev-a .yours{color:var(--bad);} .rev-a .right{color:var(--good);}
</style>
</head>
<body>
<header>
  <h1>Introduction to the PA Profession</h1>
  <p>Comprehensive Quiz · Form D · 60 Questions · Class of 2028</p>
</header>
<div class="wrap">
  <div class="bar">
    <div class="progtrack"><div class="progfill" id="pf"></div></div>
    <div class="meta"><span id="pos">Question 1 of 60</span><span id="sc">Score: 0/0</span></div>
  </div>
  <div id="quiz"></div>
  <div id="end" class="hidden"></div>
</div>
<script>
const QUESTIONS = [{"q": "New health professions have historically arisen as generalist physician substitutes, a role termed:", "o": ["Physician dependent", "Physician subordinate", "Physician complementary", "Physician equivalent"], "a": 2, "io": "History of the PA Profession"}, {"q": "Thelma Ingles, an RN at Duke, attempted to develop an early midlevel provider but could not obtain accreditation from the:", "o": ["National League of Nursing", "AMA", "ARC-PA", "NBME"], "a": 0, "io": "History of the PA Profession"}, {"q": "At Emory in the 1940s, Stead trained physicians using what type of curriculum?", "o": ["Research-based", "Competency-based", "Lecture-based", "Apprenticeship-only"], "a": 1, "io": "History of the PA Profession"}, {"q": "The Feldsher role, still present today, originated in which century in Russia?", "o": ["1900s", "1600s", "1400s", "1800s"], "a": 1, "io": "History of the PA Profession"}, {"q": "Which stage focuses on 'public policy analysis of the success and acceptance of the new profession'?", "o": ["Incorporation", "Implementation", "Evaluation", "Ideology"], "a": 2, "io": "History of the PA Profession"}, {"q": "The GMENAC report is associated with which stage of PA development?", "o": ["Incorporation", "Maturation", "Ideology", "Implementation"], "a": 0, "io": "History of the PA Profession"}, {"q": "Which magazine/TV portrayal in the 1990s helped the public view the PA profession positively?", "o": ["Scrubs", "House", "ER", "Grey's Anatomy"], "a": 2, "io": "History of the PA Profession"}, {"q": "The Balanced Budget Act that expanded CMS reimbursement for PAs was passed in:", "o": ["1997", "2001", "1986", "1993"], "a": 0, "io": "History of the PA Profession"}, {"q": "In 2001, which centralized application service was created?", "o": ["PACKRAT", "CAQ", "OSCE", "CASPA"], "a": 3, "io": "History of the PA Profession"}, {"q": "Pi Alpha Honor Society was organized in what year?", "o": ["2010", "2001", "2012", "2004"], "a": 3, "io": "History of the PA Profession"}, {"q": "Which was rated #1 by Forbes and Money magazine (2012)?", "o": ["The pharmacy degree", "The MD degree", "The PA degree", "The nursing degree"], "a": 2, "io": "History of the PA Profession"}, {"q": "As of the lecture, the Licensure Compact had been adopted by approximately how many states?", "o": ["8", "24", "16", "50"], "a": 2, "io": "History of the PA Profession"}, {"q": "NCCPA launched PANRE-LA after a 2-year pilot study in which year?", "o": ["2025", "2021", "2017", "2023"], "a": 3, "io": "History of the PA Profession"}, {"q": "The PA History Society was founded in what year?", "o": ["1997", "2001", "2010", "1974"], "a": 1, "io": "History of the PA Profession"}, {"q": "Which value of PAHx involves involving the public, PAs, and PA programs in collecting history?", "o": ["Recognition", "Credibility", "Engagement", "Dedication"], "a": 2, "io": "History of the PA Profession"}, {"q": "ARC-PA is composed of up to how many Commissioners?", "o": ["30", "20", "7", "50"], "a": 0, "io": "PA Organizations"}, {"q": "Post-professional PA doctoral program accreditation standards became effective when?", "o": ["9/2020", "9/2025", "9/2019", "9/2026"], "a": 1, "io": "PA Organizations"}, {"q": "Which organization administers End-of-Curriculum exams?", "o": ["ARC-PA", "PAEA", "AAPA", "NCCPA"], "a": 1, "io": "PA Organizations"}, {"q": "The NCCPA Board includes representatives from AAPA, PAEA, and:", "o": ["ARC-PA", "WHO", "CMS", "FSMB"], "a": 3, "io": "PA Organizations"}, {"q": "Which of the following is a benefit of NCCPA certification?", "o": ["Signals commitment to lifelong learning", "Guaranteed employment", "Exemption from CME", "Automatic state license"], "a": 0, "io": "PA Organizations"}, {"q": "NCCPA Code of Conduct actions may be reported to the FSMB, state licensing authorities, the federal government, and the PA's:", "o": ["Family", "Patients", "School", "Employer"], "a": 3, "io": "PA Organizations"}, {"q": "AAPA values include Leadership and Service, Unity and Transparency, Accountability, and:", "o": ["Advocacy", "Excellence and Equity", "Certification", "Accreditation"], "a": 1, "io": "PA Organizations"}, {"q": "The AAPA maintains which annual publication about compensation?", "o": ["Annual Salary Report", "JAMA", "NCCPA Statistical Profile", "JAAPA Salary Digest"], "a": 0, "io": "PA Organizations"}, {"q": "Which is an example of an AAPA caucus?", "o": ["Judicial Affairs", "Board of Directors", "Veterans Caucus", "House of Delegates"], "a": 2, "io": "PA Organizations"}, {"q": "The SAAAPA Assembly of Representatives serves as the:", "o": ["Policy-making body of the Student Academy", "Accrediting body", "Certifying body", "Licensing authority"], "a": 0, "io": "PA Organizations"}, {"q": "FAPA fellow (full) membership costs approximately how much per year?", "o": ["$195", "$75", "$60", "$305"], "a": 0, "io": "PA Organizations"}, {"q": "The Florida PA Council is composed of 3 PAs, 1 allopathic physician, and:", "o": ["1 pharmacist", "2 public members", "1 nurse", "1 osteopathic physician"], "a": 3, "io": "PA Organizations"}, {"q": "PAF programs include a podcast called:", "o": ["Stead Stories", "Huddle", "Vital Minds", "PA Talk"], "a": 2, "io": "PA Organizations"}, {"q": "The AAPA benefit 'Maxwell Quick Medical Reference' is available to which members?", "o": ["Retired members", "Students", "Physicians", "Fellows only"], "a": 1, "io": "PA Organizations"}, {"q": "Which PA organization administers assessment tools like PACKRAT?", "o": ["ARC-PA", "NCCPA", "PAEA", "AAPA"], "a": 2, "io": "PA Organizations"}, {"q": "Which PA competency domain includes 'improve the health of patient populations'?", "o": ["Practice-based learning", "Society and population health", "Person-centered care", "Knowledge for practice"], "a": 1, "io": "Professional Practice"}, {"q": "Recently adopted competencies specifically address the:", "o": ["PA educator", "Physician supervisor", "Retiring PA", "New PA graduate"], "a": 3, "io": "Professional Practice"}, {"q": "Which is required to sit for the PANCE?", "o": ["Graduation from an ARC-PA accredited program", "5 years of experience", "State licensure first", "A doctoral degree"], "a": 0, "io": "Professional Practice"}, {"q": "Florida licensure requires submission of how many CME hours every 2 years (or evidence of NCCPA cert)?", "o": ["50", "75", "100", "150"], "a": 2, "io": "Professional Practice"}, {"q": "The Florida PA license application fee is:", "o": ["$100", "$500", "$305", "$195"], "a": 2, "io": "Professional Practice"}, {"q": "Florida PA applicants must use an approved service for criminal background screening called:", "o": ["E-Verify", "CASPA", "NPDB", "Livescan"], "a": 3, "io": "Professional Practice"}, {"q": "Which statement about licensure is TRUE?", "o": ["It is optional in most states", "It automatically creates autonomous practice", "It does not necessarily imply autonomous practice", "It replaces certification"], "a": 2, "io": "Professional Practice"}, {"q": "Telehealth requires that a PA be licensed in which state?", "o": ["The state where the patient is located", "Any state", "No license required", "The PA's home state only"], "a": 0, "io": "Professional Practice"}, {"q": "Which is required for informed consent for a procedure under anesthesia, per CMS?", "o": ["The person performing the procedure obtains it", "The patient signs without explanation", "Only a nurse may obtain it", "Any staff member may obtain it"], "a": 0, "io": "Professional Practice"}, {"q": "An occurrence malpractice policy covers incidents:", "o": ["Only after tail coverage is purchased", "While the policy was in effect regardless of claim date", "Never for PAs", "Only while the policy is active"], "a": 1, "io": "Professional Practice"}, {"q": "Which federal program is the largest employee health program in the US?", "o": ["Medicare", "TRICARE", "Medicaid", "Federal Employee Health Benefits Program"], "a": 3, "io": "Professional Practice"}, {"q": "Medicare Part D covers:", "o": ["Outpatient services", "Prescription drugs", "Managed care", "Hospital services"], "a": 1, "io": "Professional Practice"}, {"q": "PAs may own what percentage of a corporation if state law allows?", "o": ["51%", "100%", "49%", "85%"], "a": 1, "io": "Professional Practice"}, {"q": "The transformation in US healthcare reimbursement is from fee-for-service toward:", "o": ["Value-based care", "Cash-only", "Bundled surgery only", "Capitation only"], "a": 0, "io": "Professional Practice"}, {"q": "Privileging may require certifications such as:", "o": ["CAQ", "ACLS/PALS", "PANCE", "CASPA"], "a": 1, "io": "Professional Practice"}, {"q": "Which is the LEAST rigorous credential compared to licensure?", "o": ["Doctoral degree", "Fellowship", "Board certification", "Registration or certification"], "a": 3, "io": "Professional Practice"}, {"q": "Interprofessional education (IPE) primarily involves professionals learning:", "o": ["In isolation", "Only in clinical settings", "Only from physicians", "With, from, and about each other"], "a": 3, "io": "Health Care is Teamwork"}, {"q": "A Clinical Nurse Specialist requires which degree beyond RN?", "o": ["Associate's", "Master's degree", "Doctorate only", "Certificate only"], "a": 1, "io": "Health Care is Teamwork"}, {"q": "Which provider works under the direction of a physical therapist and applies modalities?", "o": ["Recreation therapist", "Athletic trainer", "Occupational therapist", "Physical therapy assistant"], "a": 3, "io": "Health Care is Teamwork"}, {"q": "A pharmacist's newest expanded role, varying by state, is:", "o": ["Radiology", "Surgery", "Anesthesia", "Prescribing"], "a": 3, "io": "Health Care is Teamwork"}, {"q": "Which provider takes x-rays and may specialize in CT and MRI?", "o": ["Radiology technologist", "Medical lab technologist", "Nuclear medicine tech", "Respiratory therapist"], "a": 0, "io": "Health Care is Teamwork"}, {"q": "A nuclear medicine technician prepares and administers what to patients?", "o": ["Anesthetics", "Antibiotics", "Radioactive drugs", "Blood products"], "a": 2, "io": "Health Care is Teamwork"}, {"q": "Which is one of the four tenets of patient-centered care?", "o": ["Collaboration", "Consolidation", "Competition", "Certification"], "a": 0, "io": "Health Care is Teamwork"}, {"q": "A recreation therapist is also referred to as a(n):", "o": ["Rehabilitation counselor", "Occupational therapist", "Therapeutic recreation specialist", "Physical therapist"], "a": 2, "io": "Health Care is Teamwork"}, {"q": "Continuous care in primary care means care is provided:", "o": ["In hospitals only", "By specialists only", "Throughout the years", "Only during emergencies"], "a": 2, "io": "PAs & Clinical Practice"}, {"q": "Which describes coordinated care?", "o": ["Emergency-only care", "Care with specialists", "Care in isolation", "Care without referrals"], "a": 1, "io": "PAs & Clinical Practice"}, {"q": "Failure of a strong team can lead to medical errors, impacting patient safety and potentially causing:", "o": ["Accreditation", "Better outcomes", "Higher salaries", "Malpractice"], "a": 3, "io": "Professionalism"}, {"q": "Which is TRUE about professionalism per the lecture?", "o": ["It cannot be taught", "It is unrelated to practice", "It is defined by a single quality", "It is a combination of qualities"], "a": 3, "io": "Professionalism"}, {"q": "Which document must support medical necessity and the level of service billed?", "o": ["The CME log", "The clinical documentation/note", "The malpractice policy", "The license application"], "a": 1, "io": "Professional Practice"}, {"q": "Which best captures the purpose of interprofessional collaboration?", "o": ["Deliver the highest quality of care as a team", "Increase documentation", "Reduce staffing costs alone", "Eliminate physician roles"], "a": 0, "io": "Health Care is Teamwork"}];
let idx=0, score=0, answered=0;
const responses = new Array(QUESTIONS.length).fill(null);
const quiz=document.getElementById('quiz');
const pf=document.getElementById('pf'), pos=document.getElementById('pos'), sc=document.getElementById('sc');
const LETTERS=['A','B','C','D'];

function render(){
  const q=QUESTIONS[idx];
  const chosen=responses[idx];
  let opts=q.o.map((t,i)=>{
    let cls='opt';
    if(chosen!==null){
      if(i===q.a) cls+=' correct';
      else if(i===chosen.pick && !chosen.correct) cls+=' wrong';
    }
    const dis = chosen!==null ? 'disabled' : '';
    return `<button class="${cls}" ${dis} onclick="pick(${i})"><span class="lbl">${LETTERS[i]}</span>${escapeHtml(t)}</button>`;
  }).join('');
  let fb='';
  if(chosen!==null){
    fb = chosen.correct
      ? `<div class="fb ok show">Correct.</div>`
      : `<div class="fb no show">Incorrect. The correct answer is ${LETTERS[q.a]}: ${escapeHtml(q.o[q.a])}</div>`;
  }
  quiz.innerHTML=`<div class="card">
    <span class="iotag">${escapeHtml(q.io)}</span>
    <div class="qnum">Question ${idx+1}</div>
    <div class="stem">${escapeHtml(q.q)}</div>
    ${opts}${fb}
    <div class="nav">
      <button class="act ghost" onclick="prev()" ${idx===0?'disabled':''}>Back</button>
      ${idx<QUESTIONS.length-1
         ? `<button class="act" onclick="next()" ${chosen===null?'disabled':''} id="nextb">Next</button>`
         : `<button class="act" onclick="finish()" ${answered<QUESTIONS.length?'disabled':''} id="nextb">See Results</button>`}
    </div>
  </div>`;
  pos.textContent=`Question ${idx+1} of ${QUESTIONS.length}`;
  sc.textContent=`Score: ${score}/${answered}`;
  pf.style.width=(answered/QUESTIONS.length*100)+'%';
}
function pick(i){
  if(responses[idx]!==null) return;
  const q=QUESTIONS[idx];
  const correct=(i===q.a);
  responses[idx]={pick:i,correct};
  answered++; if(correct) score++;
  render();
}
function next(){ if(idx<QUESTIONS.length-1){idx++;render();} }
function prev(){ if(idx>0){idx--;render();} }
function finish(){
  const io={};
  QUESTIONS.forEach((q,i)=>{
    if(!io[q.io]) io[q.io]={c:0,t:0};
    io[q.io].t++;
    if(responses[i]&&responses[i].correct) io[q.io].c++;
  });
  let iohtml=Object.entries(io).map(([k,v])=>`<div class="iorow"><span>${escapeHtml(k)}</span><span>${v.c}/${v.t}</span></div>`).join('');
  const pct=Math.round(score/QUESTIONS.length*100);
  let rev=QUESTIONS.map((q,i)=>{
    const r=responses[i];
    if(r&&r.correct) return '';
    const yours = r? q.o[r.pick] : '(no answer)';
    return `<div class="rev-item"><div class="rev-q">${i+1}. ${escapeHtml(q.q)}</div>
      <div class="rev-a"><span class="yours">Your answer: ${escapeHtml(yours)}</span><br>
      <span class="right">Correct: ${escapeHtml(q.o[q.a])}</span></div></div>`;
  }).join('');
  document.querySelector('.bar').classList.add('hidden');
  quiz.classList.add('hidden');
  const end=document.getElementById('end');
  end.classList.remove('hidden');
  end.innerHTML=`<div class="results">
    <h2>Quiz Complete — Form D</h2>
    <div class="score">${score}/${QUESTIONS.length}</div>
    <div style="font-family:ui-sans-serif,sans-serif;color:var(--soft)">${pct}%</div>
    <div class="iobreak"><h3>Breakdown by Topic</h3>${iohtml}</div>
    <div style="margin-top:22px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <button class="act" onclick="location.reload()">Retake</button>
      <button class="act ghost" onclick="toggleReview()">Review Missed</button>
    </div>
    <div id="review" class="hidden" style="margin-top:20px">${rev||'<p>Perfect score — nothing to review!</p>'}</div>
  </div>`;
  window.scrollTo(0,0);
}
function toggleReview(){document.getElementById('review').classList.toggle('hidden');}
function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
render();
</script>
</body>
</html>
