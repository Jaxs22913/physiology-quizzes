<!DOCTYPE html>
<html lang="en">
<head>
<script>document.documentElement.setAttribute('data-theme', localStorage.getItem('siteTheme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Arcade — Class of 2028</title>
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="arcade.css">
</head>
<body>
<svg class="edge-decor left" aria-hidden="true">
  <defs>
    <pattern id="zigzag-pattern" width="74" height="120" patternUnits="userSpaceOnUse">
      <circle cx="37" cy="15" r="10" fill="var(--accent)"/>
      <circle cx="37" cy="45" r="10" fill="var(--accent2)"/>
      <circle cx="37" cy="75" r="10" fill="var(--accent3)"/>
      <circle cx="37" cy="105" r="10" fill="var(--accent4)"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#zigzag-pattern)"/>
</svg>
<svg class="edge-decor right" aria-hidden="true">
  <rect width="100%" height="100%" fill="url(#zigzag-pattern)"/>
</svg>
<div class="page page-home">
  <a class="back-link" href="index.html">
    <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Back to Homepage
  </a>

  <div class="brand-row">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="14" height="10" rx="2"/><rect x="7" y="4" width="14" height="10" rx="2"/></svg>
      </div>
      <div class="brand-text">
        <h1>Study Arcade</h1>
        <p>Turn studying into a game</p>
      </div>
    </div>
  </div>
  <div class="streak-pill" id="streak-pill"><span class="flame">🔥</span><b id="streak-count">0</b><span>-day streak</span></div>

  <div class="semester">
    <h2 class="semester-header">Summer Semester 1 - 2026</h2>
    <div class="tabs" id="class-tabs"></div>
    <div id="class-panels"></div>
  </div>
</div>

<div id="toast"></div>

<script src="arcade.js"></script>
<script src="theme.js" defer></script>
<script>
(function () {
  "use strict";

  function deckCardHTML(deck) {
    var due = getDueIndexes(deck);
    var counts = getMasteryCounts(deck);
    var total = deck.cards.length;
    return (
      '<div class="deck-card" style="border-top-color:var(--' + deck.color + ')">' +
        '<div class="deck-top">' +
          '<div class="deck-name-row">' +
            '<div class="deck-icon" style="background:var(--' + deck.color + '-soft);color:var(--' + deck.color + ')">' +
              '<svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + deck.icon + '</svg>' +
            '</div>' +
            '<div><div class="deck-name">' + deck.name + '</div><div class="deck-count">' + total + ' cards</div></div>' +
          '</div>' +
          '<div class="due-badge ' + (due.length ? "some" : "none") + '">' + (due.length ? due.length + " due" : "all caught up") + '</div>' +
        '</div>' +
        '<div class="mastery-bar">' +
          '<div class="mastery-seg new" style="width:' + (counts.new / total * 100) + '%"></div>' +
          '<div class="mastery-seg learning" style="width:' + (counts.learning / total * 100) + '%"></div>' +
          '<div class="mastery-seg mastered" style="width:' + (counts.mastered / total * 100) + '%"></div>' +
        '</div>' +
        '<div class="mastery-labels"><span>' + counts.new + ' new</span><span>' + counts.learning + ' learning</span><span>' + counts.mastered + ' mastered</span></div>' +
        '<div class="deck-actions">' +
          '<a class="btn primary" href="arcade-study.html?deck=' + deck.id + '">Study' + (due.length ? " (" + due.length + ")" : "") + '</a>' +
        '</div>' +
        '<div class="deck-actions">' +
          '<a class="btn learn" href="arcade-learn.html?deck=' + deck.id + '"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10L12 5 2 10l10 5 10-5z"/><path d="M6 12v5c0 1 3 3 6 3s6-2 6-3v-5"/></svg> Learn</a>' +
          '<a class="btn sprint" href="arcade-sprint.html?deck=' + deck.id + '"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> Sprint</a>' +
        '</div>' +
        '<div class="deck-actions">' +
          '<a class="btn match" href="arcade-match.html?deck=' + deck.id + '"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/></svg> Match' + (getMatchBest(deck.id) ? " · best " + formatMs(getMatchBest(deck.id)) : "") + '</a>' +
        '</div>' +
      '</div>'
    );
  }

  var ACTIVE_TAB_KEY = "fc_active_tab";

  function renderHome() {
    var tabsEl = document.getElementById("class-tabs");
    var panelsEl = document.getElementById("class-panels");
    var savedTab = localStorage.getItem(ACTIVE_TAB_KEY);
    var activeId = DEMO_CLASSES.some(function (c) { return c.id === savedTab; }) ? savedTab : DEMO_CLASSES[0].id;

    tabsEl.innerHTML = DEMO_CLASSES.map(function (cls) {
      return '<button class="tab-btn' + (cls.id === activeId ? " active" : "") + '" data-tab="' + cls.id + '">' + cls.name + '</button>';
    }).join("");

    panelsEl.innerHTML = DEMO_CLASSES.map(function (cls) {
      var examsHTML = cls.exams.map(function (exam) {
        var decksHTML = exam.deckIds.length
          ? exam.deckIds.map(function (id) { return deckCardHTML(findDeck(id)); }).join("")
          : '<div class="empty-state"><div class="big">🚧</div><p>Decks for this exam are coming soon.</p></div>';
        return (
          '<details class="exam-section" open>' +
            '<summary><span>' + exam.name + '</span></summary>' +
            '<div class="exam-content"><div class="deck-grid">' + decksHTML + '</div></div>' +
          '</details>'
        );
      }).join("");
      return '<div class="tab-panel' + (cls.id === activeId ? " active" : "") + '" data-class="' + cls.id + '">' + examsHTML + '</div>';
    }).join("");

    tabsEl.querySelectorAll(".tab-btn").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var id = btn.getAttribute("data-tab");
        localStorage.setItem(ACTIVE_TAB_KEY, id);
        tabsEl.querySelectorAll(".tab-btn").forEach(function (b) { b.classList.toggle("active", b === btn); });
        panelsEl.querySelectorAll(".tab-panel").forEach(function (p) { p.classList.toggle("active", p.getAttribute("data-class") === id); });
      });
    });
  }

  initHeader();
  renderHome();
})();
</script>
</body>
</html>
