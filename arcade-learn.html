<!DOCTYPE html>
<html lang="en">
<head>
<script>document.documentElement.setAttribute('data-theme', localStorage.getItem('siteTheme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Learn — Arcade</title>
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="arcade.css">
</head>
<body>
<svg class="edge-decor left" aria-hidden="true">
  <defs>
    <pattern id="zigzag-pattern" width="74" height="120" patternUnits="userSpaceOnUse">
      <circle cx="37" cy="15" r="10" fill="var(--accent)"/>
      <circle cx="37" cy="45" r="10" fill="var(--accent2)"/>
      <circle cx="37" cy="75" r="10" fill="var(--accent3)"/>
      <circle cx="37" cy="105" r="10" fill="var(--accent4)"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#zigzag-pattern)"/>
</svg>
<svg class="edge-decor right" aria-hidden="true">
  <rect width="100%" height="100%" fill="url(#zigzag-pattern)"/>
</svg>
<div class="page page-wide">
  <div class="proto-badge">
    <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 2v6.5L4.5 17a2 2 0 0 0 1.8 3h11.4a2 2 0 0 0 1.8-3L15 8.5V2"/><line x1="8" y1="2" x2="16" y2="2"/><line x1="8.5" y1="12" x2="15.5" y2="12"/></svg>
    Placeholder decks while real class content gets added — progress saves on this device only.
  </div>

  <div class="brand-row">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="14" height="10" rx="2"/><rect x="7" y="4" width="14" height="10" rx="2"/></svg>
      </div>
      <div class="brand-text">
        <h1>Study Arcade</h1>
        <p>Turn studying into a game</p>
      </div>
    </div>
    <div class="corner-btns" id="corner-actions">
      <button class="icon-btn" id="sound-toggle" title="Toggle sound"></button>
      <button class="icon-btn" id="theme-toggle" title="Toggle dark mode"></button>
    </div>
  </div>
  <div class="streak-pill" id="streak-pill"><span class="flame">🔥</span><b id="streak-count">0</b><span>-day streak</span></div>

  <a class="back-link" href="arcade.html">
    <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Back to decks
  </a>

  <div id="empty-container"></div>

  <div id="session-ui" style="display:none">
    <div class="session-progress">
      <div class="study-progress" id="learn-progress"></div>
      <div class="progress-track"><div class="progress-fill" id="learn-progress-fill"></div></div>
    </div>
    <div class="learn-question" id="learn-question"></div>
    <div class="learn-choices" id="learn-choices"></div>
    <p class="keyhint">Pick the matching answer — wrong ones come back around later<br>🎮 A/B/X/Y pick an answer · Keys 1-4</p>
  </div>
</div>

<div id="toast"></div>

<script src="arcade.js"></script>
<script src="theme.js" defer></script>
<script>
(function () {
  "use strict";

  var deck = findDeck(deckIdFromURL());
  var queue = [], qIdx = 0, answered = false, correctAnswer = null;

  function showEmpty(msg) {
    document.getElementById("empty-container").innerHTML =
      '<div class="empty-state"><div class="big">🎉</div><p>' + msg + '</p></div>';
  }

  function renderQuestion() {
    var idx = queue[qIdx];
    var pair = deck.cards[idx];
    var pct = Math.round(qIdx / queue.length * 100);
    document.getElementById("learn-progress").innerHTML =
      "<span>Card " + (qIdx + 1) + " of " + queue.length + "</span><span>" + pct + "% done</span>";
    document.getElementById("learn-progress-fill").style.width = pct + "%";
    document.getElementById("learn-question").textContent = pair[0];

    var otherAnswers = deck.cards
      .map(function (c, i) { return { text: c[1], i: i }; })
      .filter(function (c) { return c.i !== idx; })
      .map(function (c) { return c.text; });
    var choices = shuffle([pair[1]].concat(shuffle(otherAnswers).slice(0, 3)));
    correctAnswer = pair[1];
    answered = false;

    var el = document.getElementById("learn-choices");
    el.innerHTML = "";
    choices.forEach(function (text, i) {
      var btn = document.createElement("button");
      btn.className = "learn-choice";
      btn.setAttribute("data-choice", i);
      btn.innerHTML = '<span class="letter">' + LETTERS[i] + '</span><span>' + text + "</span>";
      el.appendChild(btn);
    });
  }

  function answer(choiceIndex) {
    if (answered) return;
    answered = true;
    var idx = queue[qIdx];
    var key = cardKey(deck.id, idx);
    var before = boxOf(entryFor(deck.id, idx));
    var buttons = document.querySelectorAll("#learn-choices .learn-choice");
    var chosenBtn = buttons[choiceIndex];
    var isCorrect = chosenBtn.querySelector("span:last-child").textContent === correctAnswer;
    buttons.forEach(function (b) { b.disabled = true; });
    buttons.forEach(function (b) {
      if (b.querySelector("span:last-child").textContent === correctAnswer) b.classList.add("correct");
    });
    if (!isCorrect) chosenBtn.classList.add("wrong");

    var rating = isCorrect ? "good" : "again";
    var updated = scheduleCard(entryFor(deck.id, idx), rating);
    progress[key] = updated;
    saveProgress(progress);
    bumpStreak();
    SOUNDS[isCorrect ? "correct" : "wrong"]();
    if (before !== "mastered" && boxOf(updated) === "mastered") {
      setTimeout(function () { SOUNDS.mastered(); showToast("Card mastered! 🌟"); }, 200);
    }
    if (!isCorrect) {
      var reinsertAt = Math.min(queue.length, qIdx + 4);
      queue.splice(reinsertAt, 0, idx);
    }
    setTimeout(function () {
      qIdx++;
      if (qIdx >= queue.length) {
        showToast("Deck learned — nice work!");
        setTimeout(function () { location.href = "arcade.html"; }, 900);
      } else {
        renderQuestion();
      }
    }, 900);
  }

  document.addEventListener("click", function (e) {
    var choiceBtn = e.target.closest("[data-choice]");
    if (choiceBtn) return answer(parseInt(choiceBtn.getAttribute("data-choice"), 10));
  });

  document.addEventListener("keydown", function (e) {
    if (e.ctrlKey || e.metaKey || e.altKey) return;
    if ("1234".indexOf(e.key) !== -1) answer(parseInt(e.key, 10) - 1);
  });

  window.onFCGamepadButton = function (bi) { if (bi >= 0 && bi <= 3) answer(bi); };

  initHeader();
  if (!deck) {
    showEmpty("Deck not found.");
  } else {
    queue = getDueIndexes(deck);
    if (!queue.length) {
      showEmpty("Nothing due in " + deck.name + " right now.");
    } else {
      document.getElementById("session-ui").style.display = "block";
      renderQuestion();
    }
  }
})();
</script>
</body>
</html>
